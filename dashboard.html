<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>RND Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f5f7fb;
}

.topbar{
background:#0f172a;
padding:15px;
color:white;
}

.card-box{
border:none;
border-radius:15px;
box-shadow:0 0 15px rgba(0,0,0,0.08);
}

.value{
font-size:28px;
font-weight:bold;
}

.ref-box{
background:#eef2ff;
padding:10px;
border-radius:10px;
word-break:break-all;
}

</style>

</head>

<body>

<div class="topbar d-flex justify-content-between">

<h4>RND Dashboard</h4>

<button
class="btn btn-danger"
onclick="logoutUser()">
Logout
</button>

</div>

<div class="container mt-4">

<div class="card card-box p-4 mb-4">

<h4 id="userName">
Loading...
</h4>

<p id="userEmail"></p>

</div>

<div class="row">

<div class="col-md-6 mb-3">

<div class="card card-box p-4">

<h5>Total Stake</h5>

<div
class="value text-success"
id="stakeAmount">

0 RND

</div>

</div>

</div>

<div class="col-md-6 mb-3">

<div class="card card-box p-4">

<h5>Reward Balance</h5>

<div
class="value text-primary"
id="rewardBalance">

0 RND

</div>

</div>

</div>

</div>

<div class="card card-box p-4 mb-4">

<h5>Your Referral Code</h5>

<div
id="referralCode"
class="ref-box">

Loading...

</div>

</div>

<div class="card card-box p-4 mb-4">

<h5>Your Referral Link</h5>

<div
id="referralLink"
class="ref-box">

Loading...

</div>

<br>

<button
class="btn btn-primary"
onclick="copyReferral()">

Copy Referral Link

</button>

</div>

<div class="row">

<div class="col-md-6 mb-3">

<button
class="btn btn-success w-100">

Deposit

</button>

</div>

<div class="col-md-6 mb-3">

<button
class="btn btn-warning w-100">

Withdrawal

</button>

</div>

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
onAuthStateChanged,
signOut
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore,
doc,
getDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey:"AIzaSyAz-TLmOhiy-_vHHmIjW8gyIOqTR_PT9o0",

authDomain:"rnd2-70080.firebaseapp.com",

projectId:"rnd2-70080",

storageBucket:"rnd2-70080.firebasestorage.app",

messagingSenderId:"468625887938",

appId:"1:468625887938:web:5cb4ddbcf31b6fc0a4615b"

};

const app =
initializeApp(firebaseConfig);

const auth =
getAuth(app);

const db =
getFirestore(app);

onAuthStateChanged(
auth,
async(user)=>{

if(!user){

window.location.href =
"login.html";

return;

}

const snap =
await getDoc(
doc(db,"users",user.uid)
);

if(snap.exists()){

const data =
snap.data();

document.getElementById("userName")
.innerHTML =
data.name || "User";

document.getElementById("userEmail")
.innerHTML =
data.email;

document.getElementById("stakeAmount")
.innerHTML =
(data.stakeAmount || 0)
+ " RND";

document.getElementById("rewardBalance")
.innerHTML =
(data.rewardBalance || 0)
+ " RND";

document.getElementById("referralCode")
.innerHTML =
data.referralCode;

const link =
window.location.origin +
"/register.html?ref=" +
data.referralCode;

document.getElementById("referralLink")
.innerHTML =
link;

window.myReferralLink =
link;

}

});

window.copyReferral = ()=>{

navigator.clipboard.writeText(
window.myReferralLink
);

alert(
"Referral Link Copied"
);

}

window.logoutUser = async()=>{

await signOut(auth);

window.location.href =
"login.html";

}

</script>

</body>
</html>
