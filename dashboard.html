            z-index: 1050;
        }
        .navbar-custom .navbar-brand {
            font-weight: 800;

        }
        .navbar-custom .navbar-brand i { color: #2ecc71; }
        .domain-badge {
            background: rgba(46,204,113,0.12);
            border: 1px solid rgba(46,204,113,0.15);
            border-radius: 30px;
            padding: 4px 14px;
            font-size: 0.65rem;
            color: #2ecc71;
        }
        
        .sidebar-toggle {
            background: rgba(46,204,113,0.12);
            border: 1px solid rgba(46,204,113,0.2);
            color: #2ecc71;
            padding: 8px 14px;

            transition: all 0.3s ease;

        .sidebar-overlay {

            top: 0;

            width: 100%;
            height: 100%;

        }
        .sidebar-overlay.active { display: block; opacity: 1; }
        
        .sidebar-panel {

            backdrop-filter: blur(20px);
            border-left: 1px solid rgba(46,204,113,0.15);

        }

        .sidebar-panel .sidebar-header {

        }

        .sidebar-panel .nav-item.active {

        .sidebar-panel .nav-item .badge {

        .sidebar-panel .sidebar-footer {

        .wallet-card .wallet-icon {

            border: 1px solid rgba(46,204,113,0.08);

            padding: 1.25rem;

            text-align: center;
        }
        .stat-card:hover {
            border-color: rgba(46,204,113,0.2);
            transform: translateY(-3px);

        .stat-card .stat-icon {

            grid-template-columns: repeat(4, 1fr);

            margin-bottom: 25px;
        }
        .network-stat-card {

        .network-stat-card .number {

            color: #2ecc71;
        }
        .network-stat-card .label {
            color: #8899bb;
            font-size: 0.75rem;
            font-weight: 500;
            margin-top: 2px;

        .card-glass {

            border: 1px solid rgba(46,204,113,0.1);

        .card-glass:hover {

        .card-glass .card-title {
            font-size: 1rem;

        .referral-box {
            background: rgba(8,14,26,0.6);

            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;

        .referral-box code {

        .copy-btn {
            cursor: pointer;
            padding: 4px 14px;
            border-radius: 8px;
            border: 1px solid rgba(46,204,113,0.2);
            background: transparent;
            color: #a0b8d0;
            transition: all 0.3s ease;
            font-size: 0.8rem;
        }
        .copy-btn:hover {
            background: rgba(46,204,113,0.1);
            color: #2ecc71;
        }
        
        .btn-primary-custom {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            border: none;
            color: #fff;
            font-weight: 600;
            padding: 10px 24px;
            border-radius: 12px;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            font-size: 0.9rem;
        }
        .btn-primary-custom:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(46,204,113,0.3);
            color: #fff;
        }
        .btn-outline-custom {
            border: 2px solid rgba(46,204,113,0.3);
            color: #a0b8d0;
            padding: 10px 24px;
            border-radius: 12px;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            font-weight: 500;
            background: transparent;
            font-size: 0.9rem;
        }
        .btn-outline-custom:hover {
            border-color: #2ecc71;
            color: #2ecc71;
        }
        
        .loading-spinner {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
        }
        
        .rate-info {
            background: rgba(251,191,36,0.05);
            border: 1px solid rgba(251,191,36,0.1);
            border-radius: 12px;
            padding: 8px 16px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8rem;
            color: #fbbf24;
        }
        
        @media (max-width: 768px) {
            .dashboard-container { padding: 15px; }
            .welcome-section { padding: 20px; }
            .welcome-section h2 { font-size: 1.2rem; }
            .network-stats { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .stat-card .stat-number { font-size: 1.3rem; }
            .wallet-card .wallet-number { font-size: 1.3rem; }
            .sidebar-panel { width: 280px; right: -300px; }
            .sidebar-panel .nav-item { padding: 10px 16px; font-size: 0.85rem; }
            .referral-box { flex-direction: column; align-items: stretch; }
        }
        
        @media (max-width: 480px) {
            .sidebar-panel { width: 100%; right: -100%; }
            .sidebar-panel.open { right: 0; }
            .network-stats { grid-template-columns: 1fr 1fr; gap: 8px; }
            .network-stat-card .number { font-size: 1.3rem; }
            .welcome-section .user-id-badge { font-size: 0.7rem; padding: 4px 12px; }
        }
    </style>
</head>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
<script type="importmap">
{
    "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
        "firebase/database": "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js",
        "firebase/analytics": "https://www.gstatic.com/firebasejs/10.7.1/firebase-analytics.js"
    }

<script type="module">
// ============================================================
// 🔥 FIREBASE IMPORTS
// ============================================================
import { initializeApp } from "firebase/app";
import { getAnalytics } from "firebase/analytics";
import { getAuth, onAuthStateChanged, signOut } from "firebase/auth";
import { getDatabase, ref, get, set, update } from "firebase/database";

// ============================================================
// 🔥 FIREBASE CONFIG
// ============================================================
const firebaseConfig = {
    apiKey: "AIzaSyAz-TLmOhiy-_vHHmIjW8gyIOqTR_PT9o0",
    authDomain: "rnd2-70080.firebaseapp.com",
    databaseURL: "https://rnd2-70080-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "rnd2-70080",
    storageBucket: "rnd2-70080.firebasestorage.app",
    messagingSenderId: "468625887938",
    appId: "1:468625887938:web:5cb4ddbcf31b6fc0a4615b",
    measurementId: "G-ELVJD5NQKB"
};

// ============================================================
// 🔥 DOMAIN CONFIG
// ============================================================
const DOMAIN = "https://staking.randigital.in";
const REGISTER_URL = `${DOMAIN}/register.html`;

// ============================================================
// 🔥 RATE CONFIG (Live RND Rate - Admin se set hoga)
// ============================================================
let rndRate = 0.50; // Default rate (1 RND = $0.50)

// ============================================================
// 🔥 INIT FIREBASE
// ============================================================
const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);
const auth = getAuth(app);
const db = getDatabase(app);

console.log('🔥 Firebase initialized successfully!');

// ============================================================
// 🔥 SIDEBAR CONTROLS
// ============================================================
const sidebarPanel = document.getElementById('sidebarPanel');
const sidebarOverlay = document.getElementById('sidebarOverlay');
const sidebarToggle = document.getElementById('sidebarToggle');
const sidebarClose = document.getElementById('sidebarClose');

function openSidebar() {
    sidebarPanel.classList.add('open');
    sidebarOverlay.classList.add('active');
    document.body.style.overflow = 'hidden';
}

function closeSidebar() {
    sidebarPanel.classList.remove('open');
    sidebarOverlay.classList.remove('active');
    document.body.style.overflow = '';
}

sidebarToggle.addEventListener('click', openSidebar);
sidebarClose.addEventListener('click', closeSidebar);
sidebarOverlay.addEventListener('click', closeSidebar);

document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeSidebar();
});

// ============================================================
// 🔥 LOGOUT
// ============================================================
document.getElementById('logoutBtnSidebar').addEventListener('click', async (e) => {
    e.preventDefault();
    await signOut(auth);
    window.location.href = 'login.html';
});

// ============================================================
// 🔥 FETCH LIVE RATE FROM DATABASE
// ============================================================
async function fetchLiveRate() {
    try {
        const settingsRef = ref(db, 'settings/rate');
        const snapshot = await get(settingsRef);
        if (snapshot.exists()) {
            rndRate = snapshot.val();
            console.log('✅ Live rate loaded:', rndRate);
        } else {
            // Set default rate if not exists
            await set(settingsRef, 0.50);
            rndRate = 0.50;
        }
    } catch (error) {
        console.error('❌ Error fetching rate:', error);
    }
}

// ============================================================
// 🔥 CHECK AUTH & LOAD DASHBOARD
// ============================================================
onAuthStateChanged(auth, async (user) => {
    if (!user) {
        console.log('❌ No user logged in. Redirecting to login...');
        window.location.href = 'login.html';
        return;
    }

    console.log('✅ User logged in. UID:', user.uid);
    
    try {
        // Fetch live rate first
        await fetchLiveRate();
        
        const snapshot = await get(ref(db, 'users/' + user.uid));
        
        if (!snapshot.exists()) {
            console.log('⚠️ User data not found. Creating...');
            const refCodeGen = 'RND' + user.uid.slice(-5).toUpperCase();
            await set(ref(db, 'users/' + user.uid), {
                username: refCodeGen,
                name: user.displayName || 'User',
                email: user.email,
                uid: user.uid,
                referralCode: refCodeGen,
                referredBy: '',
                createdAt: Date.now(),
                totalStake: 0,
                totalReward: 0,
                availableReward: 0,
                totalWithdrawn: 0,
                totalReferrals: 0,
                teamBusiness: 0,
                downline: 0,
                subscriptions: 0,
                banned: false,
                role: 'user',
                rank: 'Member',
                // New wallet fields
                depositWallet: 0,      // Total deposited in USDT
                rndWallet: 0,          // RND coins available
                releaseWallet: 0       // Daily release RND coins
            });
            await set(ref(db, 'usernames/' + refCodeGen), user.uid);
            const newSnapshot = await get(ref(db, 'users/' + user.uid));
            if (newSnapshot.exists()) {
                loadDashboard(newSnapshot.val());
            }
        } else {
            const u = snapshot.val();
            if (u.banned) {
                alert('Your account has been banned.');
                await signOut(auth);
                window.location.href = 'login.html';
                return;
            }
            console.log('✅ User data loaded.');
            loadDashboard(u);
        }

    } catch (error) {
        console.error('❌ Error loading dashboard:', error);
        document.getElementById('dashboardContent').innerHTML = `
            <div class="text-center py-5">
                <i class="bi bi-exclamation-triangle text-danger fs-1 d-block mb-3"></i>
                <h4>Error Loading Dashboard</h4>
                <p class="text-muted">${error.message || 'Please check your internet connection.'}</p>
                <button class="btn btn-primary-custom mt-3" onclick="location.reload()">Refresh</button>
            </div>
        `;
    }
});

// ============================================================
// 🔥 LOAD DASHBOARD FUNCTION
// ============================================================
function loadDashboard(u) {
    const username = u.username || u.referralCode || 'USER';
    const name = u.name || 'User';
    
    const rank = u.rank || 'Member';
    const isMember = rank === 'Member' || rank === 'member' || !rank;
    
    const directReferrals = u.totalReferrals || 0;
    const downline = u.downline || 0;
    const tradingBV = u.teamBusiness || 0;
    const subscriptions = u.subscriptions || 0;
    
    // Wallet balances
    const depositWallet = u.depositWallet || 0;      // USDT deposited
    const rndWallet = u.rndWallet || 0;              // RND coins
    const releaseWallet = u.releaseWallet || 0;      // Daily release RND
    const totalStake = u.totalStake || 0;            // Total RND staked
    
    // Calculate RND value in USD
    const rndValueUSD = (rndWallet * rndRate).toFixed(2);
    
    // Update sidebar
    document.getElementById('sidebarName').textContent = name;
    document.getElementById('sidebarUserId').textContent = 'ID: ' + username;
    document.getElementById('sidebarAvatar').textContent = username.charAt(0).toUpperCase();
    
    // Update referral badge
    const badge = document.getElementById('referralBadge');
    if (badge) badge.textContent = directReferrals;
    
    // Generate referral link
    const referralLink = `${REGISTER_URL}?ref=${username}`;
    
    const rankClass = isMember ? 'rank-badge member' : 'rank-badge';
    
    document.getElementById('dashboardContent').innerHTML = `
        <div class="row g-4">
            <!-- Welcome Section -->
            <div class="col-12">
                <div class="welcome-section">
                    <div class="d-flex flex-wrap align-items-center justify-content-between gap-3">
                        <div>
                            <h2>Good ${getGreeting()}, <span>${name}</span></h2>
                            <div class="d-flex flex-wrap align-items-center gap-3 mt-2">
                                <span class="user-id-badge"><i class="bi bi-person-badge me-1"></i>User ID: <strong>${username}</strong></span>
                                <span class="${rankClass}"><i class="bi bi-award me-1"></i>${rank}</span>
                                <span class="rate-info">
                                    <i class="bi bi-currency-dollar"></i> 1 RND = $${rndRate.toFixed(4)}
                                </span>
                            </div>
                        </div>
                        <div>
                            <a href="deposit.html" class="btn-primary-custom me-2"><i class="bi bi-plus-circle me-1"></i>Deposit</a>
                            <a href="withdrawal.html" class="btn-outline-custom"><i class="bi bi-arrow-up-right me-1"></i>Withdraw</a>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Wallet Cards -->
            <div class="col-12">
                <div class="row g-3">
                    <div class="col-6 col-lg-3">
                        <div class="wallet-card">
                            <div class="wallet-icon deposit"><i class="bi bi-wallet2"></i></div>
                            <div class="wallet-number green">$${depositWallet.toFixed(2)}</div>
                            <div class="wallet-label">Deposit Wallet</div>
                            <div class="wallet-sub">USDT Balance</div>
                        </div>
                    </div>
                    <div class="col-6 col-lg-3">
                        <div class="wallet-card">
                            <div class="wallet-icon withdraw"><i class="bi bi-coin"></i></div>
                            <div class="wallet-number gold">${rndWallet.toFixed(2)}</div>
                            <div class="wallet-label">RND Wallet</div>
                            <div class="wallet-sub">≈ $${rndValueUSD}</div>
                        </div>
                    </div>
                    <div class="col-6 col-lg-3">
                        <div class="wallet-card">
                            <div class="wallet-icon release"><i class="bi bi-clock-history"></i></div>
                            <div class="wallet-number blue">${releaseWallet.toFixed(2)}</div>
                            <div class="wallet-label">Release Wallet</div>
                            <div class="wallet-sub">Daily Release RND</div>
                        </div>
                    </div>
                    <div class="col-6 col-lg-3">
                        <div class="wallet-card">
                            <div class="wallet-icon deposit"><i class="bi bi-pie-chart"></i></div>
                            <div class="wallet-number green">${totalStake.toFixed(2)}</div>
                            <div class="wallet-label">Total Stake</div>
                            <div class="wallet-sub">RND Staked</div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Network Stats -->
            <div class="col-12">
                <h5 class="fw-bold mb-3"><i class="bi bi-diagram-3 text-success me-2"></i>Network</h5>
                <div class="network-stats">
                    <div class="network-stat-card">
                        <div class="number">${directReferrals}</div>
                        <div class="label">Direct Referrals</div>
                    </div>
                    <div class="network-stat-card">
                        <div class="number">${downline}</div>
                        <div class="label">Downline</div>
                    </div>
                    <div class="network-stat-card">
                        <div class="number">${tradingBV}</div>
                        <div class="label">Trading BV</div>
                    </div>
                    <div class="network-stat-card">
                        <div class="number">${subscriptions}</div>
                        <div class="label">Subscriptions</div>
                    </div>
                </div>
            </div>
            
            <!-- Stats Cards -->
            <div class="col-12">
                <div class="row g-3">
                    <div class="col-6 col-lg-3">
                        <div class="stat-card">
                            <div class="stat-icon"><i class="bi bi-wallet2"></i></div>
                            <div class="stat-number">$${u.totalStake || 0}</div>
                            <div class="stat-label">Total Stake</div>
                        </div>
                    </div>
                    <div class="col-6 col-lg-3">
                        <div class="stat-card">
                            <div class="stat-icon"><i class="bi bi-graph-up-arrow"></i></div>
                            <div class="stat-number text-gold" style="color:#f1c40f;">$${u.totalReward || 0}</div>
                            <div class="stat-label">Total Reward</div>
                        </div>
                    </div>
                    <div class="col-6 col-lg-3">
                        <div class="stat-card">
                            <div class="stat-icon"><i class="bi bi-cash-stack"></i></div>
                            <div class="stat-number" style="color:#2ecc71;">$${u.availableReward || 0}</div>
                            <div class="stat-label">Available Reward</div>
                        </div>
                    </div>
                    <div class="col-6 col-lg-3">
                        <div class="stat-card">
                            <div class="stat-icon"><i class="bi bi-arrow-up-right"></i></div>
                            <div class="stat-number">$${u.totalWithdrawn || 0}</div>
                            <div class="stat-label">Total Withdrawn</div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Referral Link -->
            <div class="col-12">
                <div class="card-glass">
                    <div class="card-title"><i class="bi bi-link-45deg"></i>Your Referral Link</div>
                    <div class="referral-box">
                        <code>${referralLink}</code>
                        <button class="copy-btn" data-copy="${referralLink}"><i class="bi bi-clipboard me-1"></i>Copy</button>
                    </div>
                    <div class="mt-3 d-flex flex-wrap gap-2">
                        <span class="text-muted small"><i class="bi bi-people me-1"></i>Total Referrals: <strong style="color:#2ecc71;">${directReferrals}</strong></span>
                        <span class="text-muted small"><i class="bi bi-box-arrow-up-right me-1"></i>Referral Code: <strong style="color:#2ecc71;">${username}</strong></span>
                    </div>
                </div>
            </div>
            
            <!-- Quick Links -->
            <div class="col-12">
                <div class="card-glass">
                    <div class="card-title"><i class="bi bi-grid-3x3-gap-fill"></i>Quick Links</div>
                    <div class="d-flex flex-wrap gap-2">
                        <a href="deposit.html" class="btn-primary-custom"><i class="bi bi-arrow-down-circle me-1"></i>Deposit</a>
                        <a href="withdrawal.html" class="btn-outline-custom"><i class="bi bi-arrow-up-circle me-1"></i>Withdraw</a>
                        <a href="referrals.html" class="btn-outline-custom"><i class="bi bi-people me-1"></i>Referrals</a>
                        <a href="profile.html" class="btn-outline-custom"><i class="bi bi-person me-1"></i>Profile</a>
                    </div>
                </div>
            </div>
        </div>
    `;
    
    // Copy referral link
    document.querySelectorAll('.copy-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            navigator.clipboard.writeText(btn.dataset.copy).then(() => {
                btn.innerHTML = '<i class="bi bi-check-circle me-1"></i>Copied!';
                setTimeout(() => {
                    btn.innerHTML = '<i class="bi bi-clipboard me-1"></i>Copy';
                }, 2000);
            });
        });
    });
}

// ============================================================
// 🔥 HELPER FUNCTIONS
// ============================================================
function getGreeting() {
    const hour = new Date().getHours();
    if (hour < 12) return 'Morning';
    if (hour < 17) return 'Afternoon';
    return 'Evening';
}
</script>
</body>
</html>
