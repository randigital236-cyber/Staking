<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Dashboard - RND Staking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #080e1a; color: #f0f4ff; min-height: 100vh; }
        
        /* ====== Navbar ====== */
        .navbar-custom {
            background: rgba(8,14,26,0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(46,204,113,0.15);
            padding: 10px 0;
            position: sticky;
            top: 0;
            z-index: 1050;
        }
        .navbar-custom .navbar-brand {
            font-weight: 800;
            font-size: 1.2rem;
            color: #fff !important;
        }
        .navbar-custom .navbar-brand i {
            color: #2ecc71;
        }
        
        /* ====== Sidebar (Right Side Horizontal Menu) ====== */
        .sidebar-toggle {
            background: rgba(46,204,113,0.12);
            border: 1px solid rgba(46,204,113,0.2);
            color: #2ecc71;
            padding: 8px 14px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1.2rem;
        }
        .sidebar-toggle:hover {
            background: rgba(46,204,113,0.2);
        }
        
        /* Sidebar Overlay */
        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            z-index: 1060;
            display: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .sidebar-overlay.active {
            display: block;
            opacity: 1;
        }
        
        /* Sidebar Panel - Right Side */
        .sidebar-panel {
            position: fixed;
            top: 0;
            right: -320px;
            width: 300px;
            height: 100%;
            background: rgba(12,20,35,0.98);
            backdrop-filter: blur(20px);
            border-left: 1px solid rgba(46,204,113,0.15);
            z-index: 1070;
            transition: right 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 25px 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        .sidebar-panel.open {
            right: 0;
        }
        
        .sidebar-panel .sidebar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(46,204,113,0.1);
            margin-bottom: 20px;
        }
        .sidebar-panel .sidebar-header h5 {
            color: #fff;
            font-weight: 700;
            margin: 0;
        }
        .sidebar-panel .sidebar-header h5 i {
            color: #2ecc71;
        }
        .sidebar-close {
            background: rgba(255,255,255,0.08);
            border: none;
            color: #8899bb;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1.2rem;
        }
        .sidebar-close:hover {
            background: rgba(255,255,255,0.15);
            color: #fff;
        }
        
        .sidebar-panel .nav-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 16px;
            border-radius: 12px;
            color: #a0b8d0;
            text-decoration: none;
            transition: all 0.3s ease;
            margin-bottom: 4px;
            font-weight: 500;
        }
        .sidebar-panel .nav-item:hover {
            background: rgba(46,204,113,0.08);
            color: #fff;
        }
        .sidebar-panel .nav-item.active {
            background: rgba(46,204,113,0.12);
            color: #2ecc71;
        }
        .sidebar-panel .nav-item i {
            font-size: 1.2rem;
            width: 24px;
            text-align: center;
        }
        .sidebar-panel .nav-item .badge {
            margin-left: auto;
            background: rgba(46,204,113,0.15);
            color: #2ecc71;
            font-weight: 600;
        }
        
        .sidebar-panel .sidebar-footer {
            margin-top: auto;
            padding-top: 20px;
            border-top: 1px solid rgba(46,204,113,0.08);
        }
        .sidebar-panel .sidebar-footer .nav-item {
            color: #f87171;
        }
        .sidebar-panel .sidebar-footer .nav-item:hover {
            background: rgba(239,68,68,0.08);
            color: #f87171;
        }
        
        /* ====== Cards ====== */
        .card-glass {
            background: rgba(19,34,55,0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(46,204,113,0.1);
            border-radius: 20px;
            padding: 1.5rem;
            transition: all 0.3s ease;
        }
        .card-glass:hover {
            border-color: rgba(46,204,113,0.3);
            transform: translateY(-3px);
        }
        .stat-card {
            background: rgba(19,34,55,0.6);
            border: 1px solid rgba(46,204,113,0.08);
            border-radius: 16px;
            padding: 1.25rem;
            transition: all 0.3s ease;
        }
        .stat-card:hover {
            border-color: rgba(46,204,113,0.2);
        }
        .stat-icon {
            width: 44px;
            height: 44px;
            background: rgba(46,204,113,0.12);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: #2ecc71;
        }
        .stat-number { font-size: 1.8rem; font-weight: 800; }
        .stat-label { color: #8899bb; font-size: 0.85rem; font-weight: 500; }
        .text-green { color: #2ecc71; }
        .text-gold { color: #f1c40f; }
        
        .referral-box {
            background: rgba(8,14,26,0.6);
            border-radius: 12px;
            padding: 0.8rem 1rem;
            border: 1px dashed rgba(46,204,113,0.2);
        }
        .copy-btn {
            cursor: pointer;
            padding: 4px 12px;
            border-radius: 8px;
            border: 1px solid rgba(46,204,113,0.2);
            background: transparent;
            color: #a0b8d0;
            transition: all 0.3s ease;
            font-size: 0.85rem;
        }
        .copy-btn:hover {
            background: rgba(46,204,113,0.1);
            color: #2ecc71;
        }
        .plan-box {
            background: rgba(8,14,26,0.5);
            border-radius: 12px;
            padding: 1rem;
            text-align: center;
            border: 1px solid rgba(46,204,113,0.08);
            transition: all 0.3s ease;
        }
        .plan-box:hover { border-color: rgba(46,204,113,0.2); }
        
        .btn-primary-custom {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            border: none;
            color: #fff;
            font-weight: 600;
            padding: 10px 24px;
            border-radius: 12px;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }
        .btn-primary-custom:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(46,204,113,0.3);
            color: #fff;
        }
        .btn-outline-custom {
            border: 2px solid rgba(46,204,113,0.3);
            color: #a0b8d0;
            padding: 10px 24px;
            border-radius: 12px;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            font-weight: 500;
            background: transparent;
        }
        .btn-outline-custom:hover {
            border-color: #2ecc71;
            color: #2ecc71;
        }
        
        /* ====== Loading ====== */
        .loading-spinner {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
        }
        
        /* ====== Mobile Responsive ====== */
        @media (max-width: 768px) {
            .navbar-custom .navbar-brand {
                font-size: 1rem;
            }
            .stat-number { font-size: 1.3rem; }
            .card-glass { padding: 1rem; }
            .stat-card { padding: 1rem; }
            
            .sidebar-panel {
                width: 280px;
                right: -300px;
            }
            .sidebar-panel .nav-item {
                padding: 12px 14px;
                font-size: 0.95rem;
            }
            
            .referral-box {
                flex-wrap: wrap;
                gap: 8px;
            }
            .referral-box code {
                font-size: 0.7rem;
                word-break: break-all;
            }
            
            .plan-box h5 {
                font-size: 1.1rem;
            }
        }
        
        @media (max-width: 480px) {
            .sidebar-panel {
                width: 100%;
                right: -100%;
            }
            .sidebar-panel.open {
                right: 0;
            }
            .stat-number { font-size: 1.1rem; }
            .stat-icon { width: 36px; height: 36px; font-size: 1rem; }
        }
    </style>
</head>
<body>

<!-- ====== NAVBAR ====== -->
<nav class="navbar navbar-custom">
    <div class="container">
        <a class="navbar-brand fw-bold" href="dashboard.html">
            <i class="bi bi-currency-bitcoin me-2"></i>RND Staking
        </a>
        <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle Menu">
            <i class="bi bi-list"></i>
        </button>
    </div>
</nav>

<!-- ====== SIDEBAR OVERLAY ====== -->
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<!-- ====== SIDEBAR PANEL (Right Side) ====== -->
<div class="sidebar-panel" id="sidebarPanel">
    <div class="sidebar-header">
        <h5><i class="bi bi-grid-1x2-fill me-2"></i>Menu</h5>
        <button class="sidebar-close" id="sidebarClose"><i class="bi bi-x-lg"></i></button>
    </div>
    
    <a href="dashboard.html" class="nav-item active">
        <i class="bi bi-speedometer2"></i> Dashboard
    </a>
    <a href="deposit.html" class="nav-item">
        <i class="bi bi-arrow-down-circle"></i> Deposit
        <span class="badge">New</span>
    </a>
    <a href="withdrawal.html" class="nav-item">
        <i class="bi bi-arrow-up-circle"></i> Withdraw
    </a>
    <a href="referrals.html" class="nav-item">
        <i class="bi bi-people"></i> Referrals
        <span class="badge" id="referralBadge">0</span>
    </a>
    <a href="profile.html" class="nav-item">
        <i class="bi bi-person"></i> Profile
    </a>
    
    <div class="sidebar-footer">
        <a href="#" class="nav-item" id="logoutBtnSidebar">
            <i class="bi bi-box-arrow-right"></i> Logout
        </a>
    </div>
</div>

<!-- ====== DASHBOARD CONTENT ====== -->
<div class="container py-4" id="dashboardContent">
    <div class="loading-spinner">
        <div class="spinner-border text-success" role="status" style="width: 3rem; height: 3rem;"></div>
        <p class="text-muted mt-3">Loading dashboard...</p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>

<script type="importmap">
{
    "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
        "firebase/database": "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js",
        "firebase/analytics": "https://www.gstatic.com/firebasejs/10.7.1/firebase-analytics.js"
    }
}
</script>

<script type="module">
// ============================================================
// 🔥 FIREBASE IMPORTS
// ============================================================
import { initializeApp } from "firebase/app";
import { getAnalytics } from "firebase/analytics";
import { getAuth, onAuthStateChanged, signOut } from "firebase/auth";
import { getDatabase, ref, get, set, update } from "firebase/database";

// ============================================================
// 🔥 FIREBASE CONFIG
// ============================================================
const firebaseConfig = {
    apiKey: "AIzaSyAz-TLmOhiy-_vHHmIjW8gyIOqTR_PT9o0",
    authDomain: "rnd2-70080.firebaseapp.com",
    databaseURL: "https://rnd2-70080-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "rnd2-70080",
    storageBucket: "rnd2-70080.firebasestorage.app",
    messagingSenderId: "468625887938",
    appId: "1:468625887938:web:5cb4ddbcf31b6fc0a4615b",
    measurementId: "G-ELVJD5NQKB"
};

// ============================================================
// 🔥 INIT FIREBASE
// ============================================================
const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);
const auth = getAuth(app);
const db = getDatabase(app);

console.log('🔥 Firebase initialized successfully!');

// ============================================================
// 🔥 SIDEBAR CONTROLS
// ============================================================
const sidebarPanel = document.getElementById('sidebarPanel');
const sidebarOverlay = document.getElementById('sidebarOverlay');
const sidebarToggle = document.getElementById('sidebarToggle');
const sidebarClose = document.getElementById('sidebarClose');

function openSidebar() {
    sidebarPanel.classList.add('open');
    sidebarOverlay.classList.add('active');
    document.body.style.overflow = 'hidden';
}

function closeSidebar() {
    sidebarPanel.classList.remove('open');
    sidebarOverlay.classList.remove('active');
    document.body.style.overflow = '';
}

sidebarToggle.addEventListener('click', openSidebar);
sidebarClose.addEventListener('click', closeSidebar);
sidebarOverlay.addEventListener('click', closeSidebar);

// Close sidebar on escape key
document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeSidebar();
});

// ============================================================
// 🔥 LOGOUT (Both buttons)
// ============================================================
document.getElementById('logoutBtnSidebar').addEventListener('click', async (e) => {
    e.preventDefault();
    await signOut(auth);
    window.location.href = 'login.html';
});

// ============================================================
// 🔥 CHECK AUTH & LOAD DASHBOARD
// ============================================================
onAuthStateChanged(auth, async (user) => {
    if (!user) {
        console.log('❌ No user logged in. Redirecting to login...');
        window.location.href = 'login.html';
        return;
    }

    console.log('✅ User logged in. UID:', user.uid);
    
    try {
        const snapshot = await get(ref(db, 'users/' + user.uid));
        
        if (!snapshot.exists()) {
            console.log('⚠️ User data not found. Creating...');
            
            const refCodeGen = 'RND' + user.uid.slice(-5).toUpperCase();
            await set(ref(db, 'users/' + user.uid), {
                name: user.displayName || 'User',
                email: user.email,
                uid: user.uid,
                referralCode: refCodeGen,
                referredBy: '',
                createdAt: Date.now(),
                totalStake: 0,
                totalReward: 0,
                availableReward: 0,
                totalWithdrawn: 0,
                totalReferrals: 0,
                teamBusiness: 0,
                banned: false,
                role: 'user'
            });
            
            console.log('✅ User data created!');
            const newSnapshot = await get(ref(db, 'users/' + user.uid));
            if (newSnapshot.exists()) {
                loadDashboard(newSnapshot.val());
            }
        } else {
            const u = snapshot.val();
            
            if (u.banned) {
                alert('Your account has been banned.');
                await signOut(auth);
                window.location.href = 'login.html';
                return;
            }
            
            console.log('✅ User data loaded.');
            loadDashboard(u);
        }

    } catch (error) {
        console.error('❌ Error loading dashboard:', error);
        document.getElementById('dashboardContent').innerHTML = `
            <div class="text-center py-5">
                <i class="bi bi-exclamation-triangle text-danger fs-1 d-block mb-3"></i>
                <h4>Error Loading Dashboard</h4>
                <p class="text-muted">${error.message || 'Please check your internet connection.'}</p>
                <button class="btn btn-primary-custom mt-3" onclick="location.reload()">Refresh</button>
            </div>
        `;
    }
});

// ============================================================
// 🔥 LOAD DASHBOARD FUNCTION
// ============================================================
function loadDashboard(u) {
    // Update referral badge
    const badge = document.getElementById('referralBadge');
    if (badge) badge.textContent = u.totalReferrals || 0;
    
    document.getElementById('dashboardContent').innerHTML = `
        <div class="row g-4">
            <!-- Stats -->
            <div class="col-12">
                <h4 class="fw-bold"><i class="bi bi-grid-1x2-fill text-success me-2"></i>Dashboard</h4>
                <hr class="border-secondary">
            </div>
            
            <div class="col-6 col-lg-3">
                <div class="stat-card">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <div class="stat-label">Total Stake</div>
                            <div class="stat-number text-green">$${u.totalStake || 0}</div>
                        </div>
                        <div class="stat-icon"><i class="bi bi-wallet2"></i></div>
                    </div>
                </div>
            </div>
            <div class="col-6 col-lg-3">
                <div class="stat-card">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <div class="stat-label">Total Reward</div>
                            <div class="stat-number text-gold">$${u.totalReward || 0}</div>
                        </div>
                        <div class="stat-icon"><i class="bi bi-graph-up-arrow"></i></div>
                    </div>
                </div>
            </div>
            <div class="col-6 col-lg-3">
                <div class="stat-card">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <div class="stat-label">Available Reward</div>
                            <div class="stat-number text-green">$${u.availableReward || 0}</div>
                        </div>
                        <div class="stat-icon"><i class="bi bi-cash-stack"></i></div>
                    </div>
                </div>
            </div>
            <div class="col-6 col-lg-3">
                <div class="stat-card">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <div class="stat-label">Total Withdrawn</div>
                            <div class="stat-number">$${u.totalWithdrawn || 0}</div>
                        </div>
                        <div class="stat-icon"><i class="bi bi-arrow-up-right"></i></div>
                    </div>
                </div>
            </div>

            <!-- User Info & Referral -->
            <div class="col-12">
                <div class="card-glass">
                    <div class="row align-items-center">
                        <div class="col-md-8">
                            <h5><i class="bi bi-person-circle text-success me-2"></i>${u.name || 'User'}</h5>
                            <p class="text-muted small">${u.email} · <span class="text-success">${u.uid}</span></p>
                            <div class="d-flex flex-wrap gap-3 align-items-center">
                                <span><span class="text-muted">Referral Code:</span> <strong class="text-success">${u.referralCode}</strong></span>
                                <div class="referral-box d-flex align-items-center gap-2 flex-wrap">
                                    <code class="text-light small" style="word-break:break-all;">https://randigital.in/register.html?ref=${u.referralCode}</code>
                                    <button class="copy-btn" data-copy="https://randigital.in/register.html?ref=${u.referralCode}"><i class="bi bi-clipboard me-1"></i>Copy</button>
                                </div>
                            </div>
                            <div class="mt-2">
                                <span class="text-muted">Total Referrals:</span> <strong>${u.totalReferrals || 0}</strong>
                                <span class="text-muted ms-3">Team Business:</span> <strong>$${u.teamBusiness || 0}</strong>
                            </div>
                        </div>
                        <div class="col-md-4 text-md-end mt-3 mt-md-0">
                            <a href="deposit.html" class="btn-primary-custom me-2 mb-2 mb-md-0 d-inline-block"><i class="bi bi-plus-circle me-1"></i>Deposit</a>
                            <a href="withdrawal.html" class="btn-outline-custom d-inline-block"><i class="bi bi-arrow-up-right me-1"></i>Withdraw</a>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Staking Plans -->
            <div class="col-12">
                <div class="card-glass">
                    <h5><i class="bi bi-boxes text-success me-2"></i>Staking Plans</h5>
                    <div class="row g-3 mt-2">
                        <div class="col-4">
                            <div class="plan-box">
                                <small class="text-muted">6 Months</small>
                                <h5 class="text-green mb-0">25%</h5>
                            </div>
                        </div>
                        <div class="col-4">
                            <div class="plan-box">
                                <small class="text-muted">12 Months</small>
                                <h5 class="text-gold mb-0">60%</h5>
                            </div>
                        </div>
                        <div class="col-4">
                            <div class="plan-box">
                                <small class="text-muted">18 Months</small>
                                <h5 class="text-green mb-0">100%</h5>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Quick Links -->
            <div class="col-12">
                <div class="card-glass">
                    <h5><i class="bi bi-link-45deg text-success me-2"></i>Quick Links</h5>
                    <div class="d-flex flex-wrap gap-2 mt-2">
                        <a href="deposit.html" class="btn-primary-custom"><i class="bi bi-arrow-down-circle me-1"></i>Deposit</a>
                        <a href="withdrawal.html" class="btn-outline-custom"><i class="bi bi-arrow-up-circle me-1"></i>Withdraw</a>
                        <a href="referrals.html" class="btn-outline-custom"><i class="bi bi-people me-1"></i>Referrals</a>
                        <a href="profile.html" class="btn-outline-custom"><i class="bi bi-person me-1"></i>Profile</a>
                    </div>
                </div>
            </div>
        </div>
    `;

    // Copy referral link
    document.querySelectorAll('.copy-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            navigator.clipboard.writeText(btn.dataset.copy).then(() => {
                btn.innerHTML = '<i class="bi bi-check-circle me-1"></i>Copied!';
                setTimeout(() => {
                    btn.innerHTML = '<i class="bi bi-clipboard me-1"></i>Copy';
                }, 2000);
            });
        });
    });
}
</script>

</body>
</html>
