        .sidebar-panel .nav-item .badge {

        }
        
        .sidebar-panel .sidebar-footer {
            margin-top: auto;
            padding: 20px;
            border-top: 1px solid rgba(46,204,113,0.08);
        }
        .sidebar-panel .sidebar-footer .nav-item { color: #f87171; }
        .sidebar-panel .sidebar-footer .nav-item:hover { background: rgba(239,68,68,0.08); color: #f87171; }
        
        .user-profile-sidebar {
            padding: 10px 20px 20px;
            border-bottom: 1px solid rgba(46,204,113,0.08);

        .user-profile-sidebar .avatar {

        .user-id-badge .copy-btn-small:hover { background: rgba(46,204,113,0.25); }

        .network-stat-card .label { color: #8899bb; font-size: 0.75rem; font-weight: 500; margin-top: 2px; }

            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

            background: rgba(19,34,55,0.6);
            border: 1px solid rgba(46,204,113,0.08);
            border-radius: 12px;
            padding: 12px;

            transition: all 0.3s ease;

        .level-stat-card .label { color: #8899bb; font-size: 0.65rem; font-weight: 500; }

            border: 1px dashed rgba(46,204,113,0.2);

            align-items: center;
            justify-content: space-between;

        .copy-btn {
            cursor: pointer;
            padding: 4px 14px;
            border-radius: 8px;
            border: 1px solid rgba(46,204,113,0.2);
            background: transparent;
            color: #a0b8d0;
            transition: all 0.3s ease;
            font-size: 0.8rem;
        }
        .copy-btn:hover { background: rgba(46,204,113,0.1); color: #2ecc71; }

            border: none;
            color: #fff;
            font-weight: 600;
            padding: 10px 24px;
            border-radius: 12px;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            font-size: 0.9rem;

        .btn-primary-custom:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(46,204,113,0.3); color: #fff; }
        .btn-outline-custom {
            border: 2px solid rgba(46,204,113,0.3);
            color: #a0b8d0;

            border-radius: 12px;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;

        .btn-outline-custom:hover { border-color: #2ecc71; color: #2ecc71; }

        .form-control-custom::placeholder { color: #556688 !important; }
        
        .transfer-history { margin-top: 15px; max-height: 200px; overflow-y: auto; }

        .transfer-history::-webkit-scrollbar-track { background: rgba(46,204,113,0.05); border-radius: 10px; }
        .transfer-history::-webkit-scrollbar-thumb { background: rgba(46,204,113,0.3); border-radius: 10px; }
        
        .transfer-item {

            border: 1px solid rgba(46,204,113,0.06);

            align-items: center;

        .transfer-item .received { color: #34d399; }
        .transfer-item .amount { font-weight: 700; }
        .transfer-item .date { color: #556688; font-size: 0.65rem; }
        .transfer-item .user { color: #a78bfa; font-weight: 500; }
        
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            max-width: 400px;
        }
        .toast-custom {
            background: rgba(19,34,55,0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(46,204,113,0.2);
            border-radius: 16px;
            padding: 16px 20px;
            color: #f0f4ff;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideIn 0.4s ease;
            margin-bottom: 10px;

        .toast-custom.success { border-left: 4px solid #2ecc71; }
        .toast-custom.error { border-left: 4px solid #ef4444; }
        .toast-custom i { font-size: 1.5rem; }
        .toast-custom .toast-msg { flex: 1; font-size: 0.9rem; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        
        .rnd-price-badge {
            background: rgba(46,204,113,0.1);
            border: 1px solid rgba(46,204,113,0.2);
            border-radius: 30px;
            padding: 4px 16px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #2ecc71;
            font-weight: 600;
            font-size: 0.85rem;
        }
        
        .commission-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid rgba(251,191,36,0.05);
        }
        .commission-row:last-child { border-bottom: none; }
        .commission-row .level { color: #8899bb; }
        .commission-row .earnings { color: #fbbf24; font-weight: 600; }
        
        @media (max-width: 992px) {
            .network-stats { grid-template-columns: repeat(2, 1fr); }
            .level-stats { grid-template-columns: repeat(3, 1fr); }
        }
        @media (max-width: 768px) {
            .dashboard-container { padding: 15px; }
            .welcome-section { padding: 20px; }
            .welcome-section h2 { font-size: 1.2rem; }
            .network-stats { grid-template-columns: 1fr 1fr; gap: 10px; }
            .level-stats { grid-template-columns: repeat(2, 1fr); }
            .stat-card .stat-number { font-size: 1.3rem; }
            .wallet-card .wallet-number { font-size: 1.3rem; }
            .sidebar-panel { width: 280px; right: -300px; }
            .sidebar-panel .nav-item { padding: 10px 16px; font-size: 0.85rem; }
        }
        @media (max-width: 480px) {
            .sidebar-panel { width: 100%; right: -100%; }
            .sidebar-panel.open { right: 0; }
            .network-stats { grid-template-columns: 1fr 1fr; gap: 8px; }
            .level-stats { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>

function showToast(message, type = 'success') {
    const container = document.getElementById('toastContainer');
    const toast = document.createElement('div');
    toast.className = `toast-custom ${type}`;
    const icon = type === 'success' ? 'bi-check-circle-fill text-success' : 'bi-exclamation-triangle-fill text-danger';
    toast.innerHTML = `<i class="bi ${icon}"></i><span class="toast-msg">${message}</span>`;
    container.appendChild(toast);
    setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateX(100%)';
        setTimeout(() => toast.remove(), 300);
    }, 5000);
}

const sidebarPanel = document.getElementById('sidebarPanel');
const sidebarOverlay = document.getElementById('sidebarOverlay');
const sidebarToggle = document.getElementById('sidebarToggle');

function openSidebar() {
    sidebarPanel.classList.add('open');
    sidebarOverlay.classList.add('active');

}

async function fetchLiveRate() {
    try {
        const settingsRef = ref(db, 'settings/rate');
        const snapshot = await get(settingsRef);
        if (snapshot.exists()) {
            rndPrice = snapshot.val();
        } else {
            await update(ref(db, 'settings'), { rate: 1.00 });
            rndPrice = 1.00;
        }
    } catch (error) {
        console.error('Error fetching rate:', error);
    }
    return rndPrice;
}

async function getUserByUsername(username) {
    try {
        const usernameRef = ref(db, 'usernames/' + username);
        const snapshot = await get(usernameRef);
        if (snapshot.exists()) {
            const uid = snapshot.val();
            const userRef = ref(db, 'users/' + uid);
            const userSnap = await get(userRef);
            if (userSnap.exists()) {
                return { uid: uid, data: userSnap.val() };
            }
        }
        return null;
    } catch (error) {
        console.error('Error getting user:', error);
        return null;
    }
}

function getGreeting() {
    const hour = new Date().getHours();
    if (hour < 12) return 'Morning';
    if (hour < 17) return 'Afternoon';
    return 'Evening';
}

// 🔥 UPDATE USER DATA - CALCULATE RND WALLET & LOCKED RND
// ============================================================
async function updateUserData(userId) {
    try {
        const userSnap = await get(ref(db, 'users/' + userId));
        if (!userSnap.exists()) {
            console.log('⚠️ User data not found for UID:', userId);
            return null;
        }
        const userData = userSnap.val();
        const packages = userData.packages || {};
        
        let totalDailyRelease = 0;
        let totalStake = 0;
        let totalReward = 0;
        let totalRNDStaked = 0;
        let totalLockedRND = 0;
        let totalReleasedRND = 0;
        
        for (let key in packages) {
            const pkg = packages[key];
            if (pkg.status === 'active') {
                totalDailyRelease += (pkg.dailyRelease || 0);
                totalStake += (pkg.usdtAmount || 0);
                totalReward += (pkg.bonusPercent || 0);
                totalRNDStaked += (pkg.totalRND || 0);
                totalLockedRND += ((pkg.totalRND || 0) - (pkg.releasedAmount || 0));
                totalReleasedRND += (pkg.releasedAmount || 0);
            }
        }
        
        console.log('📊 Package Summary:');
        console.log('   - Total Stake:', totalStake);
        console.log('   - Total RND Staked:', totalRNDStaked);
        console.log('   - Locked RND:', totalLockedRND);
        console.log('   - Released RND:', totalReleasedRND);
        console.log('   - Daily Release:', totalDailyRelease);
        
        await update(ref(db, 'users/' + userId), {
            releaseWallet: totalDailyRelease,
            totalStake: totalStake,
            totalReward: totalReward,
            rndWallet: totalRNDStaked,
            lockedRND: totalLockedRND
        });
        
        return { 
            totalDailyRelease, 
            totalStake, 
            totalReward, 
            totalRNDStaked,
            totalLockedRND,
            totalReleasedRND
        };
    } catch (error) {
        console.error('Error updating user data:', error);
        return null;
    }
}

onAuthStateChanged(auth, async (user) => {
    if (!user) {
        window.location.href = 'login.html';
        return;
    }

    try {
        await fetchLiveRate();
        
        const userSnap = await get(ref(db, 'users/' + user.uid));
        
        if (!userSnap.exists()) {
            console.error('❌ User profile not found. Please register first.');
            document.getElementById('dashboardContent').innerHTML = `
                <div class="text-center py-5">
                    <i class="bi bi-exclamation-triangle text-danger fs-1 d-block mb-3"></i>
                    <h4>Profile Not Found</h4>
                    <p class="text-muted">Please register first to access your dashboard.</p>
                    <a href="register.html" class="btn btn-primary-custom mt-3">Register Now</a>
                </div>
            `;
            return;
        }
        
        const u = userSnap.val();
        
        if (u && u.banned === true) {
            alert('Your account has been banned.');
            await signOut(auth);
            window.location.href = 'login.html';
            return;
        }
        
        // Update calculated fields
        await updateUserData(user.uid);
        
        // Get fresh data
        const updatedSnapshot = await get(ref(db, 'users/' + user.uid));
        if (updatedSnapshot.exists()) {
            loadDashboard(updatedSnapshot.val());
        }

    } catch (error) {
        console.error('Error loading dashboard:', error);
        document.getElementById('dashboardContent').innerHTML = `
            <div class="text-center py-5">
                <i class="bi bi-exclamation-triangle text-danger fs-1 d-block mb-3"></i>
                <h4>Error Loading Dashboard</h4>
                <p class="text-muted">${error.message || 'Please check your internet connection.'}</p>
                <button class="btn btn-primary-custom mt-3" onclick="location.reload()">Refresh</button>
            </div>
        `;
    }
});

window.copyUserId = function(username) {
    navigator.clipboard.writeText(username).then(() => {
        showToast('✅ User ID copied to clipboard!', 'success');
    }).catch(() => {
        const textArea = document.createElement('textarea');
        textArea.value = username;
        document.body.appendChild(textArea);
        textArea.select();
        document.execCommand('copy');
        document.body.removeChild(textArea);
        showToast('✅ User ID copied to clipboard!', 'success');
    });
};

async function handleTransfer() {
    const toUsername = document.getElementById('transferUserId').value.trim();
    const amount = parseFloat(document.getElementById('transferAmount').value);
    const walletType = document.getElementById('transferWallet').value;
    const btn = document.querySelector('#transferForm button[type="submit"]');
    
    if (!toUsername) { showToast('❌ Please enter recipient User ID', 'error'); return; }
    if (!amount || amount <= 0) { showToast('❌ Please enter a valid amount', 'error'); return; }
    
    const user = auth.currentUser;
    if (!user) { showToast('❌ Please login first', 'error'); return; }
    
    const senderSnap = await get(ref(db, 'users/' + user.uid));
    if (!senderSnap.exists()) { showToast('❌ User data not found', 'error'); return; }
    const senderData = senderSnap.val();
    const senderUsername = senderData.username || senderData.referralCode;
    
    if (toUsername === senderUsername) { showToast('❌ You cannot send money to yourself!', 'error'); return; }
    
    const recipient = await getUserByUsername(toUsername);
    if (!recipient) { showToast('❌ User ID not found!', 'error'); return; }
    
    const senderBalance = senderData[walletType] || 0;
    if (senderBalance < amount) {
        const walletLabel = walletType === 'depositWallet' ? 'Deposit Wallet' : 'Referral Wallet';
        showToast('❌ Insufficient balance in ' + walletLabel + '! You have ' + senderBalance.toFixed(2), 'error');
        return;
    }
    
    const currency = walletType === 'depositWallet' ? 'USDT' : 'RND';
    
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>Sending...';
    
    try {
        await update(ref(db, 'users/' + user.uid), {
            [walletType]: senderBalance - amount
        });
        
        const recipientBalance = recipient.data[walletType] || 0;
        await update(ref(db, 'users/' + recipient.uid), {
            [walletType]: recipientBalance + amount
        });
        
        const senderHistory = senderData.transferHistory || [];
        senderHistory.push({
            type: 'sent',
            to: toUsername,
            amount: amount,
            from: senderUsername,
            currency: currency,
            timestamp: Date.now()
        });
        await update(ref(db, 'users/' + user.uid), {
            transferHistory: senderHistory
        });
        
        const recipientHistory = recipient.data.transferHistory || [];
        recipientHistory.push({
            type: 'received',
            from: senderUsername,
            to: toUsername,
            amount: amount,
            currency: currency,
            timestamp: Date.now()
        });
        await update(ref(db, 'users/' + recipient.uid), {
            transferHistory: recipientHistory
        });
        
        showToast('✅ ' + amount + ' ' + currency + ' sent successfully!', 'success');
        
        document.getElementById('transferUserId').value = '';
        document.getElementById('transferAmount').value = '';
        
        setTimeout(() => { window.location.reload(); }, 1500);
        
    } catch (error) {
        console.error('Transfer error:', error);
        showToast('❌ Error sending. Please try again.', 'error');
    }
    
    btn.disabled = false;
    btn.innerHTML = '<i class="bi bi-send me-1"></i>Send';
}
</script>
