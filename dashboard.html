<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - RND Staking</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    * { font-family: 'Segoe UI', sans-serif; }
    body { background: #0b1120; color: #f0f4ff; }
    .navbar-custom { background: #0f1a2e; border-bottom: 1px solid #1f334f; }
    .card-dark { background: #132237; border: 1px solid #2a3a5a; border-radius: 24px; padding: 1.5rem; }
    .stat-card { background: #132237; border-radius: 20px; padding: 1.25rem; border: 1px solid #1f334f; }
    .text-green { color: #2ecc71; }
    .text-gold { color: #f1c40f; }
    .btn-primary-custom { background: #2ecc71; border: none; color: #0b1120; font-weight: 600; }
    .btn-primary-custom:hover { background: #27ae60; color: #fff; }
    .btn-outline-light-custom { border: 1px solid #4a6a8a; color: #c8d6e5; }
    .btn-outline-light-custom:hover { background: #1f334f; color: #fff; }
    .referral-box { background: #0b1120; border-radius: 16px; padding: 1rem; border: 1px dashed #2a3a5a; }
    .copy-btn { cursor: pointer; }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-custom py-3">
    <div class="container">
      <a class="navbar-brand text-white fw-bold" href="#"><i class="bi bi-currency-bitcoin text-green me-2"></i>RND Staking</a>
      <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link text-light active" href="dashboard.html"><i class="bi bi-speedometer2 me-1"></i>Dashboard</a></li>
          <li class="nav-item"><a class="nav-link text-light" href="deposit.html"><i class="bi bi-arrow-down-circle me-1"></i>Deposit</a></li>
          <li class="nav-item"><a class="nav-link text-light" href="withdrawal.html"><i class="bi bi-arrow-up-circle me-1"></i>Withdraw</a></li>
          <li class="nav-item"><a class="nav-link text-light" href="referrals.html"><i class="bi bi-people me-1"></i>Referrals</a></li>
          <li class="nav-item"><a class="nav-link text-light" href="#" id="logoutBtn"><i class="bi bi-box-arrow-right me-1"></i>Logout</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container py-4" id="dashboardContent">
    <div class="text-center text-muted">Loading dashboard...</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
  <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
        "firebase/database": "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"
      }
    }
  </script>
  <script type="module">
    import { initializeApp } from 'firebase/app';
    import { getAuth, onAuthStateChanged, signOut } from 'firebase/auth';
    import { getDatabase, ref, get } from 'firebase/database';

    const firebaseConfig = {
      apiKey: "AIzaSyAz-TLmOhiy-_vHHmIjW8gyIOqTR_PT9o0",
      authDomain: "rnd2-70080.firebaseapp.com",
      databaseURL: "https://rnd2-70080-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "rnd2-70080",
      storageBucket: "rnd2-70080.firebasestorage.app",
      messagingSenderId: "468625887938",
      appId: "1:468625887938:web:5cb4ddbcf31b6fc0a4615b",
      measurementId: "G-ELVJD5NQKB"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await signOut(auth);
      window.location.href = 'login.html';
    });

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = 'login.html';
        return;
      }

      const snapshot = await get(ref(db, 'users/' + user.uid));
      if (!snapshot.exists()) {
        alert('User data not found!');
        return;
      }

      const u = snapshot.val();
      if (u.banned) {
        alert('Your account has been banned.');
        await signOut(auth);
        window.location.href = 'login.html';
        return;
      }

      document.getElementById('dashboardContent').innerHTML = `
        <div class="row g-4">
          <div class="col-12">
            <h4 class="fw-bold"><i class="bi bi-grid-1x2-fill text-green me-2"></i>Dashboard</h4>
            <hr class="border-secondary">
          </div>
          <div class="col-md-6 col-lg-3">
            <div class="stat-card"><small class="text-muted">Total Stake</small><h4 class="text-green">$${u.totalStake || 0}</h4></div>
          </div>
          <div class="col-md-6 col-lg-3">
            <div class="stat-card"><small class="text-muted">Total Reward</small><h4 class="text-gold">$${u.totalReward || 0}</h4></div>
          </div>
          <div class="col-md-6 col-lg-3">
            <div class="stat-card"><small class="text-muted">Available Reward</small><h4 class="text-green">$${u.availableReward || 0}</h4></div>
          </div>
          <div class="col-md-6 col-lg-3">
            <div class="stat-card"><small class="text-muted">Total Withdrawn</small><h4 class="text-white">$${u.totalWithdrawn || 0}</h4></div>
          </div>
          <div class="col-12">
            <div class="card-dark">
              <div class="row align-items-center">
                <div class="col-md-8">
                  <p><strong>${u.name || 'User'}</strong> · ${u.email}</p>
                  <p><span class="text-muted">UID:</span> ${u.uid}</p>
                  <p><span class="text-muted">Referral Code:</span> <span class="text-green fw-bold">${u.referralCode}</span></p>
                  <div class="referral-box d-flex flex-wrap align-items-center gap-2">
                    <span class="text-muted">Link:</span>
                    <code class="text-light bg-dark p-1 rounded">https://randigital.in/register.html?ref=${u.referralCode}</code>
                    <button class="btn btn-sm btn-outline-light-custom copy-btn" data-copy="https://randigital.in/register.html?ref=${u.referralCode}"><i class="bi bi-clipboard"></i> Copy</button>
                  </div>
                  <div class="mt-2">
                    <span class="text-muted">Total Referrals:</span> ${u.totalReferrals || 0} · 
                    <span class="text-muted">Team Business:</span> $${u.teamBusiness || 0}
                  </div>
                </div>
                <div class="col-md-4 text-md-end mt-3 mt-md-0">
                  <a href="deposit.html" class="btn btn-primary-custom me-2"><i class="bi bi-plus-circle"></i> Deposit</a>
                  <a href="withdrawal.html" class="btn btn-outline-light-custom"><i class="bi bi-arrow-up-right"></i> Withdraw</a>
                </div>
              </div>
            </div>
          </div>
          <div class="col-12">
            <div class="card-dark">
              <h5><i class="bi bi-boxes text-green me-2"></i>Staking Plans</h5>
              <div class="row g-3">
                <div class="col-4"><div class="bg-dark p-3 rounded text-center"><small>6 Months</small><br><strong class="text-green">25%</strong></div></div>
                <div class="col-4"><div class="bg-dark p-3 rounded text-center"><small>12 Months</small><br><strong class="text-gold">60%</strong></div></div>
                <div class="col-4"><div class="bg-dark p-3 rounded text-center"><small>18 Months</small><br><strong class="text-green">100%</strong></div></div>
              </div>
            </div>
          </div>
        </div>
      `;

      document.querySelectorAll('.copy-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          navigator.clipboard.writeText(btn.dataset.copy).then(() => alert('✅ Link copied!'));
        });
      });
    });
  </script>
</body>
</html>
