<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>इनवॉइस · RND Staking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #080e1a; color: #f0f4ff; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        
        .invoice-wrapper {
            max-width: 820px;
            width: 100%;
            margin: 0 auto;
        }
        .invoice-card {
            background: rgba(19,34,55,0.85);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(46,204,113,0.15);
            border-radius: 32px;
            padding: 2rem 2.2rem;
            box-shadow: 0 25px 60px rgba(0,0,0,0.6);
            transition: all 0.3s ease;
        }
        .invoice-card:hover { border-color: rgba(46,204,113,0.3); }
        
        .invoice-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(46,204,113,0.1);
            padding-bottom: 1.2rem;
            margin-bottom: 1.8rem;
            flex-wrap: wrap;
        }
        .invoice-header .brand {
            font-weight: 800;
            font-size: 1.4rem;
            color: #fff;
        }
        .invoice-header .brand i { color: #2ecc71; margin-right: 8px; }
        .invoice-header .badge-domain {
            background: rgba(46,204,113,0.1);
            border: 1px solid rgba(46,204,113,0.15);
            border-radius: 30px;
            padding: 4px 16px;
            font-size: 0.7rem;
            color: #2ecc71;
        }
        .invoice-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 0.2rem;
        }
        .invoice-sub {
            color: #8899bb;
            font-size: 0.9rem;
        }
        .invoice-number {
            color: #60a5fa;
            font-weight: 600;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }
        
        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(46,204,113,0.05);
        }
        .detail-row:last-child { border-bottom: none; }
        .detail-label { color: #8899bb; font-weight: 500; font-size: 0.9rem; }
        .detail-value { color: #f0f4ff; font-weight: 600; font-size: 0.95rem; }
        .detail-value.highlight { color: #2ecc71; }
        .detail-value.gold { color: #fbbf24; }
        .detail-value.blue { color: #60a5fa; }
        .detail-value.pink { color: #f472b6; }
        
        .plan-badge {
            display: inline-block;
            background: rgba(46,204,113,0.1);
            border-radius: 40px;
            padding: 4px 18px;
            font-size: 0.75rem;
            font-weight: 600;
            color: #2ecc71;
            border: 1px solid rgba(46,204,113,0.15);
        }
        
        .summary-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 16px;
            margin: 20px 0 10px;
        }
        .summary-item {
            background: rgba(8,14,26,0.5);
            border-radius: 16px;
            padding: 14px 12px;
            text-align: center;
            border: 1px solid rgba(46,204,113,0.06);
        }
        .summary-item .num {
            font-size: 1.5rem;
            font-weight: 800;
            color: #fff;
        }
        .summary-item .num.green { color: #2ecc71; }
        .summary-item .num.gold { color: #fbbf24; }
        .summary-item .num.blue { color: #60a5fa; }
        .summary-item .label { font-size: 0.7rem; color: #8899bb; margin-top: 2px; }
        
        .timeline-bar {
            margin: 20px 0 10px;
            background: rgba(8,14,26,0.5);
            border-radius: 40px;
            padding: 4px;
            border: 1px solid rgba(46,204,113,0.06);
            display: flex;
            overflow: hidden;
        }
        .timeline-bar .segment {
            padding: 8px 0;
            text-align: center;
            font-size: 0.65rem;
            font-weight: 600;
            color: #fff;
            flex: 1;
        }
        .timeline-bar .segment.lock { background: rgba(251,191,36,0.2); color: #fbbf24; }
        .timeline-bar .segment.release { background: rgba(46,204,113,0.15); color: #2ecc71; }
        
        .btn-print {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            border: none;
            color: #fff;
            font-weight: 600;
            padding: 12px 24px;
            border-radius: 60px;
            transition: all 0.3s ease;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-top: 12px;
        }
        .btn-print:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(46,204,113,0.3); color: #fff; }
        .btn-outline-print {
            background: transparent;
            border: 1px solid rgba(46,204,113,0.2);
            color: #8899bb;
            padding: 12px 24px;
            border-radius: 60px;
            transition: all 0.3s ease;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-top: 12px;
            text-decoration: none;
        }
        .btn-outline-print:hover { border-color: #2ecc71; color: #2ecc71; }
        
        .footer-note {
            font-size: 0.7rem;
            color: #556688;
            margin-top: 20px;
            text-align: center;
            border-top: 1px solid rgba(46,204,113,0.06);
            padding-top: 16px;
        }
        
        .loading-spinner {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 400px;
        }
        
        @media (max-width: 640px) {
            .invoice-card { padding: 1.5rem; }
            .summary-grid { grid-template-columns: 1fr 1fr; }
            .invoice-header { flex-direction: column; align-items: flex-start; gap: 10px; }
        }
        @media print {
            body { background: #fff; padding: 0; }
            .invoice-card { box-shadow: none; border: 1px solid #ccc; background: #fff; }
            .btn-print, .btn-outline-print { display: none; }
            .detail-value, .invoice-title, .brand, .summary-item .num { color: #000 !important; }
            .detail-label, .invoice-sub, .footer-note { color: #666 !important; }
            .summary-item { background: #f5f5f5; border-color: #ddd; }
            .timeline-bar .segment.lock { background: #fef3c7; color: #b45309; }
            .timeline-bar .segment.release { background: #d1fae5; color: #065f46; }
            .plan-badge { border-color: #ccc; background: #f0f0f0; color: #000; }
            .invoice-card:hover { border-color: #ccc; }
            .no-print { display: none !important; }
        }
    </style>
</head>
<body>
    <div class="invoice-wrapper">
        <div class="invoice-card" id="invoiceCard">
            <div id="invoiceContent">
                <div class="loading-spinner">
                    <div class="spinner-border text-success" role="status" style="width: 4rem; height: 4rem;"></div>
                    <p class="text-muted mt-3">इनवॉइस लोड हो रहा है...</p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script type="importmap">
    {
        "imports": {
            "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
            "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
            "firebase/database": "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"
        }
    }
    </script>
    <script type="module">
    import { initializeApp } from "firebase/app";
    import { getAuth, onAuthStateChanged } from "firebase/auth";
    import { getDatabase, ref, get } from "firebase/database";

    const firebaseConfig = {
        apiKey: "AIzaSyAz-TLmOhiy-_vHHmIjW8gyIOqTR_PT9o0",
        authDomain: "rnd2-70080.firebaseapp.com",
        databaseURL: "https://rnd2-70080-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "rnd2-70080",
        storageBucket: "rnd2-70080.firebasestorage.app",
        messagingSenderId: "468625887938",
        appId: "1:468625887938:web:5cb4ddbcf31b6fc0a4615b",
        measurementId: "G-ELVJD5NQKB"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    const PLANS = [
        { id: '6months', name: '6 महीने का प्लान', duration: 180, reward: 25 },
        { id: '12months', name: '12 महीने का प्लान', duration: 365, reward: 60 },
        { id: '18months', name: '18 महीने का प्लान', duration: 540, reward: 100 }
    ];

    function getPlanById(id) {
        return PLANS.find(p => p.id === id) || PLANS[0];
    }

    function generateInvoiceHTML(pkg, plan, userData, packageId) {
        const startDate = new Date(pkg.startDate || pkg.timestamp);
        const endDate = new Date(startDate.getTime() + (pkg.duration * 24 * 60 * 60 * 1000));
        const invoiceNum = 'RND-' + startDate.getFullYear() + '-' + 
                          String(startDate.getMonth()+1).padStart(2,'0') + '-' +
                          String(startDate.getDate()).padStart(2,'0') + '-' +
                          String(packageId).slice(-4);
        
        const dailyRelease = pkg.dailyRelease || 0;
        const totalRND = pkg.totalRND || 0;
        const usdtAmount = pkg.usdtAmount || 0;
        const bonusPercent = pkg.bonusPercent || 0;
        const baseRND = pkg.baseRND || 0;
        const bonusRND = pkg.bonusRND || 0;
        const released = pkg.releasedAmount || 0;
        const remaining = totalRND - released;
        const status = pkg.status || 'active';
        const userName = userData?.name || userData?.username || 'उपयोगकर्ता';
        const userCode = userData?.referralCode || '---';
        
        return `
            <!-- HEADER -->
            <div class="invoice-header">
                <div>
                    <div class="brand"><i class="bi bi-currency-bitcoin"></i>RND Staking</div>
                    <div class="invoice-number">इनवॉइस #${invoiceNum}</div>
                </div>
                <div>
                    <span class="badge-domain"><i class="bi bi-check-circle-fill me-1"></i> staking.randigital.in</span>
                </div>
            </div>

            <!-- TITLE -->
            <div class="d-flex justify-content-between align-items-start flex-wrap mb-3">
                <div>
                    <div class="invoice-title">पैकेज रसीद</div>
                    <div class="invoice-sub">स्टेकिंग प्लान की पुष्टि और रिलीज़ शेड्यूल</div>
                </div>
                <div class="text-end">
                    <span class="plan-badge"><i class="bi bi-box-seam me-1"></i> ${pkg.planName}</span>
                    <div style="font-size:0.7rem; color:#556688; margin-top:4px;">जारी: ${startDate.toLocaleString('hi-IN')}</div>
                </div>
            </div>

            <!-- SUMMARY GRID -->
            <div class="summary-grid">
                <div class="summary-item">
                    <div class="num green">$${usdtAmount.toFixed(2)}</div>
                    <div class="label">निवेश (USDT)</div>
                </div>
                <div class="summary-item">
                    <div class="num gold">${totalRND.toFixed(2)} RND</div>
                    <div class="label">कुल प्राप्त (+${bonusPercent}% बोनस)</div>
                </div>
                <div class="summary-item">
                    <div class="num blue">${dailyRelease.toFixed(4)} RND</div>
                    <div class="label">दैनिक रिलीज़</div>
                </div>
            </div>

            <!-- DETAILS -->
            <div style="background: rgba(8,14,26,0.3); border-radius: 16px; padding: 12px 16px; margin: 10px 0 6px;">
                <div class="detail-row">
                    <span class="detail-label">प्लान</span>
                    <span class="detail-value highlight">${pkg.planName} · +${bonusPercent}% बोनस</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">लॉक अवधि</span>
                    <span class="detail-value gold">${pkg.duration} दिन</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">प्रारंभ तिथि</span>
                    <span class="detail-value">${startDate.toLocaleString('hi-IN')}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">समाप्ति तिथि (अनलॉक)</span>
                    <span class="detail-value blue">${endDate.toLocaleString('hi-IN')}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">रिलीज़ अवधि</span>
                    <span class="detail-value">${pkg.duration} दिन (दैनिक रिलीज़)</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">खरीद के समय RND मूल्य</span>
                    <span class="detail-value">$${(pkg.rndPriceAtTime || 1).toFixed(4)} / RND</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">बेस RND</span>
                    <span class="detail-value">${baseRND.toFixed(2)} RND</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">बोनस RND (${bonusPercent}%)</span>
                    <span class="detail-value gold">+${bonusRND.toFixed(2)} RND</span>
                </div>
                <div class="detail-row" style="border-bottom: 2px solid rgba(46,204,113,0.15); padding-bottom: 14px;">
                    <span class="detail-label" style="font-weight:700; color:#f0f4ff;">कुल स्टेक</span>
                    <span class="detail-value highlight" style="font-size:1.1rem;">${totalRND.toFixed(2)} RND</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">दैनिक रिलीज़ राशि</span>
                    <span class="detail-value blue">${dailyRelease.toFixed(4)} RND</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">अब तक जारी</span>
                    <span class="detail-value gold">${released.toFixed(2)} RND</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">शेष लॉक</span>
                    <span class="detail-value" style="color:#a78bfa;">${remaining.toFixed(2)} RND</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">${pkg.duration} दिनों में कुल रिलीज़</span>
                    <span class="detail-value highlight">${totalRND.toFixed(2)} RND</span>
                </div>
            </div>

            <!-- TIMELINE BAR -->
            <div style="margin: 18px 0 8px;">
                <div style="display:flex; justify-content:space-between; font-size:0.65rem; color:#556688; padding:0 4px;">
                    <span>लॉक: ${pkg.duration} दिन</span>
                    <span>दैनिक रिलीज़ तुरंत शुरू</span>
                </div>
                <div class="timeline-bar">
                    <div class="segment lock" style="flex:2;">🔒 लॉक</div>
                    <div class="segment release" style="flex:8;">📈 रिलीज़ (${pkg.duration} दिन)</div>
                </div>
                <div style="display:flex; justify-content:space-between; font-size:0.6rem; color:#556688; padding:0 4px;">
                    <span>${startDate.toLocaleDateString('hi-IN')}</span>
                    <span>${endDate.toLocaleDateString('hi-IN')}</span>
                </div>
            </div>

            <!-- RECEIVER INFO -->
            <div style="background: rgba(8,14,26,0.2); border-radius: 16px; padding: 12px 16px; margin: 12px 0 6px;">
                <div class="detail-row">
                    <span class="detail-label">खरीदार</span>
                    <span class="detail-value">${userName}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">उपयोगकर्ता आईडी</span>
                    <span class="detail-value" style="font-family:monospace; color:#60a5fa;">${userCode}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">पैकेज आईडी</span>
                    <span class="detail-value" style="font-family:monospace; font-size:0.8rem; color:#a78bfa;">${packageId}</span>
                </div>
            </div>

            <!-- FOOTER / ACTIONS -->
            <div class="d-flex flex-wrap justify-content-between align-items-center mt-3 no-print">
                <div>
                    <span class="badge ${status === 'active' ? 'bg-success' : 'bg-info'} bg-opacity-10 px-3 py-2" style="border-radius:40px; font-weight:500; color:${status === 'active' ? '#2ecc71' : '#60a5fa'};">
                        <i class="bi bi-${status === 'active' ? 'check-circle-fill' : 'clock-history'} me-1"></i> ${status === 'active' ? 'सक्रिय · रिलीज़ जारी' : 'पूर्ण'}
                    </span>
                </div>
                <div>
                    <button class="btn-print" onclick="window.print()"><i class="bi bi-printer"></i> प्रिंट करें</button>
                    <button class="btn-outline-print ms-2" onclick="window.location.href='buy-package.html'"><i class="bi bi-arrow-left"></i> वापस</button>
                </div>
            </div>

            <div class="footer-note">
                <i class="bi bi-shield-check me-1"></i> यह आपके स्टेकिंग पैकेज के लिए सिस्टम-जनित रसीद है।
                सभी रिलीज़ राशियाँ खरीद के समय RND मूल्य के आधार पर गणना की जाती हैं।
            </div>
        `;
    }

    onAuthStateChanged(auth, async (user) => {
        if (!user) {
            window.location.href = 'login.html';
            return;
        }

        try {
            // URL से package ID प्राप्त करें
            const urlParams = new URLSearchParams(window.location.search);
            const packageId = urlParams.get('id');

            if (!packageId) {
                document.getElementById('invoiceContent').innerHTML = `
                    <div class="text-center py-5">
                        <i class="bi bi-exclamation-triangle text-warning fs-1 d-block mb-3"></i>
                        <h4>कोई पैकेज नहीं चुना गया</h4>
                        <p class="text-muted">कृपया पैकेज इतिहास से एक इनवॉइस चुनें।</p>
                        <a href="buy-package.html" class="btn btn-primary-custom mt-3">पैकेज खरीदें पर जाएँ</a>
                    </div>
                `;
                return;
            }

            // उपयोगकर्ता डेटा प्राप्त करें
            const userSnap = await get(ref(db, 'users/' + user.uid));
            if (!userSnap.exists()) {
                document.getElementById('invoiceContent').innerHTML = `
                    <div class="text-center py-5">
                        <i class="bi bi-exclamation-triangle text-danger fs-1 d-block mb-3"></i>
                        <h4>उपयोगकर्ता डेटा नहीं मिला</h4>
                    </div>
                `;
                return;
            }

            const userData = userSnap.val();
            const packages = userData.packages || {};
            const pkg = packages[packageId];

            if (!pkg) {
                document.getElementById('invoiceContent').innerHTML = `
                    <div class="text-center py-5">
                        <i class="bi bi-exclamation-triangle text-warning fs-1 d-block mb-3"></i>
                        <h4>पैकेज नहीं मिला</h4>
                        <p class="text-muted">यह पैकेज मौजूद नहीं है या आपके पास इसकी पहुँच नहीं है।</p>
                        <a href="buy-package.html" class="btn btn-primary-custom mt-3">पैकेज खरीदें पर जाएँ</a>
                    </div>
                `;
                return;
            }

            const plan = getPlanById(pkg.planId);
            const invoiceHTML = generateInvoiceHTML(pkg, plan, userData, packageId);
            document.getElementById('invoiceContent').innerHTML = invoiceHTML;

        } catch (error) {
            console.error('इनवॉइस लोड करने में त्रुटि:', error);
            document.getElementById('invoiceContent').innerHTML = `
                <div class="text-center py-5">
                    <i class="bi bi-exclamation-triangle text-danger fs-1 d-block mb-3"></i>
                    <h4>इनवॉइस लोड करने में त्रुटि</h4>
                    <p class="text-muted">${error.message || 'कृपया पुनः प्रयास करें।'}</p>
                    <button class="btn btn-primary-custom mt-3" onclick="location.reload()">पुनः प्रयास करें</button>
                </div>
            `;
        }
    });
    </script>
</body>
</html>
