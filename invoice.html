            border: 1px solid rgba(46,204,113,0.2);

            padding: 8px 14px;

            transition: all 0.3s ease;

        }

        .sidebar-overlay {
            position: fixed;

        .sidebar-panel .nav-item .badge {

            border-radius: 24px;

            transition: all 0.3s ease;
            margin-bottom: 20px;
        }
        .invoice-card:hover { border-color: rgba(46,204,113,0.3); }
        
        .invoice-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(46,204,113,0.1);

            flex-wrap: wrap;
            gap: 15px;
        }
        .invoice-header .brand {

        }
        .invoice-header .brand i { color: #2ecc71; margin-right: 8px; }
        .invoice-header .badge-domain {

            border: 1px solid rgba(46,204,113,0.15);

        }
        .invoice-title {
            font-size: 1.8rem;

            margin-bottom: 0.2rem;
        }
        .invoice-sub {
            color: #8899bb;
            font-size: 0.9rem;
        }
        
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin: 20px 0;
        }
        .summary-item {
            background: rgba(8,14,26,0.5);
            border-radius: 16px;

            color: #fff;

        .summary-item .num.green { color: #2ecc71; }
        .summary-item .num.gold { color: #fbbf24; }
        .summary-item .num.blue { color: #60a5fa; }
        .summary-item .num.pink { color: #f472b6; }
        .summary-item .num.purple { color: #a78bfa; }
        .summary-item .label { font-size: 0.7rem; color: #8899bb; margin-top: 4px; }
        
        .detail-row {

        .detail-value.blue { color: #60a5fa; }

        .timeline-bar .segment {

        .timeline-bar .segment.release { background: rgba(46,204,113,0.15); color: #2ecc71; }
        .timeline-bar .segment.completed { background: rgba(46,204,113,0.25); color: #2ecc71; }

            border-radius: 30px;
            font-size: 0.75rem;

            color: #2ecc71;
            border: 1px solid rgba(46,204,113,0.15);
        }
        .status-badge.completed {
            background: rgba(96,165,250,0.12);
            color: #60a5fa;
            border: 1px solid rgba(96,165,250,0.15);

            border-radius: 60px;

            font-size: 0.9rem;

            align-items: center;
            gap: 10px;

        .btn-outline-print:hover { border-color: #2ecc71; color: #2ecc71; }
        
        .footer-note {
            font-size: 0.7rem;

            margin-top: 20px;
            text-align: center;
            border-top: 1px solid rgba(46,204,113,0.06);
            padding-top: 16px;

        .package-list {
            margin-top: 20px;
        }
        .package-list .package-item {
            background: rgba(8,14,26,0.4);
            border-radius: 16px;
            padding: 16px 20px;
            border: 1px solid rgba(46,204,113,0.06);
            margin-bottom: 12px;
            transition: all 0.3s ease;
        }
        .package-list .package-item:hover {
            border-color: rgba(46,204,113,0.15);
            background: rgba(8,14,26,0.6);
        }
        .package-list .package-item .pkg-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .package-list .package-item .pkg-header .pkg-name {
            font-weight: 700;
            font-size: 1.1rem;
            color: #fff;
        }
        .package-list .package-item .pkg-details {

        .empty-state p { color: #8899bb; }
        
        .btn-primary-custom {

            color: #fff;
            font-weight: 600;
            padding: 10px 24px;

        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            max-width: 400px;
        }
        .toast-custom {
            background: rgba(19,34,55,0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(46,204,113,0.2);
            border-radius: 16px;
            padding: 16px 20px;
            color: #f0f4ff;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideIn 0.4s ease;
            margin-bottom: 10px;
        }
        .toast-custom.success { border-left: 4px solid #2ecc71; }
        .toast-custom.error { border-left: 4px solid #ef4444; }
        .toast-custom i { font-size: 1.5rem; }
        .toast-custom .toast-msg { flex: 1; font-size: 0.9rem; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        
        @media (max-width: 768px) {
            .dashboard-container { padding: 15px; }
            .sidebar-panel { width: 280px; right: -300px; }
            .sidebar-panel .nav-item { padding: 10px 16px; font-size: 0.85rem; }
            .invoice-card { padding: 1.2rem; }
            .summary-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .summary-item .num { font-size: 1.2rem; }
            .package-list .package-item .pkg-details {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        @media (max-width: 480px) {
            .sidebar-panel { width: 100%; right: -100%; }
            .sidebar-panel.open { right: 0; }
            .invoice-card { padding: 1rem; }
            .summary-grid { grid-template-columns: 1fr 1fr; }
            .package-list .package-item .pkg-details {
                grid-template-columns: 1fr 1fr;
            }
            .invoice-header { flex-direction: column; align-items: flex-start; }
        }
        @media print {
            body { background: #fff; padding: 0; }
            .invoice-card { box-shadow: none; border: 1px solid #ccc; background: #fff; }
            .btn-print, .btn-outline-print, .sidebar-toggle, .navbar-custom, .sidebar-panel, .sidebar-overlay { display: none !important; }
            .detail-value, .invoice-title, .brand, .summary-item .num { color: #000 !important; }
            .detail-label, .invoice-sub, .footer-note { color: #666 !important; }
            .summary-item { background: #f5f5f5; border-color: #ddd; }
            .package-list .package-item { background: #f8f8f8; border-color: #ddd; }
            .package-list .package-item .pkg-details .detail { background: #eee; }
            .timeline-bar .segment.lock { background: #fef3c7; color: #b45309; }
            .timeline-bar .segment.release { background: #d1fae5; color: #065f46; }
            .timeline-bar .segment.completed { background: #d1fae5; color: #065f46; }
            .plan-badge { border-color: #ccc; background: #f0f0f0; color: #000; }
            .status-badge.active { background: #d1fae5; color: #065f46; }
            .status-badge.completed { background: #dbeafe; color: #1e40af; }
            .invoice-card:hover { border-color: #ccc; }
            .package-list .package-item:hover { border-color: #ddd; background: #f8f8f8; }
        }
    </style>
</head>

function showToast(message, type = 'success') {
    const container = document.getElementById('toastContainer');
    const toast = document.createElement('div');
    toast.className = `toast-custom ${type}`;
    const icon = type === 'success' ? 'bi-check-circle-fill text-success' : 'bi-exclamation-triangle-fill text-danger';
    toast.innerHTML = `<i class="bi ${icon}"></i><span class="toast-msg">${message}</span>`;
    container.appendChild(toast);
    setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateX(100%)';
        setTimeout(() => toast.remove(), 300);
    }, 5000);
}

const sidebarPanel = document.getElementById('sidebarPanel');
const sidebarOverlay = document.getElementById('sidebarOverlay');
const sidebarToggle = document.getElementById('sidebarToggle');
const sidebarClose = document.getElementById('sidebarClose');

function openSidebar() {
    sidebarPanel.classList.add('open');
    sidebarOverlay.classList.add('active');
    document.body.style.overflow = 'hidden';
}
function closeSidebar() {
    sidebarPanel.classList.remove('open');
    sidebarOverlay.classList.remove('active');
    document.body.style.overflow = '';
}
sidebarToggle.addEventListener('click', openSidebar);
sidebarClose.addEventListener('click', closeSidebar);
sidebarOverlay.addEventListener('click', closeSidebar);
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeSidebar(); });

document.getElementById('logoutBtnSidebar').addEventListener('click', async (e) => {
    e.preventDefault();
    await signOut(auth);
    window.location.href = 'login.html';
});

function formatDate(timestamp) {
    if (!timestamp) return 'N/A';
    const d = new Date(timestamp);
    return d.toLocaleDateString('en-IN', {
        day: '2-digit',
        month: 'short',
        year: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
    });
}

function formatDateShort(timestamp) {
    if (!timestamp) return 'N/A';
    const d = new Date(timestamp);
    return d.toLocaleDateString('en-IN', {
        day: '2-digit',
        month: 'short',
        year: 'numeric'
    });
}

function calculateEndDate(startDate, planDays) {
    if (!startDate || !planDays) return null;
    return startDate + (planDays * 24 * 60 * 60 * 1000);
}

function getDaysRemaining(endDate) {
    if (!endDate) return 0;
    const now = Date.now();
    const diff = endDate - now;
    if (diff <= 0) return 0;
    return Math.ceil(diff / (24 * 60 * 60 * 1000));
}

function getDaysPassed(startDate) {
    if (!startDate) return 0;
    const diff = Date.now() - startDate;
    if (diff <= 0) return 0;
    return Math.floor(diff / (24 * 60 * 60 * 1000));
}

function getProgress(released, total) {
    if (!total || total === 0) return 0;
    return Math.min((released / total) * 100, 100);
}

function getPlanColor(planName) {
    const colors = {
        '6 Months Plan': '#2ecc71',
        '12 Months Plan': '#fbbf24',
        '18 Months Plan': '#f472b6'
    };
    return colors[planName] || '#2ecc71';
}

// ============================================================
// 🔥 MAIN
// ============================================================
onAuthStateChanged(auth, async (user) => {
    if (!user) {
        window.location.href = 'login.html';
        return;
    }

    try {
        const userSnap = await get(ref(db, 'users/' + user.uid));
        if (!userSnap.exists()) {
            window.location.href = 'dashboard.html';
            return;
        }
        
        const userData = userSnap.val();
        const username = userData.username || userData.referralCode || 'USER';
        const name = userData.name || 'User';
        
        document.getElementById('sidebarName').textContent = name;
        document.getElementById('sidebarUserId').textContent = 'ID: ' + username.substring(0, 20) + '...';
        document.getElementById('sidebarAvatar').textContent = name.charAt(0).toUpperCase();
        
        const badge = document.getElementById('referralBadge');
        if (badge) badge.textContent = userData.totalReferrals || 0;

        // 🔥 Get packages
        const packages = userData.packages || {};
        const packageKeys = Object.keys(packages);
        
        if (packageKeys.length === 0) {
            document.getElementById('invoiceContent').innerHTML = `
                <div class="invoice-container">
                    <div class="invoice-card">
                        <div class="empty-state">
                            <i class="bi bi-box-seam"></i>
                            <h4>No Packages Found</h4>
                            <p>You haven't purchased any staking packages yet.</p>
                            <a href="buy-package.html" class="btn btn-primary-custom mt-3">
                                <i class="bi bi-plus-circle me-1"></i> Buy Your First Package
                            </a>
                        </div>
                    </div>
                </div>
            `;
            return;
        }

        // 🔥 Calculate totals
        let totalInvested = 0;
        let totalRNDReceived = 0;
        let totalReleased = 0;
        let totalLocked = 0;
        let activePackages = 0;
        let completedPackages = 0;

        packageKeys.forEach(key => {
            const pkg = packages[key];
            if (pkg.status === 'active' || pkg.status === 'completed') {
                totalInvested += (pkg.usdtAmount || 0);
                totalRNDReceived += (pkg.totalRND || 0);
                totalReleased += (pkg.releasedRND || 0);
                const locked = (pkg.totalRND || 0) - (pkg.releasedRND || 0);
                totalLocked += Math.max(0, locked);
                if (pkg.status === 'active') activePackages++;
                else completedPackages++;
            }
        });

        // 🔥 Build package list HTML
        let packagesHtml = '';
        packageKeys.forEach((key) => {
            const pkg = packages[key];
            
            // 🔥 Calculate package details
            const isActive = pkg.status === 'active';
            const totalRND = pkg.totalRND || 0;
            const releasedRND = pkg.releasedRND || 0;
            const remainingRND = pkg.remainingRND || 0;
            const dailyRelease = pkg.dailyRelease || 0;
            const planDays = pkg.planDays || 0;
            const purchaseDate = pkg.purchaseDate || pkg.timestamp || Date.now();
            const endDate = calculateEndDate(purchaseDate, planDays);
            const daysRemaining = isActive ? getDaysRemaining(endDate) : 0;
            const daysPassed = getDaysPassed(purchaseDate);
            const progress = getProgress(releasedRND, totalRND);
            const planColor = getPlanColor(pkg.planName);
            
            // 🔥 Timeline
            let timelineHtml = '';
            if (isActive) {
                const progressPercent = progress / 100;
                const lockPercent = 1 - progressPercent;
                timelineHtml = `
                    <div class="timeline-bar">
                        <div class="segment lock" style="flex:${Math.max(lockPercent * 10, 0.5)};">
                            🔒 ${daysRemaining > 0 ? daysRemaining + ' days left' : 'Almost done'}
                        </div>
                        <div class="segment release" style="flex:${Math.max(progressPercent * 10, 0.5)};">
                            📈 ${progress.toFixed(1)}% Released
                        </div>
                    </div>
                `;
            } else {
                timelineHtml = `
                    <div class="timeline-bar">
                        <div class="segment completed" style="flex:10;">
                            ✅ Completed - All RND Released
                        </div>
                    </div>
                `;
            }

            packagesHtml += `
                <div class="package-item">
                    <div class="pkg-header">
                        <div>
                            <span class="pkg-name" style="color:${planColor};">${pkg.planName || 'Package'}</span>
                            <span class="plan-badge ${!isActive ? 'completed' : ''} ms-2">
                                ${isActive ? '🟢 Active' : '🔵 Completed'}
                            </span>
                            <span class="status-badge ${isActive ? 'active' : 'completed'} ms-1">
                                <i class="bi ${isActive ? 'bi-clock' : 'bi-check-circle'}"></i>
                                ${isActive ? 'In Progress' : 'Completed'}
                            </span>
                        </div>
                        <div>
                            <span style="font-size:0.7rem;color:#556688;">#${key.substring(0, 8)}</span>
                        </div>
                    </div>
                    
                    <div class="pkg-details">
                        <div class="detail">
                            <div class="val" style="color:#2ecc71;">$${(pkg.usdtAmount || 0).toFixed(2)}</div>
                            <div class="lbl">Investment (USDT)</div>
                        </div>
                        <div class="detail">
                            <div class="val" style="color:#60a5fa;">${totalRND.toFixed(2)}</div>
                            <div class="lbl">Total RND</div>
                        </div>
                        <div class="detail">
                            <div class="val" style="color:#fbbf24;">${releasedRND.toFixed(2)}</div>
                            <div class="lbl">Released RND</div>
                        </div>
                        <div class="detail">
                            <div class="val" style="color:#a78bfa;">${remainingRND.toFixed(2)}</div>
                            <div class="lbl">Remaining RND</div>
                        </div>
                        <div class="detail">
                            <div class="val" style="color:#34d399;">${dailyRelease.toFixed(4)}</div>
                            <div class="lbl">Daily Release</div>
                        </div>
                        <div class="detail">
                            <div class="val" style="color:#f472b6;">${pkg.bonusPercent || 0}%</div>
                            <div class="lbl">Bonus</div>
                        </div>
                        <div class="detail">
                            <div class="val" style="color:#8899bb;font-size:0.8rem;">${formatDateShort(purchaseDate)}</div>
                            <div class="lbl">Start Date</div>
                        </div>
                        <div class="detail">
                            <div class="val" style="color:${isActive ? '#fbbf24' : '#60a5fa'};font-size:0.8rem;">
                                ${isActive ? formatDateShort(endDate) : 'Completed'}
                            </div>
                            <div class="lbl">${isActive ? 'End Date' : 'Completion Date'}</div>
                        </div>
                        <div class="detail">
                            <div class="val" style="color:#34d399;font-size:0.8rem;">
                                ${isActive ? daysPassed + ' days' : 'Done'}
                            </div>
                            <div class="lbl">Days Passed</div>
                        </div>
                        <div class="detail">
                            <div class="val" style="color:#fbbf24;font-size:0.8rem;">
                                ${isActive ? daysRemaining + ' days' : '0'}
                            </div>
                            <div class="lbl">Days Remaining</div>
                        </div>
                    </div>
                    
                    ${timelineHtml}
                    
                    <div style="display:flex;justify-content:space-between;font-size:0.65rem;color:#556688;margin-top:4px;flex-wrap:wrap;gap:4px;">
                        <span>📊 ${progress.toFixed(1)}% Released</span>
                        <span>${isActive ? '⏳ ' + daysRemaining + ' days remaining' : '✅ All released'}</span>
                        <span>💰 RND Rate: $${(pkg.rndPriceAtTime || 1).toFixed(4)}</span>
                        <span>📅 ${planDays} Days Plan</span>
                    </div>
                </div>
            `;
        });

        document.getElementById('invoiceContent').innerHTML = `
            <div class="invoice-container">
                <div class="invoice-card">
                    <!-- HEADER -->
                    <div class="invoice-header">
                        <div>
                            <div class="brand"><i class="bi bi-currency-bitcoin"></i>RND Staking</div>
                            <div style="font-size:0.7rem;color:#556688;">Invoice #RND-${Date.now().toString().slice(-8)}</div>
                        </div>
                        <div>
                            <span class="badge-domain"><i class="bi bi-check-circle-fill me-1"></i> staking.randigital.in</span>
                        </div>
                    </div>

                    <!-- TITLE -->
                    <div class="d-flex justify-content-between align-items-start flex-wrap mb-3">
                        <div>
                            <div class="invoice-title">📄 Package Statement</div>
                            <div class="invoice-sub">Complete history of all your staking packages</div>
                        </div>
                        <div class="text-end">
                            <span style="font-size:0.85rem;color:#fff;font-weight:600;">
                                <i class="bi bi-person me-1"></i> ${name}
                            </span>
                            <div style="font-size:0.7rem;color:#556688;margin-top:2px;">
                                <i class="bi bi-calendar me-1"></i> Generated: ${formatDate(Date.now())}
                            </div>
                        </div>
                    </div>

                    <!-- USER INFO -->
                    <div style="background:rgba(8,14,26,0.3);border-radius:12px;padding:12px 16px;margin-bottom:15px;">
                        <div class="detail-row">
                            <span class="detail-label">User Name</span>
                            <span class="detail-value highlight">${name}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">User ID</span>
                            <span class="detail-value" style="font-family:monospace;color:#60a5fa;">${username}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Email</span>
                            <span class="detail-value">${userData.email || 'N/A'}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Member Since</span>
                            <span class="detail-value">${formatDate(userData.createdAt)}</span>
                        </div>
                    </div>

                    <!-- SUMMARY GRID -->
                    <div class="summary-grid">
                        <div class="summary-item">
                            <div class="num green">${packageKeys.length}</div>
                            <div class="label">Total Packages</div>
                        </div>
                        <div class="summary-item">
                            <div class="num gold">$${totalInvested.toFixed(2)}</div>
                            <div class="label">Total Invested</div>
                        </div>
                        <div class="summary-item">
                            <div class="num blue">${totalRNDReceived.toFixed(2)}</div>
                            <div class="label">Total RND</div>
                        </div>
                        <div class="summary-item">
                            <div class="num purple">${totalReleased.toFixed(2)}</div>
                            <div class="label">Total Released</div>
                        </div>
                    </div>

                    <!-- SECONDARY SUMMARY -->
                    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin:10px 0 20px;">
                        <div style="background:rgba(8,14,26,0.3);border-radius:10px;padding:10px;text-align:center;">
                            <div style="font-size:1.2rem;font-weight:700;color:#2ecc71;">${activePackages}</div>
                            <div style="font-size:0.6rem;color:#8899bb;">🟢 Active</div>
                        </div>
                        <div style="background:rgba(8,14,26,0.3);border-radius:10px;padding:10px;text-align:center;">
                            <div style="font-size:1.2rem;font-weight:700;color:#60a5fa;">${completedPackages}</div>
                            <div style="font-size:0.6rem;color:#8899bb;">🔵 Completed</div>
                        </div>
                        <div style="background:rgba(8,14,26,0.3);border-radius:10px;padding:10px;text-align:center;">
                            <div style="font-size:1.2rem;font-weight:700;color:#a78bfa;">${totalLocked.toFixed(2)}</div>
                            <div style="font-size:0.6rem;color:#8899bb;">🔒 Still Locked</div>
                        </div>
                        <div style="background:rgba(8,14,26,0.3);border-radius:10px;padding:10px;text-align:center;">
                            <div style="font-size:1.2rem;font-weight:700;color:#34d399;">${(totalLocked > 0 ? (totalLocked / (totalRNDReceived || 1) * 100) : 0).toFixed(1)}%</div>
                            <div style="font-size:0.6rem;color:#8899bb;">Released %</div>
                        </div>
                    </div>

                    <!-- PACKAGE LIST -->
                    <div class="package-list">
                        <h6 style="font-weight:700;color:#fff;margin-bottom:15px;">
                            <i class="bi bi-box-seam text-success me-2"></i>Package Details (${packageKeys.length} packages)
                        </h6>
                        ${packagesHtml}
                    </div>

                    <!-- FOOTER -->
                    <div class="d-flex flex-wrap justify-content-between align-items-center mt-4">
                        <div>
                            <span style="font-size:0.7rem;color:#556688;">
                                <i class="bi bi-shield-check me-1"></i> All data is secured and stored on Firebase
                            </span>
                        </div>
                        <div>
                            <button class="btn-print" onclick="window.print()">
                                <i class="bi bi-printer"></i> Print / PDF
                            </button>
                            <a href="dashboard.html" class="btn-outline-print ms-2">
                                <i class="bi bi-arrow-left"></i> Back
                            </a>
                        </div>
                    </div>

                    <div class="footer-note">
                        <i class="bi bi-info-circle me-1"></i> 
                        This is a system-generated statement of all your staking packages. 
                        Each package releases a fixed amount daily (totalRND / planDays).
                        Release starts from the day after purchase.
                        For any queries, please contact support.
                    </div>
                </div>
            </div>
        `;

    } catch (error) {
        console.error('Error loading invoice:', error);
        document.getElementById('invoiceContent').innerHTML = `
            <div class="text-center py-5">
                <i class="bi bi-exclamation-triangle text-danger fs-1 d-block mb-3"></i>
                <h4>Error Loading Page</h4>
                <p class="text-muted">${error.message || 'Please check your internet connection.'}</p>
                <button class="btn btn-primary-custom mt-3" onclick="location.reload()">Refresh</button>
            </div>
        `;
    }
});
</script>
</body>
</html>
