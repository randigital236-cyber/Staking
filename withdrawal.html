<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Withdraw - RND Staking</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Inter', sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #080e1a; color: #f0f4ff; min-height: 100vh; }
    
    .navbar-custom {
      background: rgba(8,14,26,0.95);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(46,204,113,0.15);
      padding: 10px 0;
      position: sticky;
      top: 0;
      z-index: 1050;
    }
    .navbar-custom .navbar-brand { font-weight: 800; font-size: 1.2rem; color: #fff !important; }
    .navbar-custom .navbar-brand i { color: #2ecc71; }
    .domain-badge {
      background: rgba(46,204,113,0.12);
      border: 1px solid rgba(46,204,113,0.15);
      border-radius: 30px;
      padding: 4px 14px;
      font-size: 0.65rem;
      color: #2ecc71;
    }
    
    .sidebar-toggle {
      background: rgba(46,204,113,0.12);
      border: 1px solid rgba(46,204,113,0.2);
      color: #2ecc71;
      padding: 8px 14px;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 1.2rem;
    }
    .sidebar-toggle:hover { background: rgba(46,204,113,0.2); }
    
    .sidebar-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(5px);
      z-index: 1060;
      display: none;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .sidebar-overlay.active { display: block; opacity: 1; }
    
    .sidebar-panel {
      position: fixed;
      top: 0;
      right: -320px;
      width: 300px;
      height: 100%;
      background: rgba(12,20,35,0.98);
      backdrop-filter: blur(20px);
      border-left: 1px solid rgba(46,204,113,0.15);
      z-index: 1070;
      transition: right 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      padding: 25px 0;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }
    .sidebar-panel.open { right: 0; }
    
    .sidebar-panel .sidebar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 20px 20px;
      border-bottom: 1px solid rgba(46,204,113,0.1);
      margin-bottom: 15px;
    }
    .sidebar-panel .sidebar-header h5 { color: #fff; font-weight: 700; margin: 0; font-size: 1.1rem; }
    .sidebar-panel .sidebar-header h5 i { color: #2ecc71; }
    .sidebar-close {
      background: rgba(255,255,255,0.08);
      border: none;
      color: #8899bb;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 1.2rem;
    }
    .sidebar-close:hover { background: rgba(255,255,255,0.15); color: #fff; }
    
    .sidebar-panel .nav-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 20px;
      color: #8899bb;
      text-decoration: none;
      transition: all 0.3s ease;
      margin: 2px 12px;
      border-radius: 12px;
      font-weight: 500;
      font-size: 0.95rem;
    }
    .sidebar-panel .nav-item:hover { background: rgba(46,204,113,0.08); color: #fff; }
    .sidebar-panel .nav-item.active { background: rgba(46,204,113,0.12); color: #2ecc71; }
    .sidebar-panel .nav-item i { font-size: 1.2rem; width: 28px; text-align: center; }
    .sidebar-panel .nav-item .badge {
      margin-left: auto;
      background: rgba(46,204,113,0.15);
      color: #2ecc71;
      font-weight: 600;
      font-size: 0.7rem;
      padding: 2px 10px;
      border-radius: 20px;
    }
    
    .sidebar-panel .sidebar-footer {
      margin-top: auto;
      padding: 20px;
      border-top: 1px solid rgba(46,204,113,0.08);
    }
    .sidebar-panel .sidebar-footer .nav-item { color: #f87171; }
    .sidebar-panel .sidebar-footer .nav-item:hover { background: rgba(239,68,68,0.08); color: #f87171; }
    
    .user-profile-sidebar {
      padding: 10px 20px 20px;
      border-bottom: 1px solid rgba(46,204,113,0.08);
      margin-bottom: 10px;
    }
    .user-profile-sidebar .avatar {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      background: linear-gradient(135deg, #2ecc71, #1a7a3a);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 1.2rem;
      color: #fff;
    }
    .user-profile-sidebar .user-name { color: #fff; font-weight: 600; font-size: 0.95rem; }
    .user-profile-sidebar .user-id { color: #8899bb; font-size: 0.75rem; }
    
    .dashboard-container { padding: 20px; max-width: 1400px; margin: 0 auto; }
    
    .card-glass {
      background: rgba(19,34,55,0.8);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(46,204,113,0.1);
      border-radius: 20px;
      padding: 1.5rem;
      transition: all 0.3s ease;
    }
    .card-glass:hover { border-color: rgba(46,204,113,0.3); transform: translateY(-3px); }
    .card-glass .card-title { font-size: 1rem; font-weight: 600; color: #fff; margin-bottom: 15px; }
    .card-glass .card-title i { color: #2ecc71; margin-right: 8px; }
    
    .form-control-custom {
      background: rgba(8,14,26,0.8) !important;
      border: 1px solid rgba(46,204,113,0.15) !important;
      color: #f0f4ff !important;
      padding: 12px 16px !important;
      border-radius: 12px !important;
      font-size: 0.95rem;
      transition: all 0.3s ease;
    }
    .form-control-custom:focus {
      border-color: #2ecc71 !important;
      box-shadow: 0 0 0 3px rgba(46,204,113,0.15) !important;
      background: rgba(8,14,26,0.9) !important;
    }
    .form-control-custom::placeholder { color: #556688 !important; }
    .form-label { font-weight: 600; color: #a0b8d0; font-size: 0.9rem; margin-bottom: 6px; }
    .form-label .required { color: #ef4444; }
    
    .btn-primary-custom {
      background: linear-gradient(135deg, #2ecc71, #27ae60);
      border: none;
      color: #fff;
      font-weight: 600;
      padding: 14px;
      border-radius: 12px;
      width: 100%;
      transition: all 0.3s ease;
      font-size: 1rem;
    }
    .btn-primary-custom:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(46,204,113,0.3); color: #fff; }
    .btn-primary-custom:disabled { opacity: 0.6; cursor: not-allowed; transform: none !important; }
    
    .btn-outline-custom {
      border: 2px solid rgba(46,204,113,0.3);
      color: #a0b8d0;
      padding: 10px 24px;
      border-radius: 12px;
      transition: all 0.3s ease;
      text-decoration: none;
      display: inline-block;
      font-weight: 500;
      background: transparent;
      font-size: 0.9rem;
    }
    .btn-outline-custom:hover { border-color: #2ecc71; color: #2ecc71; }
    
    .toast-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 9999;
      max-width: 400px;
    }
    .toast-custom {
      background: rgba(19,34,55,0.95);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(46,204,113,0.2);
      border-radius: 16px;
      padding: 16px 20px;
      color: #f0f4ff;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      gap: 12px;
      animation: slideIn 0.4s ease;
      margin-bottom: 10px;
    }
    .toast-custom.success { border-left: 4px solid #2ecc71; }
    .toast-custom.error { border-left: 4px solid #ef4444; }
    .toast-custom i { font-size: 1.5rem; }
    .toast-custom .toast-msg { flex: 1; font-size: 0.9rem; }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    
    @media (max-width: 768px) {
      .dashboard-container { padding: 15px; }
      .sidebar-panel { width: 280px; right: -300px; }
      .sidebar-panel .nav-item { padding: 10px 16px; font-size: 0.85rem; }
    }
    @media (max-width: 480px) { .sidebar-panel { width: 100%; right: -100%; } .sidebar-panel.open { right: 0; } }
  </style>
</head>
<body>

<div class="toast-container" id="toastContainer"></div>

<!-- ====== NAVBAR ====== -->
<nav class="navbar navbar-custom">
  <div class="container-fluid px-3">
    <a class="navbar-brand fw-bold" href="dashboard.html">
      <i class="bi bi-currency-bitcoin me-2"></i>RND Staking
      <span class="domain-badge ms-2">staking.randigital.in</span>
    </a>
    <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle Menu">
      <i class="bi bi-list"></i>
    </button>
  </div>
</nav>

<!-- ====== SIDEBAR OVERLAY ====== -->
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<!-- ====== SIDEBAR PANEL ====== -->
<div class="sidebar-panel" id="sidebarPanel">
  <div class="sidebar-header">
    <h5><i class="bi bi-grid-1x2-fill me-2"></i>Menu</h5>
    <button class="sidebar-close" id="sidebarClose"><i class="bi bi-x-lg"></i></button>
  </div>
  
  <div class="user-profile-sidebar">
    <div class="d-flex align-items-center gap-3">
      <div class="avatar" id="sidebarAvatar">U</div>
      <div>
        <div class="user-name" id="sidebarName">User</div>
        <div class="user-id" id="sidebarUserId">ID: ---</div>
      </div>
    </div>
  </div>
  
  <a href="dashboard.html" class="nav-item"><i class="bi bi-speedometer2"></i> Dashboard</a>
  <a href="deposit.html" class="nav-item"><i class="bi bi-arrow-down-circle"></i> Deposit</a>
  <a href="withdrawal.html" class="nav-item active"><i class="bi bi-arrow-up-circle"></i> Withdraw</a>
  <a href="referrals.html" class="nav-item"><i class="bi bi-people"></i> Referrals <span class="badge" id="referralBadge">0</span></a>
  <a href="buy-package.html" class="nav-item"><i class="bi bi-box-seam"></i> Buy Package</a>
  <a href="transactions.html" class="nav-item"><i class="bi bi-receipt"></i> Transactions</a>
  <a href="profile.html" class="nav-item"><i class="bi bi-person"></i> Profile</a>
  
  <div class="sidebar-footer">
    <a href="#" class="nav-item" id="logoutBtnSidebar"><i class="bi bi-box-arrow-right"></i> Logout</a>
  </div>
</div>

<!-- ====== WITHDRAWAL CONTENT ====== -->
<div class="dashboard-container" id="withdrawalContent">
  <div class="text-center py-5">
    <div class="spinner-border text-success" role="status" style="width: 3rem; height: 3rem;"></div>
    <p class="text-muted mt-3">Loading withdrawal page...</p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
<script type="importmap">
{
  "imports": {
    "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
    "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
    "firebase/database": "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"
  }
}
</script>
<script type="module">
import { initializeApp } from "firebase/app";
import { getAuth, onAuthStateChanged, signOut } from "firebase/auth";
import { getDatabase, ref, get, push, update } from "firebase/database";

const firebaseConfig = {
  apiKey: "AIzaSyAz-TLmOhiy-_vHHmIjW8gyIOqTR_PT9o0",
  authDomain: "rnd2-70080.firebaseapp.com",
  databaseURL: "https://rnd2-70080-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "rnd2-70080",
  storageBucket: "rnd2-70080.firebasestorage.app",
  messagingSenderId: "468625887938",
  appId: "1:468625887938:web:5cb4ddbcf31b6fc0a4615b",
  measurementId: "G-ELVJD5NQKB"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

function showToast(message, type = 'success') {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = `toast-custom ${type}`;
  const icon = type === 'success' ? 'bi-check-circle-fill text-success' : 'bi-exclamation-triangle-fill text-danger';
  toast.innerHTML = `<i class="bi ${icon}"></i><span class="toast-msg">${message}</span>`;
  container.appendChild(toast);
  setTimeout(() => {
    toast.style.opacity = '0';
    toast.style.transform = 'translateX(100%)';
    setTimeout(() => toast.remove(), 300);
  }, 5000);
}

const sidebarPanel = document.getElementById('sidebarPanel');
const sidebarOverlay = document.getElementById('sidebarOverlay');
const sidebarToggle = document.getElementById('sidebarToggle');
const sidebarClose = document.getElementById('sidebarClose');

function openSidebar() {
  sidebarPanel.classList.add('open');
  sidebarOverlay.classList.add('active');
  document.body.style.overflow = 'hidden';
}
function closeSidebar() {
  sidebarPanel.classList.remove('open');
  sidebarOverlay.classList.remove('active');
  document.body.style.overflow = '';
}
sidebarToggle.addEventListener('click', openSidebar);
sidebarClose.addEventListener('click', closeSidebar);
sidebarOverlay.addEventListener('click', closeSidebar);
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeSidebar(); });

document.getElementById('logoutBtnSidebar').addEventListener('click', async (e) => {
  e.preventDefault();
  await signOut(auth);
  window.location.href = 'login.html';
});

onAuthStateChanged(auth, async (user) => {
  if (!user) {
    window.location.href = 'login.html';
    return;
  }

  try {
    const userSnapshot = await get(ref(db, 'users/' + user.uid));
    if (!userSnapshot.exists()) {
      window.location.href = 'dashboard.html';
      return;
    }
    const userData = userSnapshot.val();
    
    const username = userData.username || userData.referralCode || 'USER';
    const name = userData.name || 'User';
    document.getElementById('sidebarName').textContent = name;
    document.getElementById('sidebarUserId').textContent = 'ID: ' + username;
    document.getElementById('sidebarAvatar').textContent = username.charAt(0).toUpperCase();
    
    const badge = document.getElementById('referralBadge');
    if (badge) badge.textContent = userData.totalReferrals || 0;

    const withdrawalsRef = ref(db, 'withdrawals');
    const withdrawalsSnap = await get(withdrawalsRef);
    let userWithdrawals = [];
    if (withdrawalsSnap.exists()) {
      const allData = withdrawalsSnap.val();
      for (let key in allData) {
        if (allData[key].uid === user.uid) {
          userWithdrawals.push({ id: key, ...allData[key] });
        }
      }
      userWithdrawals.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
    }

    const depositWallet = userData.depositWallet || 0;
    const withdrawalWallet = userData.withdrawalWallet || 0;
    const releaseWallet = userData.releaseWallet || 0;

    document.getElementById('withdrawalContent').innerHTML = `
      <div class="row g-4">
        <div class="col-12">
          <h4 class="fw-bold"><i class="bi bi-arrow-up-circle text-success me-2"></i>Withdraw Funds</h4>
          <hr class="border-secondary">
        </div>

        <div class="col-12">
          <div class="card-glass">
            <div class="row g-3">
              <div class="col-md-4">
                <div class="text-center p-3" style="background:rgba(46,204,113,0.05);border-radius:12px;border:1px solid rgba(46,204,113,0.1);">
                  <small class="text-muted">Deposit Wallet (USDT)</small>
                  <h4 class="text-success">$${depositWallet.toFixed(2)}</h4>
                </div>
              </div>
              <div class="col-md-4">
                <div class="text-center p-3" style="background:rgba(251,191,36,0.05);border-radius:12px;border:1px solid rgba(251,191,36,0.1);">
                  <small class="text-muted">Withdrawal Wallet (RND)</small>
                  <h4 style="color:#fbbf24;">${withdrawalWallet.toFixed(2)} RND</h4>
                </div>
              </div>
              <div class="col-md-4">
                <div class="text-center p-3" style="background:rgba(59,130,246,0.05);border-radius:12px;border:1px solid rgba(59,130,246,0.1);">
                  <small class="text-muted">Release Wallet (RND)</small>
                  <h4 style="color:#60a5fa;">${releaseWallet.toFixed(2)} RND</h4>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="col-lg-7 mx-auto">
          <div class="card-glass">
            <div class="card-title"><i class="bi bi-arrow-up-circle text-success me-2"></i>Request Withdrawal</div>
            
            <div class="alert alert-warning" style="background:rgba(251,191,36,0.08);border:1px solid rgba(251,191,36,0.15);color:#fbbf24;border-radius:12px;">
              <small><i class="bi bi-info-circle me-1"></i> Minimum withdrawal: 10 USDT. All withdrawals are manually processed.</small>
            </div>

            <form id="withdrawForm">
              <div class="mb-3">
                <label class="form-label">Withdraw From <span class="required">*</span></label>
                <select id="withdrawWallet" class="form-select form-control-custom">
                  <option value="depositWallet">💰 Deposit Wallet (USDT)</option>
                  <option value="withdrawalWallet">💳 Withdrawal Wallet (RND)</option>
                  <option value="releaseWallet">⏳ Release Wallet (RND)</option>
                </select>
              </div>
              <div class="mb-3">
                <label class="form-label">Amount <span class="required">*</span></label>
                <input type="number" id="withAmount" class="form-control form-control-custom" placeholder="Enter amount (min 10)" min="10" step="0.01" required>
                <small class="text-muted" style="font-size:0.7rem;">Minimum: 10 USDT / RND</small>
              </div>
              <div class="mb-3">
                <label class="form-label">Wallet Address (BEP20) <span class="required">*</span></label>
                <input type="text" id="withAddr" class="form-control form-control-custom" placeholder="0x..." required>
                <small class="text-muted" style="font-size:0.7rem;">Enter your USDT (BEP20) wallet address</small>
              </div>
              <button type="submit" class="btn-primary-custom" id="withdrawBtn">
                <i class="bi bi-arrow-up-circle me-2"></i>Submit Withdrawal
              </button>
            </form>

            <div class="mt-3">
              <a href="dashboard.html" class="btn-outline-custom w-100 text-center"><i class="bi bi-arrow-left me-1"></i> Back to Dashboard</a>
            </div>
          </div>
        </div>

        <div class="col-lg-7 mx-auto">
          <div class="card-glass">
            <div class="card-title"><i class="bi bi-clock-history text-success me-2"></i>Withdrawal History</div>
            ${userWithdrawals.length === 0 ? `
              <div class="text-center text-muted py-4">
                <i class="bi bi-inbox fs-1 d-block mb-2"></i>
                <p>No withdrawal requests yet.</p>
              </div>
            ` : `
              <div style="max-height:300px;overflow-y:auto;">
                ${userWithdrawals.map((w) => {
                  let statusHtml = '';
                  if (w.status === 'pending') statusHtml = '<span class="text-warning"><i class="bi bi-clock me-1"></i>Pending</span>';
                  else if (w.status === 'approved') statusHtml = '<span class="text-success"><i class="bi bi-check-circle me-1"></i>Approved</span>';
                  else if (w.status === 'rejected') statusHtml = '<span class="text-danger"><i class="bi bi-x-circle me-1"></i>Rejected</span>';
                  else statusHtml = '<span class="text-warning">Pending</span>';
                  return `
                    <div style="background:rgba(8,14,26,0.4);border-radius:12px;padding:10px 14px;border:1px solid rgba(46,204,113,0.06);margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;">
                      <div>
                        <span style="font-weight:700;color:#2ecc71;">${w.amount} ${w.currency || 'USDT'}</span>
                        <div style="color:#556688;font-size:0.65rem;">${new Date(w.timestamp).toLocaleString('hi-IN')}</div>
                        ${w.wallet ? `<div style="font-size:0.6rem;color:#556688;font-family:monospace;">${w.wallet.substring(0,15)}...</div>` : ''}
                      </div>
                      <div>${statusHtml}</div>
                    </div>
                  `;
                }).join('')}
              </div>
            `}
          </div>
        </div>
      </div>
    `;

    document.getElementById('withdrawForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const walletType = document.getElementById('withdrawWallet').value;
      const amount = parseFloat(document.getElementById('withAmount').value);
      const address = document.getElementById('withAddr').value.trim();
      const btn = document.getElementById('withdrawBtn');

      if (!amount || amount < 10) { showToast('❌ Minimum withdrawal is 10!', 'error'); return; }
      if (!address || !address.startsWith('0x') || address.length < 10) {
        showToast('❌ Please enter a valid BEP20 wallet address starting with 0x', 'error');
        return;
      }

      const userSnap = await get(ref(db, 'users/' + user.uid));
      const userData = userSnap.val();
      const balance = userData[walletType] || 0;
      
      if (balance < amount) {
        const label = walletType === 'depositWallet' ? 'Deposit Wallet' : walletType === 'withdrawalWallet' ? 'Withdrawal Wallet' : 'Release Wallet';
        showToast(`❌ Insufficient balance in ${label}! You have ${balance.toFixed(2)}`, 'error');
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Processing...';

      try {
        await update(ref(db, 'users/' + user.uid), {
          [walletType]: balance - amount
        });

        await push(ref(db, 'withdrawals'), {
          uid: user.uid,
          amount: amount,
          currency: walletType === 'depositWallet' ? 'USDT' : 'RND',
          wallet: address,
          status: 'pending',
          timestamp: Date.now()
        });

        showToast('✅ Withdrawal request submitted successfully! Waiting for admin approval.', 'success');
        document.getElementById('withAmount').value = '';
        document.getElementById('withAddr').value = '';
        setTimeout(() => { window.location.reload(); }, 1500);

      } catch (error) {
        console.error('Withdrawal error:', error);
        showToast('❌ Error submitting withdrawal. Please try again.', 'error');
      }

      btn.disabled = false;
      btn.innerHTML = '<i class="bi bi-arrow-up-circle me-2"></i>Submit Withdrawal';
    });

  } catch (error) {
    console.error('Error loading withdrawal page:', error);
    document.getElementById('withdrawalContent').innerHTML = `
      <div class="text-center py-5">
        <i class="bi bi-exclamation-triangle text-danger fs-1 d-block mb-3"></i>
        <h4>Error Loading Page</h4>
        <p class="text-muted">${error.message || 'Please check your internet connection.'}</p>
        <button class="btn btn-primary-custom mt-3" onclick="location.reload()">Refresh</button>
      </div>
    `;
  }
});
</script>
</body>
</html>
