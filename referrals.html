<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Referrals - RND Staking</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    * { font-family: 'Segoe UI', sans-serif; }
    body { background: #0b1120; color: #f0f4ff; }
    .navbar-custom { background: #0f1a2e; border-bottom: 1px solid #1f334f; }
    .card-dark { background: #132237; border: 1px solid #2a3a5a; border-radius: 24px; padding: 1.5rem; }
    .text-green { color: #2ecc71; }
    .btn-primary-custom { background: #2ecc71; border: none; color: #0b1120; font-weight: 600; }
    .btn-primary-custom:hover { background: #27ae60; color: #fff; }
    .referral-box { background: #0b1120; border-radius: 16px; padding: 1rem; border: 1px dashed #2a3a5a; }
    .copy-btn { cursor: pointer; }
    .table-custom { color: #f0f4ff; border-color: #1f334f; }
    .table-custom th { border-bottom: 2px solid #2a3a5a; color: #a0b8d0; }
    .table-custom td { border-color: #1f334f; }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-custom py-3">
    <div class="container">
      <a class="navbar-brand text-white fw-bold" href="dashboard.html"><i class="bi bi-currency-bitcoin text-green me-2"></i>RND Staking</a>
      <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link text-light" href="dashboard.html"><i class="bi bi-speedometer2 me-1"></i>Dashboard</a></li>
          <li class="nav-item"><a class="nav-link text-light" href="deposit.html"><i class="bi bi-arrow-down-circle me-1"></i>Deposit</a></li>
          <li class="nav-item"><a class="nav-link text-light" href="withdrawal.html"><i class="bi bi-arrow-up-circle me-1"></i>Withdraw</a></li>
          <li class="nav-item"><a class="nav-link text-light active" href="referrals.html"><i class="bi bi-people me-1"></i>Referrals</a></li>
          <li class="nav-item"><a class="nav-link text-light" href="#" id="logoutBtn"><i class="bi bi-box-arrow-right me-1"></i>Logout</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container py-4" id="referralContent">
    <div class="text-center text-muted">Loading referral data...</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
  <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
        "firebase/database": "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"
      }
    }
  </script>
  <script type="module">
    import { initializeApp } from 'firebase/app';
    import { getAuth, onAuthStateChanged, signOut } from 'firebase/auth';
    import { getDatabase, ref, get, query, orderByChild, equalTo } from 'firebase/database';

    const firebaseConfig = {
      apiKey: "AIzaSyDummyKeyReplaceWithYourOwn",
      authDomain: "rnd-staking.firebaseapp.com",
      databaseURL: "https://rnd-staking-default-rtdb.firebaseio.com",
      projectId: "rnd-staking",
      storageBucket: "rnd-staking.appspot.com",
      messagingSenderId: "1234567890",
      appId: "1:1234567890:web:abcdef123456"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await signOut(auth);
      window.location.href = 'login.html';
    });

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = 'login.html';
        return;
      }

      const userSnapshot = await get(ref(db, 'users/' + user.uid));
      if (!userSnapshot.exists()) return;
      const userData = userSnapshot.val();

      // Get all users to find referrals
      const allUsersSnapshot = await get(ref(db, 'users'));
      let referrals = [];
      if (allUsersSnapshot.exists()) {
        const allUsers = allUsersSnapshot.val();
        for (let key in allUsers) {
          if (allUsers[key].referredBy === userData.referralCode) {
            referrals.push(allUsers[key]);
          }
        }
      }

      // Render
      document.getElementById('referralContent').innerHTML = `
        <div class="row">
          <div class="col-12">
            <h4><i class="bi bi-people text-green me-2"></i>Referral Program</h4>
            <hr class="border-secondary">
          </div>
          <div class="col-md-6">
            <div class="card-dark">
              <h5>Your Referral Link</h5>
              <div class="referral-box d-flex flex-wrap align-items-center gap-2">
                <code class="text-light bg-dark p-2 rounded flex-grow-1">https://randigital.in/register.html?ref=${userData.referralCode}</code>
                <button class="btn btn-sm btn-primary-custom copy-btn" data-copy="https://randigital.in/register.html?ref=${userData.referralCode}"><i class="bi bi-clipboard"></i> Copy</button>
              </div>
            </div>
          </div>
          <div class="col-md-6">
            <div class="card-dark">
              <h5>Commission Structure</h5>
              <div class="row g-2">
                <div class="col-6"><small>Level 1 (8%)</small></div>
                <div class="col-6"><small>Level 2 (4%)</small></div>
                <div class="col-6"><small>Level 3 (2%)</small></div>
                <div class="col-6"><small>Level 4 (1%)</small></div>
                <div class="col-6"><small>Level 5 (1%)</small></div>
                <div class="col-6"><strong class="text-green">Total 16%</strong></div>
              </div>
            </div>
          </div>
          <div class="col-12 mt-4">
            <div class="card-dark">
              <h5>Your Referrals (${referrals.length})</h5>
              ${referrals.length === 0 ? '<p class="text-muted">No referrals yet.</p>' : `
                <div class="table-responsive">
                  <table class="table table-custom">
                    <thead><tr><th>Name</th><th>Email</th><th>Joined</th></tr></thead>
                    <tbody>
                      ${referrals.map(r => `
                        <tr><td>${r.name || 'N/A'}</td><td>${r.email || 'N/A'}</td><td>${new Date(r.createdAt).toLocaleDateString()}</td></tr>
                      `).join('')}
                    </tbody>
                  </table>
                </div>
              `}
            </div>
          </div>
        </div>
      `;

      document.querySelectorAll('.copy-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          navigator.clipboard.writeText(btn.dataset.copy).then(() => alert('Link copied!'));
        });
      });
    });
  </script>
</body>
</html>
