<html lang="en">
<head>
  <meta charset="UTF-8">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Inter', sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #080e1a; color: #f0f4ff; min-height: 100vh; }
    
    .navbar-custom {
      background: rgba(8,14,26,0.95);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(46,204,113,0.15);
      padding: 10px 0;
      position: sticky;
      top: 0;
      z-index: 1050;

    .navbar-custom .navbar-brand { font-weight: 800; font-size: 1.2rem; color: #fff !important; }
    .navbar-custom .navbar-brand i { color: #2ecc71; }
    
    .sidebar-toggle {
      background: rgba(46,204,113,0.12);
      border: 1px solid rgba(46,204,113,0.2);
      color: #2ecc71;
      padding: 8px 14px;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 1.2rem;
    }
    .sidebar-toggle:hover { background: rgba(46,204,113,0.2); }
    
    .sidebar-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(5px);
      z-index: 1060;
      display: none;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .sidebar-overlay.active { display: block; opacity: 1; }
    
    .sidebar-panel {
      position: fixed;
      top: 0;
      right: -320px;
      width: 300px;
      height: 100%;
      background: rgba(12,20,35,0.98);
      backdrop-filter: blur(20px);
      border-left: 1px solid rgba(46,204,113,0.15);
      z-index: 1070;

      padding: 25px 0;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }
    .sidebar-panel.open { right: 0; }
    
    .sidebar-panel .sidebar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 20px 20px;
      border-bottom: 1px solid rgba(46,204,113,0.1);
      margin-bottom: 15px;
    }
    .sidebar-panel .sidebar-header h5 { color: #fff; font-weight: 700; margin: 0; font-size: 1.1rem; }
    .sidebar-panel .sidebar-header h5 i { color: #2ecc71; }
    .sidebar-close {
      background: rgba(255,255,255,0.08);
      border: none;
      color: #8899bb;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 1.2rem;
    }
    .sidebar-close:hover { background: rgba(255,255,255,0.15); color: #fff; }
    
    .sidebar-panel .nav-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 20px;
      color: #8899bb;
      text-decoration: none;
      transition: all 0.3s ease;
      margin: 2px 12px;
      border-radius: 12px;
      font-weight: 500;
      font-size: 0.95rem;
    }
    .sidebar-panel .nav-item:hover { background: rgba(46,204,113,0.08); color: #fff; }
    .sidebar-panel .nav-item.active { background: rgba(46,204,113,0.12); color: #2ecc71; }
    .sidebar-panel .nav-item i { font-size: 1.2rem; width: 28px; text-align: center; }
    .sidebar-panel .nav-item .badge {
      margin-left: auto;
      background: rgba(46,204,113,0.15);
      color: #2ecc71;
      font-weight: 600;
      font-size: 0.7rem;
      padding: 2px 10px;
      border-radius: 20px;
    }
    
    .sidebar-panel .sidebar-footer {
      margin-top: auto;
      padding: 20px;
      border-top: 1px solid rgba(46,204,113,0.08);
    }
    .sidebar-panel .sidebar-footer .nav-item { color: #f87171; }
    .sidebar-panel .sidebar-footer .nav-item:hover { background: rgba(239,68,68,0.08); color: #f87171; }
    
    .user-profile-sidebar {
      padding: 10px 20px 20px;
      border-bottom: 1px solid rgba(46,204,113,0.08);
      margin-bottom: 10px;
    }
    .user-profile-sidebar .avatar {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      background: linear-gradient(135deg, #2ecc71, #1a7a3a);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 1.2rem;
      color: #fff;
    }
    .user-profile-sidebar .user-name { color: #fff; font-weight: 600; font-size: 0.95rem; }
    .user-profile-sidebar .user-id { color: #8899bb; font-size: 0.75rem; }
    
    .dashboard-container { padding: 20px; max-width: 1400px; margin: 0 auto; }
    
    .card-glass {
      background: rgba(19,34,55,0.8);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(46,204,113,0.1);
      border-radius: 20px;
      padding: 1.5rem;
      transition: all 0.3s ease;
    }
    .card-glass:hover { border-color: rgba(46,204,113,0.3); transform: translateY(-3px); }
    .card-glass .card-title { font-size: 1rem; font-weight: 600; color: #fff; margin-bottom: 15px; }
    .card-glass .card-title i { color: #2ecc71; margin-right: 8px; }
    
    .referral-box {
      background: rgba(8,14,26,0.6);
      border-radius: 12px;
      padding: 0.8rem 1rem;
      border: 1px dashed rgba(46,204,113,0.2);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
    }
    .referral-box code { color: #a0b8d0; font-size: 0.8rem; word-break: break-all; flex: 1; }
    .copy-btn {
      cursor: pointer;
      padding: 4px 14px;
      border-radius: 8px;
      border: 1px solid rgba(46,204,113,0.2);
      background: transparent;
      color: #a0b8d0;
      transition: all 0.3s ease;
      font-size: 0.8rem;
    }
    .copy-btn:hover { background: rgba(46,204,113,0.1); color: #2ecc71; }
    
    .table-custom { color: #f0f4ff; border-color: #1f334f; }
    .table-custom th { border-bottom: 2px solid #2a3a5a; color: #a0b8d0; }
    .table-custom td { border-color: #1f334f; }
    
    .btn-primary-custom {
      background: linear-gradient(135deg, #2ecc71, #27ae60);
      border: none;
      color: #fff;
      font-weight: 600;
      padding: 10px 24px;
      border-radius: 12px;
      transition: all 0.3s ease;
      text-decoration: none;
      display: inline-block;
      font-size: 0.9rem;
    }
    .btn-primary-custom:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(46,204,113,0.3); color: #fff; }
    
    .toast-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 9999;
      max-width: 400px;
    }
    .toast-custom {
      background: rgba(19,34,55,0.95);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(46,204,113,0.2);
      border-radius: 16px;
      padding: 16px 20px;
      color: #f0f4ff;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      gap: 12px;
      animation: slideIn 0.4s ease;
      margin-bottom: 10px;
    }
    .toast-custom.success { border-left: 4px solid #2ecc71; }
    .toast-custom.error { border-left: 4px solid #ef4444; }
    .toast-custom i { font-size: 1.5rem; }
    .toast-custom .toast-msg { flex: 1; font-size: 0.9rem; }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    
    .earnings-box {
      background: rgba(251,191,36,0.05);
      border: 1px solid rgba(251,191,36,0.15);
      border-radius: 12px;
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
    }
    .earnings-box .label { color: #8899bb; font-size: 0.85rem; }
    .earnings-box .value { color: #fbbf24; font-weight: 700; font-size: 1.1rem; }
    
    @media (max-width: 768px) {
      .dashboard-container { padding: 15px; }
      .sidebar-panel { width: 280px; right: -300px; }
      .sidebar-panel .nav-item { padding: 10px 16px; font-size: 0.85rem; }
    }
    @media (max-width: 480px) { .sidebar-panel { width: 100%; right: -100%; } .sidebar-panel.open { right: 0; } }
  </style>
</head>
<body>

<div class="toast-container" id="toastContainer"></div>

<!-- ====== NAVBAR ====== -->
<nav class="navbar navbar-custom">
  <div class="container-fluid px-3">
    <a class="navbar-brand fw-bold" href="dashboard.html">
      <i class="bi bi-currency-bitcoin me-2"></i>RND Staking
    </a>
    <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle Menu">
      <i class="bi bi-list"></i>
    </button>
  </div>
</nav>

<!-- ====== SIDEBAR OVERLAY ====== -->
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<!-- ====== SIDEBAR PANEL ====== -->
<div class="sidebar-panel" id="sidebarPanel">
  <div class="sidebar-header">
    <h5><i class="bi bi-grid-1x2-fill me-2"></i>Menu</h5>
    <button class="sidebar-close" id="sidebarClose"><i class="bi bi-x-lg"></i></button>
  </div>
  
  <div class="user-profile-sidebar">
    <div class="d-flex align-items-center gap-3">
      <div class="avatar" id="sidebarAvatar">U</div>
      <div>
        <div class="user-name" id="sidebarName">User</div>
        <div class="user-id" id="sidebarUserId">ID: ---</div>
      </div>
    </div>
  </div>
  
  <a href="dashboard.html" class="nav-item"><i class="bi bi-speedometer2"></i> Dashboard</a>
  <a href="deposit.html" class="nav-item"><i class="bi bi-arrow-down-circle"></i> Deposit</a>
  <a href="withdrawal.html" class="nav-item"><i class="bi bi-arrow-up-circle"></i> Withdraw</a>
  <a href="referrals.html" class="nav-item active"><i class="bi bi-people"></i> Referrals <span class="badge" id="referralBadge">0</span></a>
  <a href="buy-package.html" class="nav-item"><i class="bi bi-box-seam"></i> Buy Package</a>
  <a href="transactions.html" class="nav-item"><i class="bi bi-receipt"></i> Transactions</a>

  <div class="sidebar-footer">
    <a href="#" class="nav-item" id="logoutBtnSidebar"><i class="bi bi-box-arrow-right"></i> Logout</a>
  </div>
</div>

<!-- ====== REFERRAL CONTENT ====== -->
<div class="dashboard-container" id="referralContent">
  <div class="text-center py-5">
    <div class="spinner-border text-success" role="status" style="width: 3rem; height: 3rem;"></div>
    <p class="text-muted mt-3">Loading referral data...</p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
<script type="importmap">
{
  "imports": {
    "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
    "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
    "firebase/database": "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"
  }
}
</script>
<script type="module">
import { initializeApp } from "firebase/app";
import { getAuth, onAuthStateChanged, signOut } from "firebase/auth";
import { getDatabase, ref, get } from "firebase/database";

const firebaseConfig = {
  apiKey: "AIzaSyAz-TLmOhiy-_vHHmIjW8gyIOqTR_PT9o0",
  authDomain: "rnd2-70080.firebaseapp.com",
  databaseURL: "https://rnd2-70080-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "rnd2-70080",
  storageBucket: "rnd2-70080.firebasestorage.app",
  messagingSenderId: "468625887938",
  appId: "1:468625887938:web:5cb4ddbcf31b6fc0a4615b",
  measurementId: "G-ELVJD5NQKB"
};

const DOMAIN = "https://staking.randigital.in";
const REGISTER_URL = `${DOMAIN}/register.html`;

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

function showToast(message, type = 'success') {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = `toast-custom ${type}`;
  const icon = type === 'success' ? 'bi-check-circle-fill text-success' : 'bi-exclamation-triangle-fill text-danger';
  toast.innerHTML = `<i class="bi ${icon}"></i><span class="toast-msg">${message}</span>`;
  container.appendChild(toast);
  setTimeout(() => {
    toast.style.opacity = '0';
    toast.style.transform = 'translateX(100%)';
    setTimeout(() => toast.remove(), 300);
  }, 5000);
}

const sidebarPanel = document.getElementById('sidebarPanel');
const sidebarOverlay = document.getElementById('sidebarOverlay');
const sidebarToggle = document.getElementById('sidebarToggle');
const sidebarClose = document.getElementById('sidebarClose');

function openSidebar() {
  sidebarPanel.classList.add('open');
  sidebarOverlay.classList.add('active');
  document.body.style.overflow = 'hidden';
}
function closeSidebar() {
  sidebarPanel.classList.remove('open');
  sidebarOverlay.classList.remove('active');
  document.body.style.overflow = '';
}
sidebarToggle.addEventListener('click', openSidebar);
sidebarClose.addEventListener('click', closeSidebar);
sidebarOverlay.addEventListener('click', closeSidebar);
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeSidebar(); });

document.getElementById('logoutBtnSidebar').addEventListener('click', async (e) => {
  e.preventDefault();
  await signOut(auth);
  window.location.href = 'login.html';
});

// ============================================================
// 🔥 GET SUB-REFERRALS
// ============================================================
async function getSubReferrals(referralCode) {
  try {
    const allUsersSnapshot = await get(ref(db, 'users'));
    let referrals = [];
    if (allUsersSnapshot.exists()) {
      const allUsers = allUsersSnapshot.val();
      for (let key in allUsers) {
        if (allUsers[key].referredBy === referralCode) {
          referrals.push(allUsers[key]);
        }
      }
    }
    return referrals;
  } catch (error) {
    return [];
  }
}

// ============================================================
// 🔥 CALCULATE REFERRAL EARNINGS
// ============================================================
async function calculateReferralEarnings(userData) {
  try {
    const allUsersSnapshot = await get(ref(db, 'users'));
    let directReferrals = [];
    let downlineReferrals = [];
    let directEarnings = 0;
    let downlineEarnings = 0;
    let totalDirectStake = 0;
    let totalDownlineStake = 0;
    
    if (allUsersSnapshot.exists()) {
      const allUsers = allUsersSnapshot.val();
      const referralCode = userData.referralCode || userData.username;
      
      for (let key in allUsers) {
        const u = allUsers[key];
        if (u.referredBy === referralCode) {
          directReferrals.push(u);
          const stake = u.totalStake || 0;
          totalDirectStake += stake;
          directEarnings += (stake * 0.08);
          
          // Get downline
          const subRefs = await getSubReferrals(u.referralCode || u.username);
          subRefs.forEach(sr => {
            const srStake = sr.totalStake || 0;
            totalDownlineStake += srStake;
            downlineEarnings += (srStake * 0.04);
          });
          downlineReferrals = downlineReferrals.concat(subRefs);
        }
      }
    }
    
    return {
      directReferrals,
      downlineReferrals,
      directCount: directReferrals.length,
      downlineCount: downlineReferrals.length,
      directEarnings: directEarnings,
      downlineEarnings: downlineEarnings,
      totalEarnings: directEarnings + downlineEarnings,
      totalDirectStake: totalDirectStake,
      totalDownlineStake: totalDownlineStake
    };
  } catch (error) {
    console.error('Error calculating referral earnings:', error);
    return { directReferrals: [], downlineReferrals: [], directCount: 0, downlineCount: 0, directEarnings: 0, downlineEarnings: 0, totalEarnings: 0, totalDirectStake: 0, totalDownlineStake: 0 };
  }
}

onAuthStateChanged(auth, async (user) => {
  if (!user) {
    window.location.href = 'login.html';
    return;
  }

  try {
    const userSnapshot = await get(ref(db, 'users/' + user.uid));
    if (!userSnapshot.exists()) {
      window.location.href = 'dashboard.html';
      return;
    }
    const userData = userSnapshot.val();
    
    const username = userData.username || userData.referralCode || 'USER';
    const name = userData.name || 'User';
    document.getElementById('sidebarName').textContent = name;
    document.getElementById('sidebarUserId').textContent = 'ID: ' + username;
    document.getElementById('sidebarAvatar').textContent = username.charAt(0).toUpperCase();
    
    // Calculate referral earnings
    const referralData = await calculateReferralEarnings(userData);
    
    const badge = document.getElementById('referralBadge');
    if (badge) badge.textContent = referralData.directCount;

    const referralLink = `${REGISTER_URL}?ref=${userData.referralCode}`;

    document.getElementById('referralContent').innerHTML = `
      <div class="row g-4">
        <div class="col-12">
          <h4 class="fw-bold"><i class="bi bi-people text-success me-2"></i>Referral Program</h4>
          <hr class="border-secondary">
        </div>
        
        <div class="col-md-6">
          <div class="card-glass">
            <div class="card-title"><i class="bi bi-link-45deg"></i>Your Referral Link</div>
            <div class="referral-box">
              <code>${referralLink}</code>
              <button class="copy-btn" data-copy="${referralLink}"><i class="bi bi-clipboard me-1"></i>Copy</button>
            </div>
          </div>
        </div>
        
        <div class="col-md-6">
          <div class="card-glass">
            <div class="card-title"><i class="bi bi-diagram-3"></i>Commission Structure</div>
            <div class="row g-2">
              <div class="col-6"><small>Level 1 (8%)</small></div>
              <div class="col-6"><small>Level 2 (4%)</small></div>
              <div class="col-6"><small>Level 3 (2%)</small></div>
              <div class="col-6"><small>Level 4 (1%)</small></div>
              <div class="col-6"><small>Level 5 (1%)</small></div>
              <div class="col-6"><strong class="text-success">Total 16%</strong></div>
            </div>
          </div>
        </div>
        
        <!-- Earnings Summary -->
        <div class="col-12">
          <div class="card-glass">
            <div class="card-title"><i class="bi bi-cash-stack text-success me-2"></i>Referral Earnings</div>
            <div class="row g-3">
              <div class="col-md-4">
                <div class="earnings-box">
                  <span class="label">👥 Direct Referrals</span>
                  <span class="value">${referralData.directCount}</span>
                </div>
              </div>
              <div class="col-md-4">
                <div class="earnings-box">
                  <span class="label">💰 Direct Earnings (8%)</span>
                  <span class="value">$${(referralData.directEarnings || 0).toFixed(2)}</span>
                </div>
              </div>
              <div class="col-md-4">
                <div class="earnings-box">
                  <span class="label">📊 Direct Stake</span>
                  <span class="value">$${(referralData.totalDirectStake || 0).toFixed(2)}</span>
                </div>
              </div>
              <div class="col-md-4">
                <div class="earnings-box" style="border-color:rgba(167,139,250,0.15);">
                  <span class="label">👥 Downline</span>
                  <span class="value" style="color:#a78bfa;">${referralData.downlineCount}</span>
                </div>
              </div>
              <div class="col-md-4">
                <div class="earnings-box" style="border-color:rgba(167,139,250,0.15);">
                  <span class="label">💰 Downline Earnings (4%)</span>
                  <span class="value" style="color:#a78bfa;">$${(referralData.downlineEarnings || 0).toFixed(2)}</span>
                </div>
              </div>
              <div class="col-md-4">
                <div class="earnings-box" style="border-color:rgba(167,139,250,0.15);">
                  <span class="label">📊 Downline Stake</span>
                  <span class="value" style="color:#a78bfa;">$${(referralData.totalDownlineStake || 0).toFixed(2)}</span>
                </div>
              </div>
            </div>
            <div class="mt-3 p-3" style="background:rgba(46,204,113,0.05);border-radius:12px;border:1px solid rgba(46,204,113,0.1);">
              <div class="d-flex justify-content-between align-items-center">
                <span class="text-muted">🏆 Total Referral Earnings</span>
                <span style="font-size:1.5rem;font-weight:800;color:#fbbf24;">$${(referralData.totalEarnings || 0).toFixed(2)}</span>
              </div>
            </div>
          </div>
        </div>
        
        <!-- Referral List -->
        <div class="col-12">
          <div class="card-glass">
            <div class="card-title"><i class="bi bi-list-ul"></i>Your Referrals (${referralData.directCount})</div>
            ${referralData.directCount === 0 ? `
              <div class="text-center text-muted py-4">
                <i class="bi bi-people fs-1 d-block mb-2"></i>
                <p>No referrals yet. Share your referral link to earn!</p>
              </div>
            ` : `
              <div class="table-responsive">
                <table class="table table-custom">
                  <thead>
                    <tr>
                      <th>#</th>
                      <th>Name</th>
                      <th>Email</th>
                      <th>Joined</th>
                      <th>Stake</th>
                      <th>Your Earnings (8%)</th>
                    </tr>
                  </thead>
                  <tbody>
                    ${referralData.directReferrals.map((r, i) => `
                      <tr>
                        <td>${i + 1}</td>
                        <td>${r.name || 'N/A'}</td>
                        <td>${r.email || 'N/A'}</td>
                        <td>${new Date(r.createdAt).toLocaleDateString('hi-IN')}</td>
                        <td>$${(r.totalStake || 0).toFixed(2)}</td>
                        <td style="color:#fbbf24;">$${((r.totalStake || 0) * 0.08).toFixed(2)}</td>
                      </tr>
                    `).join('')}
                  </tbody>
                </table>
              </div>
            `}
          </div>
        </div>
        
        <!-- Downline List -->
        ${referralData.downlineCount > 0 ? `
        <div class="col-12">
          <div class="card-glass">
            <div class="card-title"><i class="bi bi-diagram-3 text-success me-2"></i>Your Downline (${referralData.downlineCount})</div>
            <div class="table-responsive">
              <table class="table table-custom">
                <thead>
                  <tr>
                    <th>#</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Joined</th>
                    <th>Stake</th>
                    <th>Your Earnings (4%)</th>
                  </tr>
                </thead>
                <tbody>
                  ${referralData.downlineReferrals.map((r, i) => `
                    <tr>
                      <td>${i + 1}</td>
                      <td>${r.name || 'N/A'}</td>
                      <td>${r.email || 'N/A'}</td>
                      <td>${new Date(r.createdAt).toLocaleDateString('hi-IN')}</td>
                      <td>$${(r.totalStake || 0).toFixed(2)}</td>
                      <td style="color:#a78bfa;">$${((r.totalStake || 0) * 0.04).toFixed(2)}</td>
                    </tr>
                  `).join('')}
                </tbody>
              </table>
            </div>
          </div>
        </div>
        ` : ''}
      </div>
    `;

    document.querySelectorAll('.copy-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        navigator.clipboard.writeText(btn.dataset.copy).then(() => {
          btn.innerHTML = '<i class="bi bi-check-circle me-1"></i>Copied!';
          setTimeout(() => { btn.innerHTML = '<i class="bi bi-clipboard me-1"></i>Copy'; }, 2000);
        });
      });
    });

  } catch (error) {
    console.error('Error loading referrals:', error);
    document.getElementById('referralContent').innerHTML = `
      <div class="text-center py-5">
        <i class="bi bi-exclamation-triangle text-danger fs-1 d-block mb-3"></i>
        <h4>Error Loading Page</h4>
        <p class="text-muted">${error.message || 'Please check your internet connection.'}</p>
        <button class="btn btn-primary-custom mt-3" onclick="location.reload()">Refresh</button>
      </div>
    `;
  }
});
</script>
</body>
</html>
