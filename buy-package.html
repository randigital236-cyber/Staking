// ============================================================
// 🔥 स्टेकिंग कैलकुलेशन
// ============================================================
function calculateStaking(usdtAmount, rndPrice, plan) {
    if (!usdtAmount || usdtAmount <= 0 || !rndPrice || rndPrice <= 0) {
        return {
            baseRND: 0,
            bonusRND: 0,
            totalRND: 0,
            dailyRelease: 0,
            bonusPercent: plan ? plan.reward : 0
        };
    }
    const baseRND = usdtAmount / rndPrice;
    const bonusRND = baseRND * (plan.reward / 100);
    const totalRND = baseRND + bonusRND;
    const dailyRelease = totalRND / plan.duration;
    return {
        baseRND,
        bonusRND,
        totalRND,
        dailyRelease,
        bonusPercent: plan.reward
    };
}

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);
let rndPrice = 1.00;

function showToast(message, type = 'success') {
    const container = document.getElementById('toastContainer');
    const toast = document.createElement('div');
    toast.className = `toast-custom ${type}`;
    const icon = type === 'success' ? 'bi-check-circle-fill text-success' : 'bi-exclamation-triangle-fill text-danger';
    toast.innerHTML = `<i class="bi ${icon}"></i><span class="toast-msg">${message}</span>`;
    container.appendChild(toast);
    setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateX(100%)';
        setTimeout(() => toast.remove(), 300);
    }, 5000);
}

    sidebarOverlay.classList.add('active');

async function getUserData(uid) {
    const snap = await get(ref(db, 'users/' + uid));
    return snap.exists() ? snap.val() : null;
}

async function getRNDPrice() {
    try {
        const rateSnap = await get(ref(db, 'settings/rate'));
        if (rateSnap.exists()) {
            rndPrice = rateSnap.val();
        } else {
            await set(ref(db, 'settings/rate'), 1.00);
            rndPrice = 1.00;
        }
    } catch (error) { console.error('RND मूल्य प्राप्त करने में त्रुटि:', error); rndPrice = 1.00; }
    return rndPrice;
}

// ============================================================
// 🔥 रेफरल कमीशन वितरित करें - 5 स्तर
// ============================================================
async function distributeReferralCommission(userUid, amount) {
    try {
        const rates = [0.08, 0.04, 0.02, 0.01, 0.01];
        const usersSnap = await get(ref(db, 'users'));
        if (!usersSnap.exists()) return;
        const users = usersSnap.val();
        const currentUser = users[userUid];
        if (!currentUser) return;
        
        let currentRefCode = currentUser.referredBy || '';
        for (let level = 0; level < 5; level++) {
            if (!currentRefCode) break;
            let sponsorUid = null;
            let sponsor = null;
            for (const uid in users) {
                if (users[uid].referralCode === currentRefCode) {
                    sponsorUid = uid;
                    sponsor = users[uid];
                    break;
                }
            }
            if (!sponsorUid || !sponsor) break;
            
            const bonus = amount * rates[level];
            const updates = {
                referralEarnings: (sponsor.referralEarnings || 0) + bonus,
                referralWallet: (sponsor.referralWallet || 0) + bonus,
                teamBusiness: (sponsor.teamBusiness || 0) + amount
            };
            updates[`level${level + 1}Earnings`] = (sponsor[`level${level + 1}Earnings`] || 0) + bonus;
            
            await update(ref(db, 'users/' + sponsorUid), updates);
            currentRefCode = sponsor.referredBy || '';
        }
    } catch (error) {
        console.error('रेफरल कमीशन वितरित करने में त्रुटि:', error);
    }
}

// ============================================================
// 🔥 उपयोगकर्ता डेटा अपडेट करें
// ============================================================
async function updateUserData(userId) {
    try {
        const userSnap = await get(ref(db, 'users/' + userId));
        if (!userSnap.exists()) return null;
        const userData = userSnap.val();
        const packages = userData.packages || {};
        let totalDailyRelease = 0, totalStake = 0, totalReward = 0, totalRNDStaked = 0, totalLockedRND = 0;
        for (let key in packages) {
            const pkg = packages[key];
            if (pkg.status === 'active') {
                totalDailyRelease += (pkg.dailyRelease || 0);
                totalStake += (pkg.usdtAmount || 0);
                totalReward += (pkg.bonusPercent || 0);
                totalRNDStaked += (pkg.totalRND || 0);
                totalLockedRND += ((pkg.totalRND || 0) - (pkg.releasedAmount || 0));
            }
        }
        await update(ref(db, 'users/' + userId), {
            releaseWallet: totalDailyRelease,
            totalStake: totalStake,
            totalReward: totalReward,
            rndWallet: totalRNDStaked,
            lockedRND: totalLockedRND
        });
        return { totalDailyRelease, totalStake, totalReward, totalRNDStaked, totalLockedRND };
    } catch (error) { console.error('उपयोगकर्ता डेटा अपडेट करने में त्रुटि:', error); return null; }
}

                                    <small class="text-muted">डिपॉजिट वॉलेट (USDT)</small>
                                    <h3 class="text-success">$${(depositWallet || 0).toFixed(2)}</h3>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="text-center p-3" style="background:rgba(251,191,36,0.05);border-radius:12px;border:1px solid rgba(251,191,36,0.1);">
                                    <small class="text-muted">रेफरल वॉलेट (RND)</small>
                                    <h3 style="color:#fbbf24;">${(referralWallet || 0).toFixed(2)} RND</h3>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="text-center p-3" style="background:rgba(59,130,246,0.05);border-radius:12px;border:1px solid rgba(59,130,246,0.1);">
                                    <small class="text-muted">स्टेक किया गया RND</small>
                                    <h3 style="color:#60a5fa;">${(rndWallet || 0).toFixed(2)} RND</h3>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="text-center p-3" style="background:rgba(52,211,153,0.05);border-radius:12px;border:1px solid rgba(52,211,153,0.1);">
                                    <small class="text-muted">दैनिक रिलीज़ (RND)</small>
                                    <h3 style="color:#34d399;">${(releaseWallet || 0).toFixed(4)} RND</h3>
                                </div>
                            </div>
                        </div>
                        <div class="row g-3 mt-2">
                            <div class="col-md-6">
                                <div class="text-center p-3" style="background:rgba(139,92,246,0.05);border-radius:12px;border:1px solid rgba(139,92,246,0.1);">
                                    <small class="text-muted">लॉक किया गया RND</small>
                                    <h3 style="color:#a78bfa;">${(lockedRND || 0).toFixed(2)} RND</h3>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="text-center p-3" style="background:rgba(251,191,36,0.05);border-radius:12px;border:1px solid rgba(251,191,36,0.1);">
                                    <small class="text-muted">कुल स्टेक (USDT)</small>
                                    <h3 style="color:#fbbf24;">$${(userData.totalStake || 0).toFixed(2)}</h3>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 3 पैकेज कार्ड -->
                <div class="col-12">
                    <div class="row g-4">
                        ${PLANS.map((plan) => {
                            const example = calculateStaking(100, rndPrice || 1, plan);
                            return `
                            <div class="col-md-4">
                                <div class="package-card" data-plan="${plan.id}">
                                    <h5 class="plan-name" style="color:${plan.color};">${plan.name}</h5>
                                    <div class="price">$${plan.minAmount} <span>USDT</span></div>
                                    <div class="reward">${plan.bonusText}</div>
                                    <div class="duration">⏱ ${plan.duration} दिन लॉक</div>
                                    <div class="you-will-receive">📊 आपको मिलेगा: ${example.totalRND.toFixed(2)} RND</div>
                                    <div class="daily-release">📈 दैनिक रिलीज़: ${example.dailyRelease.toFixed(4)} RND</div>
                                    <div class="features">
                                        <li><i class="bi bi-check-circle"></i> ${plan.reward}% बोनस</li>
                                        <li><i class="bi bi-check-circle"></i> ${plan.duration} दिन लॉक</li>
                                        <li><i class="bi bi-check-circle"></i> दैनिक रिलीज़</li>
                                    </div>
                                    <button class="plan-cta" data-plan-id="${plan.id}">
                                        <i class="bi bi-lightning-charge-fill"></i> ${plan.name} चुनें

                            </div>
                            `;
                        }).join('')}
                    </div>
                </div>

                <!-- खरीद फॉर्म -->
                <div class="col-12">
                    <div class="card-glass">
                        <div class="card-title"><i class="bi bi-cart-check text-success me-2"></i>खरीद की पुष्टि करें</div>
                        <form id="buyForm">
                            <div class="row g-3">
                                <div class="col-md-3">
                                    <label class="form-label">चुना गया प्लान</label>
                                    <input type="text" id="selectedPlan" class="form-control form-control-custom" value="कोई नहीं" readonly>
                                </div>
                                <div class="col-md-2">
                                    <label class="form-label">राशि (USDT)</label>
                                    <input type="number" id="payAmount" class="form-control form-control-custom" placeholder="राशि दर्ज करें" min="10" step="1" required>
                                </div>
                                <div class="col-md-2">
                                    <label class="form-label">आपको मिलेगा</label>
                                    <input type="text" id="totalRNDDisplay" class="form-control form-control-custom" value="0 RND" readonly>
                                </div>
                                <div class="col-md-2">
                                    <label class="form-label">दैनिक रिलीज़</label>
                                    <input type="text" id="dailyReleaseDisplay" class="form-control form-control-custom" value="0 RND" readonly>
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label">भुगतान स्रोत</label>
                                    <select id="payFrom" class="form-select form-control-custom">

                                    </select>
                                </div>
                            </div>
                            <div class="row mt-3">
                                <div class="col-12">
                                    <button type="submit" class="btn-primary-custom" id="buyBtn"><i class="bi bi-check-circle me-1"></i>अभी खरीदें</button>

                <!-- इतिहास -->

                    <div class="card-glass">
                        <div class="card-title"><i class="bi bi-clock-history text-success me-2"></i>पैकेज इतिहास <span class="badge bg-success bg-opacity-10 text-success ms-2">${userPackages.length} इनवॉइस</span></div>
                        ${userPackages.length === 0 ? `
                            <div class="text-center text-muted py-4">
                                <i class="bi bi-box-seam fs-1 d-block mb-2"></i>
                                <p>अभी तक कोई पैकेज नहीं खरीदा गया।</p>

        // ---- CTA बटन लिसनर ----
        document.querySelectorAll('.plan-cta').forEach(btn => {
            btn.addEventListener('click', function(e) {
                e.stopPropagation();
                const planId = this.dataset.planId;
                const plan = PLANS.find(p => p.id === planId);
                if (!plan) return;
                
                document.querySelectorAll('.package-card').forEach(c => c.classList.remove('selected'));
                const parentCard = this.closest('.package-card');
                if (parentCard) parentCard.classList.add('selected');
                
                document.getElementById('selectedPlan').value = plan.name;
                document.getElementById('payAmount').value = plan.minAmount;
                const result = calculateStaking(plan.minAmount, rndPrice || 1, plan);
                document.getElementById('totalRNDDisplay').value = result.totalRND.toFixed(2) + ' RND';
                document.getElementById('dailyReleaseDisplay').value = result.dailyRelease.toFixed(4) + ' RND';

        // ---- इनपुट रियल-टाइम कैलकुलेशन ----

        if (payAmountInput) {
            payAmountInput.addEventListener('input', function() {
                const planName = document.getElementById('selectedPlan').value;

                    document.getElementById('totalRNDDisplay').value = '0 RND';
                    document.getElementById('dailyReleaseDisplay').value = '0 RND';
                    return;
                }
                const plan = PLANS.find(p => p.name === planName);
                if (!plan) return;
                const amount = parseFloat(this.value);
                if (!amount || amount < 10) {
                    document.getElementById('totalRNDDisplay').value = '0 RND';
                    document.getElementById('dailyReleaseDisplay').value = '0 RND';
                    return;
                }
                const result = calculateStaking(amount, rndPrice || 1, plan);
                document.getElementById('totalRNDDisplay').value = result.totalRND.toFixed(2) + ' RND';

                if (!planName || planName === 'कोई नहीं') { showToast('❌ कृपया पहले एक प्लान चुनें!', 'error'); return; }
                if (!payAmount || payAmount < 10) { showToast('❌ न्यूनतम निवेश 10 USDT है!', 'error'); return; }

                const plan = PLANS.find(p => p.name === planName);
                if (!plan) { showToast('❌ अमान्य प्लान चुना गया!', 'error'); return; }

                if (payAmount < plan.minAmount) {

                    const rndNeeded = payAmount / (rndPrice || 1);

                    }

                    if (balance < payAmount) {

                buyBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>प्रोसेसिंग...';

                try {
                    if (payFrom === 'depositWallet') {
                        await update(ref(db, 'users/' + auth.currentUser.uid), {
                            [payFrom]: balance - payAmount
                        });
                    } else {
                        const rndToDeduct = payAmount / (rndPrice || 1);
                        await update(ref(db, 'users/' + auth.currentUser.uid), {
                            [payFrom]: balance - rndToDeduct
                        });
                    }

                    const userRef = ref(db, 'users/' + auth.currentUser.uid);
                    const userSnap = await get(userRef);
                    const currentUserData = userSnap.val();
                    const packages = currentUserData.packages || {};
                    
                    const packageId = 'pkg_' + Date.now();
                    const startDate = Date.now();
                    const endDate = startDate + (plan.duration * 24 * 60 * 60 * 1000);
                    
                    packages[packageId] = {
                        planId: plan.id,
                        planName: plan.name,
                        usdtAmount: payAmount,
                        baseRND: result.baseRND,
                        bonusRND: result.bonusRND,
                        totalRND: result.totalRND,
                        bonusPercent: plan.reward,
                        duration: plan.duration,
                        dailyRelease: result.dailyRelease,
                        releasedAmount: 0,
                        startDate: startDate,
                        endDate: endDate,
                        status: 'active',
                        rndPriceAtTime: rndPrice || 1,
                        timestamp: Date.now()
                    };
                    
                    await update(ref(db, 'users/' + auth.currentUser.uid), {
                        packages: packages
                    });

                    await distributeReferralCommission(auth.currentUser.uid, payAmount);
                    await updateUserData(auth.currentUser.uid);

                    showToast(`✅ ${plan.name} खरीदा गया! ${result.totalRND.toFixed(2)} RND स्टेक किया गया $${(rndPrice || 1).toFixed(4)}/RND पर। दैनिक: ${result.dailyRelease.toFixed(4)} RND`, 'success');
                    
                    // इनवॉइस पेज पर रीडायरेक्ट करें
                    setTimeout(() => {
                        window.location.href = `invoice.html?id=${packageId}`;
                    }, 1500);

                } catch (error) {
                    console.error('खरीद त्रुटि:', error);
                    showToast('❌ पैकेज खरीदने में त्रुटि। कृपया पुनः प्रयास करें।', 'error');
                }

                buyBtn.disabled = false;
                buyBtn.innerHTML = `<i class="bi bi-check-circle me-1"></i>${planName} खरीदें`;
            });
        }

    } catch (error) {
        console.error('पैकेज लोड करने में त्रुटि:', error);
        document.getElementById('packageContent').innerHTML = `
            <div class="text-center py-5">
                <i class="bi bi-exclamation-triangle text-danger fs-1 d-block mb-3"></i>
                <h4>पेज लोड करने में त्रुटि</h4>
                <p class="text-muted">${error.message || 'कृपया अपने इंटरनेट कनेक्शन की जाँच करें।'}</p>
                <button class="btn btn-primary-custom mt-3" onclick="location.reload()">रीफ्रेश करें</button>
            </div>
        `;
    }
});
</script>
