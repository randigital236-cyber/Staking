<script type="module">
import { initializeApp } from "firebase/app";
import { getAuth, onAuthStateChanged, signOut } from "firebase/auth";
import { getDatabase, ref, get, push, update, query, orderByChild, equalTo } from "firebase/database";

const firebaseConfig = {
    apiKey: "AIzaSyAz-TLmOhiy-_vHHmIjW8gyIOqTR_PT9o0",
    authDomain: "rnd2-70080.firebaseapp.com",
    databaseURL: "https://rnd2-70080-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "rnd2-70080",
    storageBucket: "rnd2-70080.firebasestorage.app",
    messagingSenderId: "468625887938",
    appId: "1:468625887938:web:5cb4ddbcf31b6fc0a4615b",
    measurementId: "G-ELVJD5NQKB"
};

// ============================================================
// 🔥 STAKING PLANS (RND Price Based)
// ============================================================
const PLANS = [
    { id: '6months', name: '6 Months Plan', duration: 180, reward: 25, color: '#2ecc71' },
    { id: '12months', name: '12 Months Plan', duration: 365, reward: 60, color: '#fbbf24' },
    { id: '18months', name: '18 Months Plan', duration: 540, reward: 100, color: '#f472b6' }
];

// ============================================================
// 🔥 CALCULATE FUNCTIONS
// ============================================================
function calculateStaking(usdtAmount, rndPrice, plan) {
    // RND tokens received
    const rndReceived = usdtAmount / rndPrice;
    
    // Maturity amount (RND)
    const maturityRND = rndReceived + (rndReceived * plan.reward / 100);
    
    // Daily release (RND)
    const dailyRelease = maturityRND / plan.duration;
    
    // Maturity value in USD
    const maturityUSD = maturityRND * rndPrice;
    
    return {
        rndReceived,
        maturityRND,
        dailyRelease,
        maturityUSD,
        totalReward: plan.reward
    };
}

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

let rndPrice = 1.00;

function showToast(message, type = 'success') {
    const container = document.getElementById('toastContainer');
    const toast = document.createElement('div');
    toast.className = `toast-custom ${type}`;
    const icon = type === 'success' ? 'bi-check-circle-fill text-success' : 'bi-exclamation-triangle-fill text-danger';
    toast.innerHTML = `<i class="bi ${icon}"></i><span class="toast-msg">${message}</span>`;
    container.appendChild(toast);
    setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateX(100%)';
        setTimeout(() => toast.remove(), 300);
    }, 5000);
}

const sidebarPanel = document.getElementById('sidebarPanel');
const sidebarOverlay = document.getElementById('sidebarOverlay');
const sidebarToggle = document.getElementById('sidebarToggle');
const sidebarClose = document.getElementById('sidebarClose');

function openSidebar() {
    sidebarPanel.classList.add('open');
    sidebarOverlay.classList.add('active');
    document.body.style.overflow = 'hidden';
}
function closeSidebar() {
    sidebarPanel.classList.remove('open');
    sidebarOverlay.classList.remove('active');
    document.body.style.overflow = '';
}
sidebarToggle.addEventListener('click', openSidebar);
sidebarClose.addEventListener('click', closeSidebar);
sidebarOverlay.addEventListener('click', closeSidebar);
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeSidebar(); });

document.getElementById('logoutBtnSidebar').addEventListener('click', async (e) => {
    e.preventDefault();
    await signOut(auth);
    window.location.href = 'login.html';
});

async function getUserData(uid) {
    const snap = await get(ref(db, 'users/' + uid));
    return snap.exists() ? snap.val() : null;
}

async function getRNDPrice() {
    try {
        const rateSnap = await get(ref(db, 'settings/rate'));
        if (rateSnap.exists()) {
            rndPrice = rateSnap.val();
        } else {
            await set(ref(db, 'settings/rate'), 1.00);
            rndPrice = 1.00;
        }
    } catch (error) {
        console.error('Error fetching RND price:', error);
        rndPrice = 1.00;
    }
    return rndPrice;
}

// ============================================================
// 🔥 UPDATE DAILY RELEASE
// ============================================================
async function updateDailyReleases(userId) {
    try {
        const packagesRef = ref(db, 'packages');
        const packagesQuery = query(packagesRef, orderByChild('uid'), equalTo(userId));
        const packagesSnap = await get(packagesQuery);
        
        let totalDailyRelease = 0;
        let totalStake = 0;
        let totalReward = 0;
        let totalRNDStaked = 0;
        
        if (packagesSnap.exists()) {
            packagesSnap.forEach((childSnap) => {
                const pkg = childSnap.val();
                if (pkg.status === 'active') {
                    totalDailyRelease += (pkg.dailyRelease || 0);
                    totalStake += (pkg.usdtAmount || 0);
                    totalReward += (pkg.rewardAmount || 0);
                    totalRNDStaked += (pkg.rndAmount || 0);
                }
            });
        }
        
        await update(ref(db, 'users/' + userId), {
            releaseWallet: totalDailyRelease,
            totalStake: totalStake,
            totalReward: totalReward,
            rndWallet: totalRNDStaked
        });
        
        return { totalDailyRelease, totalStake, totalReward, totalRNDStaked };
    } catch (error) {
        console.error('Error updating daily releases:', error);
        return { totalDailyRelease: 0, totalStake: 0, totalReward: 0, totalRNDStaked: 0 };
    }
}

// ============================================================
// 🔥 CHECK AUTH & LOAD
// ============================================================
onAuthStateChanged(auth, async (user) => {
    if (!user) {
        window.location.href = 'login.html';
        return;
    }

    try {
        await getRNDPrice();
        
        const userData = await getUserData(user.uid);
        if (!userData) {
            window.location.href = 'dashboard.html';
            return;
        }

        const username = userData.username || userData.referralCode || 'USER';
        const name = userData.name || 'User';
        document.getElementById('sidebarName').textContent = name;
        document.getElementById('sidebarUserId').textContent = 'ID: ' + username;
        document.getElementById('sidebarAvatar').textContent = username.charAt(0).toUpperCase();

        const badge = document.getElementById('referralBadge');
        if (badge) badge.textContent = userData.totalReferrals || 0;

        await updateDailyReleases(user.uid);

        const packagesRef = ref(db, 'packages');
        const packagesQuery = query(packagesRef, orderByChild('uid'), equalTo(user.uid));
        const packagesSnap = await get(packagesQuery);
        let userPackages = [];
        if (packagesSnap.exists()) {
            packagesSnap.forEach((childSnap) => {
                userPackages.push({ id: childSnap.key, ...childSnap.val() });
            });
            userPackages.sort((a, b) => b.timestamp - a.timestamp);
        }

        const depositWallet = userData.depositWallet || 0;
        const withdrawalWallet = userData.withdrawalWallet || 0;
        const releaseWallet = userData.releaseWallet || 0;
        const rndWallet = userData.rndWallet || 0;

        document.getElementById('packageContent').innerHTML = `
            <div class="row g-4">
                <div class="col-12">
                    <div class="d-flex flex-wrap justify-content-between align-items-center">
                        <h4 class="fw-bold"><i class="bi bi-box-seam text-success me-2"></i>Buy Package</h4>
                        <span class="rnd-price-badge">
                            <i class="bi bi-currency-dollar"></i> 1 RND = $${rndPrice.toFixed(4)}
                        </span>
                    </div>
                    <hr class="border-secondary">
                </div>

                <div class="col-12">
                    <div class="card-glass">
                        <div class="row g-3">
                            <div class="col-md-3">
                                <div class="text-center p-3" style="background:rgba(46,204,113,0.05);border-radius:12px;border:1px solid rgba(46,204,113,0.1);">
                                    <small class="text-muted">Deposit Wallet (USDT)</small>
                                    <h3 class="text-success">$${depositWallet.toFixed(2)}</h3>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="text-center p-3" style="background:rgba(251,191,36,0.05);border-radius:12px;border:1px solid rgba(251,191,36,0.1);">
                                    <small class="text-muted">Withdrawal Wallet (RND)</small>
                                    <h3 style="color:#fbbf24;">${withdrawalWallet.toFixed(2)} RND</h3>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="text-center p-3" style="background:rgba(59,130,246,0.05);border-radius:12px;border:1px solid rgba(59,130,246,0.1);">
                                    <small class="text-muted">RND Staked</small>
                                    <h3 style="color:#60a5fa;">${rndWallet.toFixed(2)} RND</h3>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="text-center p-3" style="background:rgba(52,211,153,0.05);border-radius:12px;border:1px solid rgba(52,211,153,0.1);">
                                    <small class="text-muted">Daily Release (RND)</small>
                                    <h3 style="color:#34d399;">${releaseWallet.toFixed(2)} RND</h3>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-12">
                    <div class="row g-3">
                        ${PLANS.map((plan) => {
                            // Show calculation for $100 example
                            const example = calculateStaking(100, rndPrice, plan);
                            return `
                            <div class="col-md-4">
                                <div class="package-card" data-plan="${plan.id}" onclick="selectPlan('${plan.id}')">
                                    <h5 style="color:${plan.color};">${plan.name}</h5>
                                    <div style="font-size:2rem;font-weight:800;color:#2ecc71;">${plan.reward}%</div>
                                    <div class="duration">${plan.duration} Days</div>
                                    <div class="rnd-amount">📊 $100 = ${example.rndReceived.toFixed(2)} RND</div>
                                    <div class="daily-release">📈 Daily: ${example.dailyRelease.toFixed(4)} RND</div>
                                    <div class="features">
                                        <li><i class="bi bi-check-circle"></i> ${plan.reward}% Return</li>
                                        <li><i class="bi bi-check-circle"></i> ${plan.duration} Days Lock</li>
                                        <li><i class="bi bi-check-circle"></i> Daily Release</li>
                                        <li><i class="bi bi-check-circle" style="color:#60a5fa;"></i> Maturity: ${example.maturityRND.toFixed(2)} RND</li>
                                    </div>
                                </div>
                            </div>
                            `;
                        }).join('')}
                    </div>
                </div>

                <div class="col-12">
                    <div class="card-glass">
                        <div class="card-title"><i class="bi bi-cart-check text-success me-2"></i>Confirm Purchase</div>
                        <form id="buyForm">
                            <div class="row g-3">
                                <div class="col-md-3">
                                    <label class="form-label">Select Plan</label>
                                    <input type="text" id="selectedPlan" class="form-control form-control-custom" value="None" readonly>
                                </div>
                                <div class="col-md-2">
                                    <label class="form-label">USDT Amount</label>
                                    <input type="text" id="usdtAmount" class="form-control form-control-custom" value="0" readonly>
                                </div>
                                <div class="col-md-2">
                                    <label class="form-label">RND Received</label>
                                    <input type="text" id="rndReceived" class="form-control form-control-custom" value="0 RND" readonly>
                                </div>
                                <div class="col-md-2">
                                    <label class="form-label">Daily Release</label>
                                    <input type="text" id="dailyReleaseDisplay" class="form-control form-control-custom" value="0 RND" readonly>
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label">Pay From</label>
                                    <select id="payFrom" class="form-select form-control-custom">
                                        <option value="depositWallet">💰 Deposit Wallet (USDT)</option>
                                        <option value="withdrawalWallet">💳 Withdrawal Wallet (RND)</option>
                                    </select>
                                </div>
                            </div>
                            <div class="row g-3 mt-2">
                                <div class="col-md-6">
                                    <label class="form-label">Amount to Pay</label>
                                    <input type="number" id="payAmount" class="form-control form-control-custom" placeholder="Enter USDT amount" min="10" step="1" required>
                                    <small class="text-muted">Minimum: 10 USDT</small>
                                </div>
                                <div class="col-md-6 d-flex align-items-end">
                                    <button type="submit" class="btn-primary-custom" id="buyBtn">
                                        <i class="bi bi-check-circle me-1"></i>Buy Now
                                    </button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="col-12">
                    <div class="card-glass">
                        <div class="card-title"><i class="bi bi-clock-history text-success me-2"></i>Package History</div>
                        ${userPackages.length === 0 ? `
                            <div class="text-center text-muted py-4">
                                <i class="bi bi-box-seam fs-1 d-block mb-2"></i>
                                <p>No packages purchased yet.</p>
                            </div>
                        ` : `
                            <div class="package-history">
                                ${userPackages.map((p) => {
                                    const statusClass = p.status === 'active' ? 'status-active' : 'status-completed';
                                    const statusText = p.status === 'active' ? '🟢 Active' : '🔵 Completed';
                                    const planInfo = PLANS.find(pl => pl.id === p.planId);
                                    return `
                                        <div class="package-item">
                                            <div>
                                                <span class="plan">${planInfo ? planInfo.name : p.planId}</span>
                                                <div class="date">${new Date(p.timestamp).toLocaleString('hi-IN')}</div>
                                                <span class="rate-badge">Rate: $${p.rndPriceAtTime || 0}/RND</span>
                                            </div>
                                            <div>
                                                <span class="amount">${p.usdtAmount} USDT</span>
                                                <span class="rnd-amount">→ ${p.rndAmount.toFixed(2)} RND</span>
                                                <span class="${statusClass} ms-2">${statusText}</span>
                                                ${p.dailyRelease ? `<div class="daily">📈 Daily: ${p.dailyRelease.toFixed(4)} RND</div>` : ''}
                                                ${p.maturityRND ? `<div class="total-reward">💰 Maturity: ${p.maturityRND.toFixed(2)} RND</div>` : ''}
                                            </div>
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                        `}
                    </div>
                </div>
            </div>
        `;

        // ============================================================
        // 🔥 SELECT PLAN
        // ============================================================
        window.selectPlan = function(planId) {
            const plan = PLANS.find(p => p.id === planId);
            if (!plan) return;

            document.querySelectorAll('.package-card').forEach(card => {
                card.classList.remove('selected');
            });
            document.querySelector(`.package-card[data-plan="${planId}"]`).classList.add('selected');

            document.getElementById('selectedPlan').value = plan.name;
            
            // Show example calculation
            const example = calculateStaking(100, rndPrice, plan);
            document.getElementById('usdtAmount').value = '100';
            document.getElementById('rndReceived').value = example.rndReceived.toFixed(2) + ' RND';
            document.getElementById('dailyReleaseDisplay').value = example.dailyRelease.toFixed(4) + ' RND';
            
            document.getElementById('payAmount').placeholder = `Enter USDT amount (min 10)`;
            
            const buyBtn = document.getElementById('buyBtn');
            buyBtn.innerHTML = `<i class="bi bi-check-circle me-1"></i>Buy ${plan.name}`;
        };

        // ============================================================
        // 🔥 PAY AMOUNT CHANGE - REAL TIME CALCULATION
        // ============================================================
        document.getElementById('payAmount').addEventListener('input', function() {
            const planName = document.getElementById('selectedPlan').value;
            if (planName === 'None') {
                return;
            }
            
            const plan = PLANS.find(p => p.name === planName);
            if (!plan) return;
            
            const amount = parseFloat(this.value);
            if (!amount || amount < 10) {
                document.getElementById('rndReceived').value = '0 RND';
                document.getElementById('dailyReleaseDisplay').value = '0 RND';
                document.getElementById('usdtAmount').value = '0';
                return;
            }
            
            const result = calculateStaking(amount, rndPrice, plan);
            document.getElementById('usdtAmount').value = amount;
            document.getElementById('rndReceived').value = result.rndReceived.toFixed(2) + ' RND';
            document.getElementById('dailyReleaseDisplay').value = result.dailyRelease.toFixed(4) + ' RND';
        });

        // ============================================================
        // 🔥 BUY PLAN
        // ============================================================
        document.getElementById('buyForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const planName = document.getElementById('selectedPlan').value;
            const payAmount = parseFloat(document.getElementById('payAmount').value);
            const payFrom = document.getElementById('payFrom').value;
            const buyBtn = document.getElementById('buyBtn');

            if (!planName || planName === 'None') {
                showToast('❌ Please select a plan first!', 'error');
                return;
            }

            if (!payAmount || payAmount < 10) {
                showToast('❌ Minimum investment is 10 USDT!', 'error');
                return;
            }

            const plan = PLANS.find(p => p.name === planName);
            if (!plan) {
                showToast('❌ Invalid plan selected!', 'error');
                return;
            }

            const userData = await getUserData(auth.currentUser.uid);
            if (!userData) {
                showToast('❌ User data not found!', 'error');
                return;
            }

            const balance = userData[payFrom] || 0;
            const currency = payFrom === 'depositWallet' ? 'USDT' : 'RND';

            // If paying from withdrawal wallet, need to check RND balance
            if (payFrom === 'withdrawalWallet') {
                // Convert USDT to RND at current price
                const rndNeeded = payAmount / rndPrice;
                if (balance < rndNeeded) {
                    showToast(`❌ Insufficient RND balance! You have ${balance.toFixed(2)} RND, need ${rndNeeded.toFixed(2)} RND`, 'error');
                    return;
                }
            } else {
                if (balance < payAmount) {
                    showToast(`❌ Insufficient balance in Deposit Wallet! You have $${balance.toFixed(2)}`, 'error');
                    return;
                }
            }

            // Calculate staking details
            const result = calculateStaking(payAmount, rndPrice, plan);
            
            buyBtn.disabled = true;
            buyBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Processing...';

            try {
                // Update user balance
                if (payFrom === 'depositWallet') {
                    await update(ref(db, 'users/' + auth.currentUser.uid), {
                        [payFrom]: balance - payAmount
                    });
                } else {
                    // Deduct RND from withdrawal wallet
                    const rndToDeduct = payAmount / rndPrice;
                    await update(ref(db, 'users/' + auth.currentUser.uid), {
                        [payFrom]: balance - rndToDeduct
                    });
                }

                // Add to packages
                await push(ref(db, 'packages'), {
                    uid: auth.currentUser.uid,
                    planId: plan.id,
                    planName: plan.name,
                    usdtAmount: payAmount,
                    rndAmount: result.rndReceived,
                    rndPriceAtTime: rndPrice,
                    reward: plan.reward,
                    duration: plan.duration,
                    dailyRelease: result.dailyRelease,
                    maturityRND: result.maturityRND,
                    maturityUSD: result.maturityUSD,
                    status: 'active',
                    timestamp: Date.now()
                });

                // Update daily release
                await updateDailyReleases(auth.currentUser.uid);

                showToast(`✅ ${plan.name} purchased! ${result.rndReceived.toFixed(2)} RND staked at $${rndPrice}/RND. Daily: ${result.dailyRelease.toFixed(4)} RND`, 'success');
                
                setTimeout(() => {
                    window.location.reload();
                }, 1500);

            } catch (error) {
                console.error('Purchase error:', error);
                showToast('❌ Error purchasing plan. Please try again.', 'error');
            }

            buyBtn.disabled = false;
            buyBtn.innerHTML = `<i class="bi bi-check-circle me-1"></i>Buy ${planName}`;
        });

    } catch (error) {
        console.error('Error loading packages:', error);
        document.getElementById('packageContent').innerHTML = `
            <div class="text-center py-5">
                <i class="bi bi-exclamation-triangle text-danger fs-1 d-block mb-3"></i>
                <h4>Error Loading Page</h4>
                <p class="text-muted">${error.message || 'Please check your internet connection.'}</p>
                <button class="btn btn-primary-custom mt-3" onclick="location.reload()">Refresh</button>
            </div>
        `;
    }
});
</script>
</body>
</html>
