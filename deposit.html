function showToast(message, type = 'success') {
    const container = document.getElementById('toastContainer');

// ============== BSC BLOCKCHAIN FUNCTIONS ==============

// Get transaction receipt from BSC
async function getBscTransactionReceipt(txHash) {
    try {
        const url = `https://api.bscscan.com/api?module=proxy&action=eth_getTransactionReceipt&txhash=${txHash}&apikey=${BSCSCAN_API_KEY}`;
        const response = await fetch(url);
        const data = await response.json();

        if (data.result && data.result.status) {
            return data.result;
        }
        return null;
    } catch (error) {
        console.error('BSC Receipt Error:', error);
        return null;
    }
}

// Get transaction details
async function getBscTransaction(txHash) {
    try {
        const url = `https://api.bscscan.com/api?module=proxy&action=eth_getTransactionByHash&txhash=${txHash}&apikey=${BSCSCAN_API_KEY}`;
        const response = await fetch(url);
        const data = await response.json();
        return data.result;
    } catch (error) {
        console.error('BSC Transaction Error:', error);
        return null;
    }
}

// Get token transfer events for our wallet
async function getTokenTransfers(address, page = 1, offset = 50) {
    try {
        const url = `https://api.bscscan.com/api?module=account&action=tokentx&contractaddress=${USDT_CONTRACT}&address=${address}&page=${page}&offset=${offset}&sort=desc&apikey=${BSCSCAN_API_KEY}`;
        const response = await fetch(url);
        const data = await response.json();

        if (data.status === '1' && data.result) {
            return data.result;
        }
        return [];
    } catch (error) {
        console.error('Token Transfer Error:', error);
        return [];
    }
}

// Get current block number
async function getCurrentBlock() {
    try {
        const url = `https://api.bscscan.com/api?module=proxy&action=eth_blockNumber&apikey=${BSCSCAN_API_KEY}`;
        const response = await fetch(url);
        const data = await response.json();
        return parseInt(data.result, 16);
    } catch (error) {
        return 0;
    }
}

// ============== MAIN VERIFICATION FUNCTION ==============

async function verifyUsdtTransfer(txHash, expectedAmount = null) {
    try {
        addLog('Checking transaction receipt...', 'info');

        // Step 1: Get transaction receipt
        const receipt = await getBscTransactionReceipt(txHash);
        if (!receipt) {
            return { valid: false, error: 'Transaction not found on blockchain yet. Please wait...' };
        }

        if (receipt.status !== '0x1') {
            return { valid: false, error: 'Transaction failed on blockchain' };
        }

        addLog('Receipt found. Transaction successful.', 'success');
        addLog('Fetching transaction details...', 'info');

        // Step 2: Get transaction details
        const tx = await getBscTransaction(txHash);
        if (!tx) {
            return { valid: false, error: 'Cannot fetch transaction details from BSC' };
        }

        // Step 3: Verify it's a USDT contract interaction
        if (tx.to.toLowerCase() !== USDT_CONTRACT.toLowerCase()) {
            return { valid: false, error: 'This transaction is not for USDT token' };
        }

        addLog('USDT contract verified.', 'success');
        addLog('Checking token transfers...', 'info');

        // Step 4: Get token transfer events
        const transfers = await getTokenTransfers(WALLET_ADDRESS);

        if (!transfers || transfers.length === 0) {
            return { valid: false, error: 'No USDT transfers found for this wallet' };
        }

        // Step 5: Find matching transfer
        const matchingTransfer = transfers.find(t => 
            t.hash.toLowerCase() === txHash.toLowerCase()
        );

        if (!matchingTransfer) {
            return { valid: false, error: 'This transaction hash does not match any USDT transfer to our wallet' };
        }

        addLog('Transfer found! Validating amount...', 'success');

        // Step 6: Calculate amount
        const decimals = parseInt(matchingTransfer.tokenDecimal) || 18;
        const amount = parseFloat(matchingTransfer.value) / Math.pow(10, decimals);

        // Step 7: Check minimum deposit
        if (amount < MIN_DEPOSIT) {
            return { valid: false, error: `Minimum deposit is ${MIN_DEPOSIT} USDT. You sent: ${amount.toFixed(2)} USDT` };
        }

        // Step 8: Validate expected amount (with tolerance)
        if (expectedAmount) {
            const minExpected = expectedAmount * AMOUNT_TOLERANCE;
            if (amount < minExpected) {
                return { 
                    valid: false, 
                    error: `Amount too low. Expected: ${expectedAmount} USDT (min: ${minExpected.toFixed(2)}), Found: ${amount.toFixed(2)} USDT` 
                };
            }
        }

        addLog(`Amount validated: ${amount.toFixed(2)} USDT`, 'success');
        addLog('Checking confirmations...', 'info');

        // Step 9: Check confirmations
        const currentBlock = await getCurrentBlock();
        const txBlock = parseInt(receipt.blockNumber, 16);
        const confirmations = currentBlock - txBlock;

        addLog(`Confirmations: ${confirmations}/${CONFIRMATIONS_REQUIRED}`, 'info');

        return {
            valid: true,
            amount: amount,
            from: matchingTransfer.from,
            to: matchingTransfer.to,
            confirmations: confirmations,
            blockNumber: txBlock,
            gasUsed: receipt.gasUsed,
            timestamp: matchingTransfer.timeStamp,
            txHash: txHash
        };

    } catch (error) {
        console.error('Verification Error:', error);
        return { valid: false, error: 'Verification error: ' + error.message };
    }
}

// ============== AUTO VERIFICATION SYSTEM ==============

async function startAutoVerification(txHash, expectedAmount, userId) {
    const statusDiv = document.getElementById('verificationStatus');
    const resultDiv = document.getElementById('verificationResult');
    const submitBtn = document.getElementById('depositBtn');

    statusDiv.classList.add('active');
    resultDiv.classList.remove('active', 'success', 'error');
    submitBtn.disabled = true;

    showToast('Starting automatic blockchain verification...', 'info');

    let attempts = 0;
    const maxAttempts = 30; // 5 minutes total (10 sec interval)

    const checkInterval = setInterval(async () => {
        attempts++;

        try {
            const result = await verifyUsdtTransfer(txHash, expectedAmount);

            if (result.valid) {
                // Transaction found and valid

                if (result.confirmations >= CONFIRMATIONS_REQUIRED) {
                    // Enough confirmations - APPROVE!
                    clearInterval(checkInterval);

                    addLog('Sufficient confirmations received!', 'success');
                    addLog('Updating user balance...', 'info');

                    await confirmDeposit(txHash, result, userId);

                    statusDiv.classList.remove('active');
                    resultDiv.classList.add('active', 'success');
                    resultDiv.innerHTML = `
                        <i class="bi bi-check-circle-fill text-success fs-1 mb-2"></i>
                        <h5 class="text-success mb-2">Deposit Verified & Approved!</h5>
                        <p class="text-light mb-1">Amount Credited: <strong>${result.amount.toFixed(2)} USDT</strong></p>
                        <p class="text-light mb-1">Confirmations: <strong>${result.confirmations}</strong></p>
                        <p class="text-light mb-1">From: <small>${result.from}</small></p>
                        <p class="text-muted small mt-2">Your balance has been updated automatically</p>
                    `;

                    showToast(`${result.amount.toFixed(2)} USDT deposited successfully!`, 'success');
                    setTimeout(() => window.location.reload(), 4000);

                } else {
                    // Transaction found but waiting for more confirmations
                    statusDiv.innerHTML = `
                        <div class="spinner"></div>
                        <p class="text-light mb-1">Transaction verified! Waiting for confirmations...</p>
                        <p class="text-success fw-bold">${result.amount.toFixed(2)} USDT Found</p>
                        <p class="text-muted small">Confirmations: ${result.confirmations} / ${CONFIRMATIONS_REQUIRED}</p>
                        <div class="verification-log" id="verificationLog"></div>
                    `;
                    addLog(`Transaction valid. Waiting for ${CONFIRMATIONS_REQUIRED - result.confirmations} more confirmations...`, 'info');
                }

            } else {
                // Transaction not found yet or invalid
                if (attempts >= maxAttempts) {
                    clearInterval(checkInterval);
                    statusDiv.classList.remove('active');
                    resultDiv.classList.add('active', 'error');
                    resultDiv.innerHTML = `
                        <i class="bi bi-x-circle-fill text-danger fs-1 mb-2"></i>
                        <h5 class="text-danger mb-2">Verification Timeout</h5>
                        <p class="text-light">${result.error || 'Transaction not found within 5 minutes'}</p>
                        <p class="text-muted small">Please check:</p>
                        <ul class="text-muted small text-start">
                            <li>Did you send USDT on BEP-20 network?</li>
                            <li>Is the transaction hash correct?</li>
                            <li>Has the transaction been confirmed on BSC?</li>
                        </ul>
                        <p class="text-muted small">Contact support if needed</p>
                    `;
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<i class="bi bi-shield-check me-2"></i>Submit & Auto Verify';
                    showToast('Verification timeout. Please check your transaction.', 'error');
                } else {
                    statusDiv.innerHTML = `
                        <div class="spinner"></div>
                        <p class="text-light mb-1">Scanning BSC blockchain... (${attempts}/${maxAttempts})</p>
                        <p class="text-muted small">${result.error || 'Waiting for transaction to appear...'}</p>
                        <div class="verification-log" id="verificationLog"></div>
                    `;
                    if (attempts === 1) {
                        addLog('Starting blockchain scan...', 'info');
                    }
                    addLog(`Attempt ${attempts}: ${result.error || 'Transaction not found yet'}`, 'info');
                }
            }

        } catch (error) {
            console.error('Auto-verify error:', error);
            addLog('Error: ' + error.message, 'error');
        }

    }, 10000); // Check every 10 seconds
}

// ============== CONFIRM DEPOSIT & UPDATE BALANCE ==============

async function confirmDeposit(txHash, verificationResult, userId) {
    try {
        // Update deposit status to approved
        const depositsRef = ref(db, 'deposits');
        const depositsSnap = await get(depositsRef);

        if (depositsSnap.exists()) {
            const deposits = depositsSnap.val();
            for (let key in deposits) {
                if (deposits[key].txHash === txHash && deposits[key].uid === userId) {
                    await update(ref(db, 'deposits/' + key), {
                        status: 'approved',
                        verifiedAmount: verificationResult.amount,
                        verifiedAt: Date.now(),
                        confirmations: verificationResult.confirmations,
                        fromAddress: verificationResult.from,
                        blockNumber: verificationResult.blockNumber,
                        gasUsed: verificationResult.gasUsed
                    });
                    addLog('Deposit record updated to APPROVED', 'success');
                    break;
                }
            }
        }

        // Update user balance
        const userRef = ref(db, 'users/' + userId);
        const userSnap = await get(userRef);

        if (userSnap.exists()) {
            const userData = userSnap.val();
            const currentBalance = parseFloat(userData.balance || 0);
            const newBalance = currentBalance + verificationResult.amount;
            const totalDeposited = parseFloat(userData.totalDeposited || 0) + verificationResult.amount;

            await update(userRef, {
                balance: parseFloat(newBalance.toFixed(2)),
                lastDeposit: Date.now(),
                totalDeposited: parseFloat(totalDeposited.toFixed(2))
            });

            addLog(`Balance updated: ${currentBalance} -> ${newBalance.toFixed(2)} USDT`, 'success');
        }

        // Add to transactions history
        await push(ref(db, 'transactions'), {
            uid: userId,
            type: 'deposit',
            amount: verificationResult.amount,
            txHash: txHash,
            status: 'completed',
            timestamp: Date.now(),
            description: 'USDT BEP-20 Auto Deposit',
            fromAddress: verificationResult.from,
            confirmations: verificationResult.confirmations
        });

        addLog('Transaction history updated', 'success');

    } catch (error) {
        console.error('Confirm deposit error:', error);
        addLog('Error updating balance: ' + error.message, 'error');
        throw error;
    }
}
