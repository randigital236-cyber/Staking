<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - RND Staking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: linear-gradient(135deg, #080e1a 0%, #0f1f3a 50%, #1a2a4a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-container { width: 100%; max-width: 440px; }
        .card-glass {
            background: rgba(19,34,55,0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(46,204,113,0.15);
            border-radius: 24px;
            padding: 2.5rem;
        }
        .form-control-custom {
            background: rgba(8,14,26,0.8) !important;
            border: 1px solid rgba(46,204,113,0.15) !important;
            color: #f0f4ff !important;
            padding: 12px 16px !important;
            border-radius: 12px !important;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }
        .form-control-custom:focus {
            border-color: #2ecc71 !important;
            box-shadow: 0 0 0 3px rgba(46,204,113,0.15) !important;
            background: rgba(8,14,26,0.9) !important;
        }
        .form-control-custom::placeholder { color: #556688 !important; }
        .form-label { font-weight: 600; color: #a0b8d0; font-size: 0.9rem; margin-bottom: 6px; }
        .btn-primary-custom {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            border: none;
            color: #fff;
            font-weight: 600;
            padding: 14px;
            border-radius: 12px;
            width: 100%;
            transition: all 0.3s ease;
            font-size: 1rem;
        }
        .btn-primary-custom:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(46,204,113,0.3);
            color: #fff;
        }
        .btn-google {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: #a0b8d0;
            padding: 12px;
            border-radius: 12px;
            width: 100%;
            transition: all 0.3s ease;
            font-weight: 500;
        }
        .btn-google:hover {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }
        .text-link { color: #2ecc71; text-decoration: none; font-weight: 600; }
        .text-link:hover { text-decoration: underline; }
        .divider { 
            display: flex; 
            align-items: center; 
            color: #556688;
            font-size: 0.85rem;
            gap: 15px;
            margin: 20px 0;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(46,204,113,0.15);
        }
        .logo-text { font-size: 1.8rem; font-weight: 800; color: #fff; }
        .logo-text span { color: #2ecc71; }
        .forgot-link { color: #556688; font-size: 0.9rem; text-decoration: none; }
        .forgot-link:hover { color: #2ecc71; }
        
        @media (max-width: 576px) {
            .card-glass { padding: 1.5rem; }
            .logo-text { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="card-glass">
        <div class="text-center mb-4">
            <div class="logo-text"><i class="bi bi-currency-bitcoin me-2"></i>RND<span>Staking</span></div>
            <p class="text-muted small">Welcome back</p>
        </div>

        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label">Email Address</label>
                <input type="email" id="loginEmail" class="form-control form-control-custom" placeholder="you@example.com" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" id="loginPassword" class="form-control form-control-custom" placeholder="••••••••" required>
            </div>
            <div class="d-flex justify-content-between mb-3">
                <a href="#" class="forgot-link" id="forgotPasswordLink">Forgot password?</a>
            </div>
            <button type="submit" class="btn-primary-custom" id="loginBtn">Sign In <i class="bi bi-arrow-right ms-2"></i></button>
        </form>

        <div class="divider">or continue with</div>

        <button id="googleLoginBtn" class="btn-google">
            <i class="bi bi-google me-2"></i> Sign in with Google
        </button>

        <p class="text-center mt-4 text-muted small">
            Don't have an account? <a href="register.html" class="text-link">Create one</a>
        </p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
<script type="importmap">
{
    "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
        "firebase/database": "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js",
        "firebase/analytics": "https://www.gstatic.com/firebasejs/10.7.1/firebase-analytics.js"
    }
}
</script>
<script type="module">
import { initializeApp } from "firebase/app";
import { getAnalytics } from "firebase/analytics";
import { getAuth, signInWithEmailAndPassword, GoogleAuthProvider, signInWithPopup, sendPasswordResetEmail, onAuthStateChanged } from "firebase/auth";
import { getDatabase, ref, get } from "firebase/database";

const firebaseConfig = {
    apiKey: "AIzaSyAz-TLmOhiy-_vHHmIjW8gyIOqTR_PT9o0",
    authDomain: "rnd2-70080.firebaseapp.com",
    databaseURL: "https://rnd2-70080-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "rnd2-70080",
    storageBucket: "rnd2-70080.firebasestorage.app",
    messagingSenderId: "468625887938",
    appId: "1:468625887938:web:5cb4ddbcf31b6fc0a4615b",
    measurementId: "G-ELVJD5NQKB"
};

const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);
const auth = getAuth(app);
const db = getDatabase(app);
const provider = new GoogleAuthProvider();

// ============================================================
// 🔥 IMPORTANT: Check if user is already logged in
// ============================================================
onAuthStateChanged(auth, (user) => {
    if (user) {
        // User is logged in - redirect to dashboard
        window.location.href = 'dashboard.html';
    }
});

// ============================================================
// EMAIL LOGIN
// ============================================================
document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('loginEmail').value.trim();
    const pass = document.getElementById('loginPassword').value;
    const loginBtn = document.getElementById('loginBtn');
    
    loginBtn.disabled = true;
    loginBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Signing In...';

    try {
        const userCredential = await signInWithEmailAndPassword(auth, email, pass);
        // Success - redirect will happen automatically via onAuthStateChanged
        window.location.href = 'dashboard.html';
    } catch (err) {
        let msg = '❌ Login failed. Please try again.';
        if (err.code === 'auth/user-not-found') msg = '❌ No account found with this email. Please register first.';
        else if (err.code === 'auth/wrong-password') msg = '❌ Incorrect password. Please try again.';
        else if (err.code === 'auth/invalid-email') msg = '❌ Please enter a valid email address.';
        else if (err.code === 'auth/too-many-requests') msg = '❌ Too many failed attempts. Please try again later.';
        alert(msg);
    }
    
    loginBtn.disabled = false;
    loginBtn.innerHTML = 'Sign In <i class="bi bi-arrow-right ms-2"></i>';
});

// ============================================================
// GOOGLE LOGIN
// ============================================================
document.getElementById('googleLoginBtn').addEventListener('click', async () => {
    const btn = document.getElementById('googleLoginBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Loading...';
    
    try {
        await signInWithPopup(auth, provider);
        // Redirect will happen automatically via onAuthStateChanged
        window.location.href = 'dashboard.html';
    } catch (err) {
        alert('❌ ' + err.message);
    }
    
    btn.disabled = false;
    btn.innerHTML = '<i class="bi bi-google me-2"></i> Sign in with Google';
});

// ============================================================
// FORGOT PASSWORD
// ============================================================
document.getElementById('forgotPasswordLink').addEventListener('click', async (e) => {
    e.preventDefault();
    const email = prompt('Enter your email address to reset password:');
    if (email) {
        try {
            await sendPasswordResetEmail(auth, email);
            alert('✅ Password reset link sent to your email.');
        } catch (err) {
            alert('❌ ' + err.message);
        }
    }
});
</script>
</body>
</html>
