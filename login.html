<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - RND Staking</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    * { font-family: 'Segoe UI', sans-serif; }
    body { background: #0b1120; color: #f0f4ff; min-height: 100vh; display: flex; align-items: center; }
    .card-dark { background: #132237; border: 1px solid #2a3a5a; border-radius: 24px; padding: 2rem; }
    .input-group-custom input { background: #0b1120; border: 1px solid #2a3a5a; color: #f0f4ff; }
    .input-group-custom input:focus { background: #0b1120; border-color: #2ecc71; color: #fff; box-shadow: 0 0 0 0.2rem rgba(46,204,113,0.25); }
    .btn-primary-custom { background: #2ecc71; border: none; color: #0b1120; font-weight: 600; }
    .btn-primary-custom:hover { background: #27ae60; color: #fff; }
    .btn-outline-light-custom { border: 1px solid #4a6a8a; color: #c8d6e5; }
    .btn-outline-light-custom:hover { background: #1f334f; color: #fff; }
    .text-green { color: #2ecc71; }
  </style>
</head>
<body>
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-5">
        <div class="card-dark">
          <h3 class="fw-bold text-center mb-4"><i class="bi bi-box-arrow-in-right text-green me-2"></i>Welcome Back</h3>
          <form id="loginForm">
            <div class="mb-3">
              <label class="form-label">Email</label>
              <input type="email" id="loginEmail" class="form-control input-group-custom" placeholder="you@example.com" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Password</label>
              <input type="password" id="loginPassword" class="form-control input-group-custom" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary-custom w-100 py-2">Sign In</button>
          </form>
          <div class="mt-3 text-center">
            <button id="googleLoginBtn" class="btn btn-outline-light-custom w-100 py-2"><i class="bi bi-google me-2"></i>Sign in with Google</button>
          </div>
          <div class="mt-3 text-center">
            <a href="#" id="forgotPasswordLink" class="text-muted">Forgot password?</a> &nbsp;|&nbsp; 
            <a href="register.html" class="text-green">Create account</a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
  <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
        "firebase/database": "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"
      }
    }
  </script>
  <script type="module">
    import { initializeApp } from 'firebase/app';
    import { getAuth, signInWithEmailAndPassword, GoogleAuthProvider, signInWithPopup, sendPasswordResetEmail, onAuthStateChanged } from 'firebase/auth';
    import { getDatabase, ref, get } from 'firebase/database';

    const firebaseConfig = {
      apiKey: "AIzaSyDummyKeyReplaceWithYourOwn",
      authDomain: "rnd-staking.firebaseapp.com",
      databaseURL: "https://rnd-staking-default-rtdb.firebaseio.com",
      projectId: "rnd-staking",
      storageBucket: "rnd-staking.appspot.com",
      messagingSenderId: "1234567890",
      appId: "1:1234567890:web:abcdef123456"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const provider = new GoogleAuthProvider();

    // Check if already logged in
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        const snapshot = await get(ref(db, 'users/' + user.uid));
        if (snapshot.exists()) {
          const userData = snapshot.val();
          if (userData.role === 'admin') {
            window.location.href = 'admin-dashboard.html';
          } else {
            window.location.href = 'dashboard.html';
          }
        }
      }
    });

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('loginEmail').value;
      const pass = document.getElementById('loginPassword').value;
      try {
        await signInWithEmailAndPassword(auth, email, pass);
      } catch (err) { alert(err.message); }
    });

    document.getElementById('googleLoginBtn').addEventListener('click', async () => {
      try { 
        await signInWithPopup(auth, provider); 
      } catch (err) { alert(err.message); }
    });

    document.getElementById('forgotPasswordLink').addEventListener('click', async (e) => {
      e.preventDefault();
      const email = prompt('Enter your email for password reset:');
      if (email) {
        try { 
          await sendPasswordResetEmail(auth, email); 
          alert('Reset link sent to your email.'); 
        } catch (err) { alert(err.message); }
      }
    });
  </script>
</body>
</html>
