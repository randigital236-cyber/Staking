<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>RND Staking Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:linear-gradient(135deg,#0f172a,#1e293b);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.login-card{
max-width:450px;
width:100%;
background:white;
border-radius:20px;
padding:35px;
box-shadow:0 0 30px rgba(0,0,0,0.3);
}

.logo{
width:90px;
height:90px;
display:block;
margin:auto;
margin-bottom:15px;
border-radius:50%;
}

.title{
text-align:center;
font-size:28px;
font-weight:bold;
margin-bottom:5px;
}

.subtitle{
text-align:center;
color:gray;
margin-bottom:25px;
}

.btn-google{
background:#dc3545;
color:white;
font-weight:bold;
}

.btn-google:hover{
background:#bb2d3b;
color:white;
}

.message{
text-align:center;
margin-top:15px;
font-weight:bold;
}

.footer{
text-align:center;
margin-top:15px;
}

.forgot{
cursor:pointer;
font-size:14px;
color:#0d6efd;
}

</style>

</head>
<body>

<div class="login-card">

<img src="logo.png" class="logo">

<div class="title">
RND STAKING
</div>

<div class="subtitle">
Login To Your Account
</div>

<div class="mb-3">
<input
type="email"
id="email"
class="form-control"
placeholder="Email Address">
</div>

<div class="mb-3">
<input
type="password"
id="password"
class="form-control"
placeholder="Password">
</div>

<div class="d-flex justify-content-between mb-3">

<div>
<input type="checkbox" id="remember">
<label for="remember">
Remember Me
</label>
</div>

<div class="forgot"
onclick="forgotPassword()">
Forgot Password?
</div>

</div>

<button
class="btn btn-success w-100"
onclick="loginUser()">

Login

</button>

<hr>

<button
class="btn btn-google w-100"
onclick="googleLogin()">

Login With Google

</button>

<div class="footer">

Don't have account?

<a href="register.html">
Register Here
</a>

</div>

<div
class="message"
id="message">
</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
signInWithEmailAndPassword,
GoogleAuthProvider,
signInWithPopup,
sendPasswordResetEmail,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {

apiKey:"AIzaSyAz-TLmOhiy-_vHHmIjW8gyIOqTR_PT9o0",

authDomain:"rnd2-70080.firebaseapp.com",

projectId:"rnd2-70080",

storageBucket:"rnd2-70080.firebasestorage.app",

messagingSenderId:"468625887938",

appId:"1:468625887938:web:5cb4ddbcf31b6fc0a4615b"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const provider =
new GoogleAuthProvider();

onAuthStateChanged(auth,(user)=>{

if(user){

window.location.href =
"dashboard.html";

}

});

window.loginUser = async()=>{

try{

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

await signInWithEmailAndPassword(
auth,
email,
password
);

document.getElementById("message").innerHTML =
"Login Successful";

setTimeout(()=>{

window.location.href =
"dashboard.html";

},1000);

}catch(error){

document.getElementById("message").innerHTML =
error.message;

}

}

window.googleLogin = async()=>{

try{

await signInWithPopup(
auth,
provider
);

window.location.href =
"dashboard.html";

}catch(error){

document.getElementById("message").innerHTML =
error.message;

}

}

window.forgotPassword = async()=>{

const email =
document.getElementById("email").value;

if(!email){

alert(
"Please enter your email first"
);

return;

}

try{

await sendPasswordResetEmail(
auth,
email
);

alert(
"Password reset link sent to your email"
);

}catch(error){

alert(error.message);

}

}

</script>

</body>
</html>
