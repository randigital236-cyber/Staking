<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - RND Staking</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    * { font-family: 'Segoe UI', sans-serif; }
    body { background: #0b1120; color: #f0f4ff; min-height: 100vh; display: flex; align-items: center; }
    .card-dark { background: #132237; border: 1px solid #2a3a5a; border-radius: 24px; padding: 2rem; }
    .input-group-custom input { background: #0b1120; border: 1px solid #2a3a5a; color: #f0f4ff; }
    .input-group-custom input:focus { background: #0b1120; border-color: #2ecc71; color: #fff; box-shadow: 0 0 0 0.2rem rgba(46,204,113,0.25); }
    .btn-primary-custom { background: #2ecc71; border: none; color: #0b1120; font-weight: 600; }
    .btn-primary-custom:hover { background: #27ae60; color: #fff; }
    .text-green { color: #2ecc71; }
  </style>
</head>
<body>
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-5">
        <div class="card-dark">
          <h3 class="fw-bold text-center mb-4"><i class="bi bi-person-plus text-green me-2"></i>Create Account</h3>
          <form id="registerForm">
            <div class="mb-3">
              <label class="form-label">Full Name</label>
              <input type="text" id="regName" class="form-control input-group-custom" placeholder="John Doe" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Email</label>
              <input type="email" id="regEmail" class="form-control input-group-custom" placeholder="you@example.com" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Password</label>
              <input type="password" id="regPassword" class="form-control input-group-custom" placeholder="••••••••" required minlength="6">
            </div>
            <div class="mb-3">
              <label class="form-label">Referral Code (optional)</label>
              <input type="text" id="regRef" class="form-control input-group-custom" placeholder="RNDXXXXX">
            </div>
            <button type="submit" class="btn btn-primary-custom w-100 py-2">Create Account</button>
          </form>
          <div class="mt-3 text-center">
            <a href="login.html" class="text-green">Already have an account? Login</a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
  <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
        "firebase/database": "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"
      }
    }
  </script>
  <script type="module">
    import { initializeApp } from 'firebase/app';
    import { getAuth, createUserWithEmailAndPassword } from 'firebase/auth';
    import { getDatabase, ref, set, get } from 'firebase/database';

    const firebaseConfig = {
      apiKey: "AIzaSyAz-TLmOhiy-_vHHmIjW8gyIOqTR_PT9o0",
      authDomain: "rnd2-70080.firebaseapp.com",
      databaseURL: "https://rnd2-70080-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "rnd2-70080",
      storageBucket: "rnd2-70080.firebasestorage.app",
      messagingSenderId: "468625887938",
      appId: "1:468625887938:web:5cb4ddbcf31b6fc0a4615b",
      measurementId: "G-ELVJD5NQKB"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    const urlParams = new URLSearchParams(window.location.search);
    const refCode = urlParams.get('ref');
    if (refCode) document.getElementById('regRef').value = refCode;

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('regName').value;
      const email = document.getElementById('regEmail').value;
      const pass = document.getElementById('regPassword').value;
      const ref = document.getElementById('regRef').value.trim();

      if (pass.length < 6) {
        alert('Password must be at least 6 characters long!');
        return;
      }

      try {
        const cred = await createUserWithEmailAndPassword(auth, email, pass);
        const uid = cred.user.uid;
        const refCodeGen = 'RND' + uid.slice(-5).toUpperCase();
        
        await set(ref(db, 'users/' + uid), {
          name: name,
          email: email,
          uid: uid,
          referralCode: refCodeGen,
          referredBy: ref || '',
          createdAt: Date.now(),
          totalStake: 0,
          totalReward: 0,
          availableReward: 0,
          totalWithdrawn: 0,
          totalReferrals: 0,
          teamBusiness: 0,
          banned: false,
          role: 'user'
        });

        if (ref) {
          const snapshot = await get(ref(db, 'users'));
          if (snapshot.exists()) {
            const users = snapshot.val();
            for (let key in users) {
              if (users[key].referralCode === ref) {
                const refCount = (users[key].totalReferrals || 0) + 1;
                await set(ref(db, 'users/' + key + '/totalReferrals'), refCount);
                break;
              }
            }
          }
        }
        
        alert('✅ Account created successfully! Redirecting to login...');
        window.location.href = 'login.html';
      } catch (err) { 
        let errorMsg = err.message;
        if (err.code === 'auth/email-already-in-use') {
          errorMsg = 'This email is already registered. Please login instead.';
        } else if (err.code === 'auth/weak-password') {
          errorMsg = 'Password is too weak. Please use at least 6 characters.';
        } else if (err.code === 'auth/invalid-email') {
          errorMsg = 'Please enter a valid email address.';
        }
        alert('❌ ' + errorMsg);
      }
    });
  </script>
</body>
</html>
