<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Register - RND Staking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* CSS BILKUL VAISA HI - KOI CHANGE NAHI */
        * { font-family: 'Inter', sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: linear-gradient(135deg, #080e1a 0%, #0f1f3a 50%, #1a2a4a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .register-container { width: 100%; max-width: 480px; }
        .card-glass {
            background: rgba(19,34,55,0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(46,204,113,0.15);
            border-radius: 24px;
            padding: 2.5rem;
        }
        .form-control-custom {
            background: rgba(8,14,26,0.8) !important;
            border: 1px solid rgba(46,204,113,0.15) !important;
            color: #f0f4ff !important;
            padding: 12px 16px !important;
            border-radius: 12px !important;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }
        .form-control-custom:focus {
            border-color: #2ecc71 !important;
            box-shadow: 0 0 0 3px rgba(46,204,113,0.15) !important;
            background: rgba(8,14,26,0.9) !important;
        }
        .form-control-custom::placeholder { color: #556688 !important; }
        .form-label { font-weight: 600; color: #a0b8d0; font-size: 0.9rem; margin-bottom: 6px; }
        .form-label .required { color: #ef4444; }
        .btn-primary-custom {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            border: none;
            color: #fff;
            font-weight: 600;
            padding: 14px;
            border-radius: 12px;
            width: 100%;
            transition: all 0.3s ease;
            font-size: 1rem;
        }
        .btn-primary-custom:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(46,204,113,0.3); color: #fff; }
        .btn-primary-custom:disabled { opacity: 0.6; cursor: not-allowed; transform: none !important; }
        .text-link { color: #2ecc71; text-decoration: none; font-weight: 600; }
        .text-link:hover { text-decoration: underline; }
        .logo-text { font-size: 1.8rem; font-weight: 800; color: #fff; }
        .logo-text span { color: #2ecc71; }
        
        .toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; max-width: 400px; }
        .toast-custom {
            background: rgba(19,34,55,0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(46,204,113,0.2);
            border-radius: 16px;
            padding: 16px 20px;
            color: #f0f4ff;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideIn 0.4s ease;
            margin-bottom: 10px;
        }
        .toast-custom.success { border-left: 4px solid #2ecc71; }
        .toast-custom.error { border-left: 4px solid #ef4444; }
        .toast-custom i { font-size: 1.5rem; }
        .toast-custom .toast-msg { flex: 1; font-size: 0.9rem; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        
        .referral-notice {
            background: rgba(46,204,113,0.05);
            border: 1px solid rgba(46,204,113,0.1);
            border-radius: 12px;
            padding: 8px 12px;
            font-size: 0.8rem;
            color: #2ecc71;
            margin-top: 5px;
        }
        .referral-notice.active {
            border-color: rgba(46,204,113,0.3);
            background: rgba(46,204,113,0.08);
        }
        
        @media (max-width: 576px) { .card-glass { padding: 1.5rem; } .logo-text { font-size: 1.5rem; } }
    </style>
</head>
<body>

<div class="toast-container" id="toastContainer"></div>

<div class="register-container">
    <div class="card-glass">
        <div class="text-center mb-4">
            <div class="logo-text"><i class="bi bi-currency-bitcoin me-2"></i>RND<span>Staking</span></div>
            <p class="text-muted small">Create your account</p>
        </div>

        <form id="registerForm" novalidate>
            <div class="mb-3">
                <label class="form-label">Full Name <span class="required">*</span></label>
                <input type="text" id="regName" class="form-control form-control-custom" placeholder="Enter your full name" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Email Address <span class="required">*</span></label>
                <input type="email" id="regEmail" class="form-control form-control-custom" placeholder="you@example.com" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Password <span class="required">*</span></label>
                <input type="password" id="regPassword" class="form-control form-control-custom" placeholder="Min. 6 characters" required minlength="6">
            </div>
            <div class="mb-3">
                <label class="form-label">Referral Code <span style="font-size:0.65rem;background:rgba(46,204,113,0.15);color:#2ecc71;padding:2px 10px;border-radius:20px;font-weight:500;margin-left:6px;">Optional</span></label>
                <input type="text" id="regRef" class="form-control form-control-custom" placeholder="Enter referrer's User ID" style="background:#0a1425 !important;">
                <div class="referral-notice" id="referralNotice">
                    <i class="bi bi-info-circle me-1"></i> 
                    <span id="referralNoticeText">Enter referrer's User ID if you have one</span>
                </div>
            </div>
            <button type="submit" class="btn-primary-custom" id="registerBtn">Create Account <i class="bi bi-arrow-right ms-2"></i></button>
        </form>

        <p class="text-center mt-4 text-muted small">
            Already have an account? <a href="login.html" class="text-link">Login</a>
        </p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
<script type="importmap">
{
    "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
        "firebase/database": "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"
    }
}
</script>

<script type="module">
// ============================================================
// 🔥 FIREBASE IMPORTS
// ============================================================
import { initializeApp } from "firebase/app";
import { getAuth, createUserWithEmailAndPassword, updateProfile } from "firebase/auth";
import { getDatabase, ref, set, get, update, serverTimestamp } from "firebase/database";

// ============================================================
// 🔥 FIREBASE CONFIG
// ============================================================
const firebaseConfig = {
    apiKey: "AIzaSyAz-TLmOhiy-_vHHmIjW8gyIOqTR_PT9o0",
    authDomain: "rnd2-70080.firebaseapp.com",
    databaseURL: "https://rnd2-70080-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "rnd2-70080",
    storageBucket: "rnd2-70080.firebasestorage.app",
    messagingSenderId: "468625887938",
    appId: "1:468625887938:web:5cb4ddbcf31b6fc0a4615b"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

// ============================================================
// 🔥 TOAST NOTIFICATION
// ============================================================
function showToast(message, type = 'success') {
    const container = document.getElementById('toastContainer');
    const toast = document.createElement('div');
    toast.className = `toast-custom ${type}`;
    const icon = type === 'success' ? 'bi-check-circle-fill text-success' : 'bi-exclamation-triangle-fill text-danger';
    toast.innerHTML = `<i class="bi ${icon}"></i><span class="toast-msg">${message}</span>`;
    container.appendChild(toast);
    setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateX(100%)';
        setTimeout(() => toast.remove(), 300);
    }, 6000);
}

// ============================================================
// 🔥 GET REFERRAL FROM URL
// ============================================================
let referralCodeFromURL = '';
const urlParams = new URLSearchParams(window.location.search);
const refFromURL = urlParams.get('ref');
if (refFromURL) {
    referralCodeFromURL = refFromURL;
    document.getElementById('regRef').value = refFromURL;
    document.getElementById('referralNoticeText').textContent = '✅ Referral code auto-filled from link!';
    document.getElementById('referralNotice').className = 'referral-notice active';
    console.log('✅ Referral code from URL:', refFromURL);
}

// ============================================================
// 🔥 VALIDATE REFERRAL CODE BEFORE REGISTRATION
// ============================================================
async function validateReferralCode(referralCode) {
    if (!referralCode) return { valid: true, message: 'No referral code' };
    
    try {
        console.log('🔍 Validating referral code:', referralCode);
        const usersSnap = await get(ref(db, 'users'));
        if (!usersSnap.exists()) {
            return { valid: false, message: 'Invalid referral code' };
        }
        
        const allUsers = usersSnap.val();
        let found = false;
        for (let key in allUsers) {
            if (allUsers[key].referralCode === referralCode) {
                found = true;
                break;
            }
        }
        
        if (!found) {
            console.warn('⚠️ Referral code not found:', referralCode);
            return { valid: false, message: 'Invalid referral code. Please check and try again.' };
        }
        
        return { valid: true, message: 'Referral code valid' };
    } catch (error) {
        console.error('Error validating referral code:', error);
        return { valid: false, message: 'Error validating referral code' };
    }
}

// ============================================================
// 🔥 UPDATE FULL REFERRAL CHAIN (FIXED: Duplicate Count Bug)
// ============================================================
async function updateFullReferralChain(referralCode, newUserUid, newUserName, newUserEmail) {
    console.log('🔄 [REFERRAL] Starting referral chain update...');
    console.log('🔄 [REFERRAL] Referral Code:', referralCode);
    
    try {
        // STEP 1: Get all users
        console.log('📊 [REFERRAL] Fetching all users...');
        const usersSnap = await get(ref(db, 'users'));
        if (!usersSnap.exists()) {
            console.warn('⚠️ [REFERRAL] No users found in database');
            return;
        }
        const allUsers = usersSnap.val();
        
        // STEP 2: Find referrer by referral code
        console.log('🔍 [REFERRAL] Searching for referrer with code:', referralCode);
        let referrerUid = null;
        let referrerData = null;
        for (let key in allUsers) {
            if (allUsers[key].referralCode === referralCode) {
                referrerUid = key;
                referrerData = allUsers[key];
                break;
            }
        }
        
        // STEP 3: Validate referrer exists
        if (!referrerUid) {
            console.warn('⚠️ [REFERRAL] Invalid referral code:', referralCode);
            showToast('⚠️ Invalid referral code. Account created without referral.', 'error');
            return;
        }
        
        console.log('✅ [REFERRAL] Referrer found:', referrerData.name, '(UID:', referrerUid + ')');
        
        // STEP 4: Update LEVEL 1 - Direct Referrals (with duplicate protection)
        const directRefs = referrerData.directReferrals || {};
        
        // ✅ FIX 2: Check if this is a new referral before incrementing counters
        const isNewReferral = !directRefs[newUserUid];
        
        if (isNewReferral) {
            directRefs[newUserUid] = {
                uid: newUserUid,
                name: newUserName,
                email: newUserEmail,
                joinedAt: serverTimestamp()
            };
            console.log('✅ [REFERRAL] New referral added to direct referrals');
            
            // ✅ FIX 2: Only increment counters when it's a new referral
            const ts1 = referrerData.teamStructure || { level1: 0, level2: 0, level3: 0, level4: 0, level5: 0 };
            ts1.level1 = (ts1.level1 || 0) + 1;
            
            // ✅ FIX 6: ONLY update referral fields
            await update(ref(db, 'users/' + referrerUid), {
                totalReferrals: (referrerData.totalReferrals || 0) + 1,
                downline: (referrerData.downline || 0) + 1,
                directReferrals: directRefs,
                teamStructure: ts1
            });
            console.log('✅ [REFERRAL] Level 1 updated for:', referrerData.name);
            
            // STEP 5: Update LEVEL 2, 3, 4, 5
            let currentRefCode = referrerData.referredBy;
            let level = 2;
            
            while (currentRefCode && level <= 5) {
                console.log(`🔍 [REFERRAL] Looking for Level ${level} referrer with code:`, currentRefCode);
                
                let foundUser = null;
                let foundUid = null;
                for (let key in allUsers) {
                    if (allUsers[key].referralCode === currentRefCode) {
                        foundUser = allUsers[key];
                        foundUid = key;
                        break;
                    }
                }
                
                if (!foundUser || !foundUid) {
                    console.log(`ℹ️ [REFERRAL] Level ${level} chain ends here`);
                    break;
                }
                
                // ✅ FIX 6: ONLY update referral fields
                const ts = foundUser.teamStructure || { level1: 0, level2: 0, level3: 0, level4: 0, level5: 0 };
                const levelKey = 'level' + level;
                ts[levelKey] = (ts[levelKey] || 0) + 1;
                
                await update(ref(db, 'users/' + foundUid), {
                    downline: (foundUser.downline || 0) + 1,
                    teamStructure: ts
                });
                console.log(`✅ [REFERRAL] Level ${level} updated for:`, foundUser.name);
                
                // Move to next level
                currentRefCode = foundUser.referredBy;
                level++;
            }
            
            console.log('✅ [REFERRAL] Full referral chain updated successfully!');
        } else {
            console.warn('⚠️ [REFERRAL] User already in direct referrals - skipping duplicate');
            console.log('ℹ️ [REFERRAL] No counters incremented (duplicate prevention)');
        }
        
    } catch (error) {
        console.error('❌ [REFERRAL] Error updating referral chain:', error);
        console.warn('⚠️ [REFERRAL] Referral update failed but registration will continue');
        // ✅ FIX 3: Log error for admin to fix later
        console.error('📝 [REFERRAL] This referral needs to be fixed by admin migration');
    }
}

// ============================================================
// 🔥 REGISTRATION FORM SUBMIT (FIXED: Self Referral Check)
// ============================================================
document.getElementById('registerForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    console.log('📝 [REGISTRATION] ===== STARTED ====');
    console.log('📝 [REGISTRATION] Form submitted');
    
    // Get form values
    const name = document.getElementById('regName').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const pass = document.getElementById('regPassword').value;
    const refCode = document.getElementById('regRef').value.trim();
    const registerBtn = document.getElementById('registerBtn');
    
    console.log('📝 [REGISTRATION] Name:', name);
    console.log('📝 [REGISTRATION] Email:', email);
    console.log('📝 [REGISTRATION] Referral input:', refCode);
    console.log('📝 [REGISTRATION] Referral from URL:', referralCodeFromURL);
    
    // Validation
    if (!name || name.length < 2) {
        showToast('❌ Please enter your full name', 'error');
        console.warn('⚠️ [REGISTRATION] Validation failed: Name required');
        return;
    }
    if (!email || !email.includes('@')) {
        showToast('❌ Please enter a valid email address', 'error');
        console.warn('⚠️ [REGISTRATION] Validation failed: Invalid email');
        return;
    }
    if (pass.length < 6) {
        showToast('❌ Password must be at least 6 characters long!', 'error');
        console.warn('⚠️ [REGISTRATION] Validation failed: Password too short');
        return;
    }
    
    // ✅ FIX 1: Validate referral code BEFORE registration
    const finalRefCode = refCode || referralCodeFromURL || '';
    if (finalRefCode) {
        console.log('🔍 [REGISTRATION] Validating referral code before registration...');
        const validation = await validateReferralCode(finalRefCode);
        if (!validation.valid) {
            showToast('❌ ' + validation.message, 'error');
            console.warn('⚠️ [REGISTRATION] Referral validation failed:', validation.message);
            return;
        }
        console.log('✅ [REGISTRATION] Referral code validated successfully');
    } else {
        console.log('ℹ️ [REGISTRATION] No referral code provided');
    }
    
    // Disable button
    registerBtn.disabled = true;
    registerBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Creating Account...';

    try {
        // ============================================================
        // STEP 1: CREATE USER IN FIREBASE AUTH
        // ============================================================
        console.log('🔐 [REGISTRATION] Step 1: Creating Firebase Auth user...');
        const cred = await createUserWithEmailAndPassword(auth, email, pass);
        const uid = cred.user.uid;
        await updateProfile(auth.currentUser, { displayName: name });
        console.log('✅ [REGISTRATION] Auth user created. UID:', uid);
        
        // ============================================================
        // STEP 2: SAVE USER DATA TO DATABASE
        // ============================================================
        console.log('💾 [REGISTRATION] Step 2: Saving user data to database...');
        const userData = {
            uid: uid,
            username: uid,
            name: name,
            email: email,
            referralCode: uid,
            referredBy: finalRefCode,
            rank: 'Member',
            role: 'user',
            banned: false,
            createdAt: serverTimestamp(),
            lastActive: serverTimestamp(),
            depositWallet: 0,
            referralWallet: 0,
            rndWallet: 0,
            lockedRND: 0,
            releaseWallet: 0,
            totalStake: 0,
            totalReward: 0,
            availableReward: 0,
            totalWithdrawn: 0,
            level1Earnings: 0,
            level2Earnings: 0,
            level3Earnings: 0,
            level4Earnings: 0,
            level5Earnings: 0,
            referralEarnings: 0,
            teamBusiness: 0,
            subscriptions: 0,
            totalReferrals: 0,
            downline: 0,
            teamStructure: { level1: 0, level2: 0, level3: 0, level4: 0, level5: 0 },
            directReferrals: {},
            packages: {},
            transferHistory: []
        };
        
        await set(ref(db, 'users/' + uid), userData);
        await set(ref(db, 'usernames/' + uid), uid);
        console.log('✅ [REGISTRATION] User data saved to database');
        
        // ============================================================
        // STEP 3: UPDATE REFERRAL CHAIN (if referral exists)
        // ============================================================
        if (finalRefCode) {
            console.log('🔗 [REGISTRATION] Step 3: Updating referral chain...');
            try {
                await updateFullReferralChain(finalRefCode, uid, name, email);
                console.log('✅ [REGISTRATION] Referral chain updated successfully');
            } catch (refError) {
                console.error('❌ [REGISTRATION] Referral chain update failed:', refError);
                // ✅ FIX 3: Log for admin to fix later
                console.error('📝 [REGISTRATION] REFERRAL UPDATE FAILED - Needs admin fix');
                console.error('📝 [REGISTRATION] Referral Code:', finalRefCode);
                console.error('📝 [REGISTRATION] New User UID:', uid);
                console.error('📝 [REGISTRATION] Error:', refError.message);
                showToast('⚠️ Account created but referral not updated. Contact support.', 'error');
            }
        } else {
            console.log('ℹ️ [REGISTRATION] No referral code - skipping referral update');
        }
        
        // ============================================================
        // STEP 4: SUCCESS - REDIRECT
        // ============================================================
        console.log('✅ [REGISTRATION] ===== COMPLETED =====');
        showToast('✅ Account created successfully! Welcome ' + name + '!', 'success');
        
        // Wait and redirect
        await new Promise(resolve => setTimeout(resolve, 1500));
        console.log('🚀 [REGISTRATION] Redirecting to dashboard...');
        window.location.href = 'dashboard.html';
        
    } catch (err) {
        // ============================================================
        // ERROR HANDLING
        // ============================================================
        console.error('❌ [REGISTRATION] ===== ERROR =====');
        console.error('❌ [REGISTRATION] Error Code:', err.code);
        console.error('❌ [REGISTRATION] Error Message:', err.message);
        console.error('❌ [REGISTRATION] Full Error:', err);
        
        let msg = 'Registration failed. Please try again.';
        if (err.code === 'auth/email-already-in-use') {
            msg = '❌ This email is already registered.';
            console.warn('⚠️ [REGISTRATION] Email already in use');
        } else if (err.code === 'auth/weak-password') {
            msg = '❌ Password must be at least 6 characters.';
            console.warn('⚠️ [REGISTRATION] Weak password');
        } else if (err.code === 'auth/invalid-email') {
            msg = '❌ Please enter a valid email address.';
            console.warn('⚠️ [REGISTRATION] Invalid email format');
        } else if (err.code === 'auth/network-request-failed') {
            msg = '❌ Network error. Please check your connection.';
            console.error('❌ [REGISTRATION] Network error');
        }
        
        showToast(msg, 'error');
    }
    
    // Re-enable button
    registerBtn.disabled = false;
    registerBtn.innerHTML = 'Create Account <i class="bi bi-arrow-right ms-2"></i>';
    console.log('📝 [REGISTRATION] Form reset complete');
});

// ============================================================
// 🔥 MONITOR AUTH STATE
// ============================================================
auth.onAuthStateChanged((user) => {
    if (user) {
        console.log('👤 [AUTH] User is signed in:', user.uid);
    } else {
        console.log('👤 [AUTH] No user signed in');
    }
});

console.log('✅ [APP] Registration page loaded successfully');
</script>
</body>
</html>
