<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Register - RND Staking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: linear-gradient(135deg, #080e1a 0%, #0f1f3a 50%, #1a2a4a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .register-container { width: 100%; max-width: 480px; }
        .card-glass {
            background: rgba(19,34,55,0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(46,204,113,0.15);
            border-radius: 24px;
            padding: 2.5rem;
        }
        .form-control-custom {
            background: rgba(8,14,26,0.8) !important;
            border: 1px solid rgba(46,204,113,0.15) !important;
            color: #f0f4ff !important;
            padding: 12px 16px !important;
            border-radius: 12px !important;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }
        .form-control-custom:focus {
            border-color: #2ecc71 !important;
            box-shadow: 0 0 0 3px rgba(46,204,113,0.15) !important;
            background: rgba(8,14,26,0.9) !important;
        }
        .form-control-custom::placeholder { color: #556688 !important; }
        .form-label { font-weight: 600; color: #a0b8d0; font-size: 0.9rem; margin-bottom: 6px; }
        .form-label .required { color: #ef4444; }
        .btn-primary-custom {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            border: none;
            color: #fff;
            font-weight: 600;
            padding: 14px;
            border-radius: 12px;
            width: 100%;
            transition: all 0.3s ease;
            font-size: 1rem;
        }
        .btn-primary-custom:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(46,204,113,0.3); color: #fff; }
        .btn-primary-custom:disabled { opacity: 0.6; cursor: not-allowed; transform: none !important; }
        .btn-google {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: #a0b8d0;
            padding: 12px;
            border-radius: 12px;
            width: 100%;
            transition: all 0.3s ease;
            font-weight: 500;
        }
        .btn-google:hover { background: rgba(255,255,255,0.1); color: #fff; }
        .text-link { color: #2ecc71; text-decoration: none; font-weight: 600; }
        .text-link:hover { text-decoration: underline; }
        .divider { display: flex; align-items: center; color: #556688; font-size: 0.85rem; gap: 15px; margin: 20px 0; }
        .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: rgba(46,204,113,0.15); }
        .logo-text { font-size: 1.8rem; font-weight: 800; color: #fff; }
        .logo-text span { color: #2ecc71; }
        
        .toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; max-width: 400px; }
        .toast-custom {
            background: rgba(19,34,55,0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(46,204,113,0.2);
            border-radius: 16px;
            padding: 16px 20px;
            color: #f0f4ff;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideIn 0.4s ease;
            margin-bottom: 10px;
        }
        .toast-custom.success { border-left: 4px solid #2ecc71; }
        .toast-custom.error { border-left: 4px solid #ef4444; }
        .toast-custom i { font-size: 1.5rem; }
        .toast-custom .toast-msg { flex: 1; font-size: 0.9rem; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        
        .commission-badge {
            display: inline-block;
            background: rgba(46,204,113,0.08);
            border: 1px solid rgba(46,204,113,0.1);
            border-radius: 20px;
            padding: 2px 12px;
            font-size: 0.7rem;
            color: #2ecc71;
        }
        
        @media (max-width: 576px) { .card-glass { padding: 1.5rem; } .logo-text { font-size: 1.5rem; } }
    </style>
</head>
<body>

<div class="toast-container" id="toastContainer"></div>

<div class="register-container">
    <div class="card-glass">
        <div class="text-center mb-4">
            <div class="logo-text"><i class="bi bi-currency-bitcoin me-2"></i>RND<span>Staking</span></div>
            <p class="text-muted small">Create your account</p>
            <div class="mt-2">
                <span class="commission-badge">Level 1: 8%</span>
                <span class="commission-badge">Level 2: 4%</span>
                <span class="commission-badge">Level 3: 2%</span>
                <span class="commission-badge">Level 4: 1%</span>
                <span class="commission-badge">Level 5: 1%</span>
            </div>
        </div>

        <form id="registerForm" novalidate>
            <div class="mb-3">
                <label class="form-label">Full Name <span class="required">*</span></label>
                <input type="text" id="regName" class="form-control form-control-custom" placeholder="Enter your full name" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Email Address <span class="required">*</span></label>
                <input type="email" id="regEmail" class="form-control form-control-custom" placeholder="you@example.com" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Password <span class="required">*</span></label>
                <input type="password" id="regPassword" class="form-control form-control-custom" placeholder="Min. 6 characters" required minlength="6">
            </div>
            <div class="mb-3">
                <label class="form-label">Referral Code <span style="font-size:0.65rem;background:rgba(46,204,113,0.15);color:#2ecc71;padding:2px 10px;border-radius:20px;font-weight:500;margin-left:6px;">Optional</span></label>
                <input type="text" id="regRef" class="form-control form-control-custom" placeholder="Enter referral code" style="background:#0a1425 !important;">
                <small class="text-muted" style="font-size:0.7rem;"><i class="bi bi-link-45deg"></i> Enter referral code if you have one</small>
            </div>
            <button type="submit" class="btn-primary-custom" id="registerBtn">Create Account <i class="bi bi-arrow-right ms-2"></i></button>
        </form>

        <div class="divider">or continue with</div>

        <button id="googleRegisterBtn" class="btn-google">
            <i class="bi bi-google me-2"></i> Sign up with Google
        </button>

        <p class="text-center mt-4 text-muted small">
            Already have an account? <a href="login.html" class="text-link">Login</a>
        </p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
<script type="importmap">
{
    "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
        "firebase/database": "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"
    }
}
</script>
<script type="module">
import { initializeApp } from "firebase/app";
import { getAuth, createUserWithEmailAndPassword, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, updateProfile } from "firebase/auth";
import { getDatabase, ref, set, get, update } from "firebase/database";

const firebaseConfig = {
    apiKey: "AIzaSyAz-TLmOhiy-_vHHmIjW8gyIOqTR_PT9o0",
    authDomain: "rnd2-70080.firebaseapp.com",
    databaseURL: "https://rnd2-70080-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "rnd2-70080",
    storageBucket: "rnd2-70080.firebasestorage.app",
    messagingSenderId: "468625887938",
    appId: "1:468625887938:web:5cb4ddbcf31b6fc0a4615b",
    measurementId: "G-ELVJD5NQKB"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);
const provider = new GoogleAuthProvider();

function showToast(message, type = 'success') {
    const container = document.getElementById('toastContainer');
    const toast = document.createElement('div');
    toast.className = `toast-custom ${type}`;
    const icon = type === 'success' ? 'bi-check-circle-fill text-success' : 'bi-exclamation-triangle-fill text-danger';
    toast.innerHTML = `<i class="bi ${icon}"></i><span class="toast-msg">${message}</span>`;
    container.appendChild(toast);
    setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateX(100%)';
        setTimeout(() => toast.remove(), 300);
    }, 6000);
}

function generateUsername(uid) {
    return 'RND' + uid.slice(-5).toUpperCase();
}

// Auto-fill referral from URL
const urlParams = new URLSearchParams(window.location.search);
const refCode = urlParams.get('ref');
if (refCode) {
    document.getElementById('regRef').value = refCode.toUpperCase();
}

onAuthStateChanged(auth, (user) => {
    if (user) {
        window.location.href = 'dashboard.html';
    }
});

// ============================================================
// 🔥 GET USER REFERRAL TREE (5 Levels)
// ============================================================
async function getReferralTree(referralCode, depth = 0, maxDepth = 5) {
    if (depth >= maxDepth) return null;
    
    try {
        const allUsersSnap = await get(ref(db, 'users'));
        if (!allUsersSnap.exists()) return null;
        
        const allUsers = allUsersSnap.val();
        let referrals = [];
        
        for (let key in allUsers) {
            const u = allUsers[key];
            if (u.referredBy === referralCode) {
                referrals.push({
                    uid: key,
                    data: u,
                    level: depth + 1,
                    children: await getReferralTree(u.referralCode, depth + 1, maxDepth)
                });
            }
        }
        
        return referrals;
    } catch (error) {
        console.error('Error getting referral tree:', error);
        return null;
    }
}

// ============================================================
// 🔥 UPDATE REFERRER'S DATA (5 Levels)
// ============================================================
async function updateReferrerData(referralCode, newUserData) {
    try {
        // Find the referrer
        const allUsersSnap = await get(ref(db, 'users'));
        if (!allUsersSnap.exists()) return;
        
        const allUsers = allUsersSnap.val();
        let referrerUid = null;
        let referrerData = null;
        
        for (let key in allUsers) {
            if (allUsers[key].referralCode === referralCode) {
                referrerUid = key;
                referrerData = allUsers[key];
                break;
            }
        }
        
        if (!referrerUid) return;
        
        // Update referrer's totalReferrals
        const currentRefs = referrerData.totalReferrals || 0;
        await update(ref(db, 'users/' + referrerUid), {
            totalReferrals: currentRefs + 1
        });
        
        // Update Level 1 earnings (8%)
        const level1Earnings = (newUserData.totalStake || 0) * 0.08;
        const currentLevel1 = referrerData.level1Earnings || 0;
        await update(ref(db, 'users/' + referrerUid), {
            level1Earnings: currentLevel1 + level1Earnings,
            referralEarnings: (referrerData.referralEarnings || 0) + level1Earnings
        });
        
        // Get Level 2 referrer
        const level2RefCode = referrerData.referredBy;
        if (level2RefCode) {
            for (let key in allUsers) {
                if (allUsers[key].referralCode === level2RefCode) {
                    const level2User = allUsers[key];
                    const level2Earnings = (newUserData.totalStake || 0) * 0.04;
                    await update(ref(db, 'users/' + key), {
                        level2Earnings: (level2User.level2Earnings || 0) + level2Earnings,
                        referralEarnings: (level2User.referralEarnings || 0) + level2Earnings
                    });
                    
                    // Get Level 3 referrer
                    const level3RefCode = level2User.referredBy;
                    if (level3RefCode) {
                        for (let k in allUsers) {
                            if (allUsers[k].referralCode === level3RefCode) {
                                const level3User = allUsers[k];
                                const level3Earnings = (newUserData.totalStake || 0) * 0.02;
                                await update(ref(db, 'users/' + k), {
                                    level3Earnings: (level3User.level3Earnings || 0) + level3Earnings,
                                    referralEarnings: (level3User.referralEarnings || 0) + level3Earnings
                                });
                                
                                // Get Level 4 referrer
                                const level4RefCode = level3User.referredBy;
                                if (level4RefCode) {
                                    for (let l in allUsers) {
                                        if (allUsers[l].referralCode === level4RefCode) {
                                            const level4User = allUsers[l];
                                            const level4Earnings = (newUserData.totalStake || 0) * 0.01;
                                            await update(ref(db, 'users/' + l), {
                                                level4Earnings: (level4User.level4Earnings || 0) + level4Earnings,
                                                referralEarnings: (level4User.referralEarnings || 0) + level4Earnings
                                            });
                                            
                                            // Get Level 5 referrer
                                            const level5RefCode = level4User.referredBy;
                                            if (level5RefCode) {
                                                for (let m in allUsers) {
                                                    if (allUsers[m].referralCode === level5RefCode) {
                                                        const level5User = allUsers[m];
                                                        const level5Earnings = (newUserData.totalStake || 0) * 0.01;
                                                        await update(ref(db, 'users/' + m), {
                                                            level5Earnings: (level5User.level5Earnings || 0) + level5Earnings,
                                                            referralEarnings: (level5User.referralEarnings || 0) + level5Earnings
                                                        });
                                                        break;
                                                    }
                                                }
                                            }
                                            break;
                                        }
                                    }
                                }
                                break;
                            }
                        }
                    }
                    break;
                }
            }
        }
        
        console.log('✅ Referral data updated for all 5 levels!');
        
    } catch (error) {
        console.error('Error updating referrer data:', error);
    }
}

// ============================================================
// 🔥 EMAIL REGISTRATION
// ============================================================
document.getElementById('registerForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const name = document.getElementById('regName').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const pass = document.getElementById('regPassword').value;
    const ref = document.getElementById('regRef').value.trim().toUpperCase();
    const registerBtn = document.getElementById('registerBtn');
    
    if (!name || name.length < 2) { showToast('❌ Please enter your full name', 'error'); return; }
    if (!email || !email.includes('@')) { showToast('❌ Please enter a valid email address', 'error'); return; }
    if (pass.length < 6) { showToast('❌ Password must be at least 6 characters long!', 'error'); return; }
    
    registerBtn.disabled = true;
    registerBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Creating Account...';

    try {
        // Step 1: Create user in Firebase Auth
        const cred = await createUserWithEmailAndPassword(auth, email, pass);
        const uid = cred.user.uid;
        
        // Step 2: Update Auth Profile with name
        await updateProfile(auth.currentUser, { displayName: name });
        console.log('✅ Auth profile updated with name:', name);
        
        // Step 3: Generate username
        const username = generateUsername(uid);
        const refCodeGen = username.toUpperCase();
        console.log('✅ Generated Username:', username);
        
        // Step 4: Save user data with FULL NAME
        const userData = {
            username: username.toUpperCase(),
            name: name,
            email: email,
            uid: uid,
            referralCode: refCodeGen,
            referredBy: ref || '',
            createdAt: Date.now(),
            totalStake: 0,
            totalReward: 0,
            availableReward: 0,
            totalWithdrawn: 0,
            totalReferrals: 0,
            downline: 0,
            // 5 Level Referral Earnings
            level1Earnings: 0,
            level2Earnings: 0,
            level3Earnings: 0,
            level4Earnings: 0,
            level5Earnings: 0,
            referralEarnings: 0,
            teamBusiness: 0,
            subscriptions: 0,
            banned: false,
            role: 'user',
            rank: 'Member',
            depositWallet: 0,
            withdrawalWallet: 0,
            rndWallet: 0,
            releaseWallet: 0,
            transferHistory: []
        };
        
        console.log('💾 Saving user data:', userData);
        await set(ref(db, 'users/' + uid), userData);
        await set(ref(db, 'usernames/' + username.toUpperCase()), uid);
        console.log('✅ User data saved to database!');

        // Step 5: Update referrer's data (5 Levels)
        if (ref) {
            console.log('🔗 Updating referrer tree for:', ref);
            await updateReferrerData(ref, { totalStake: 0 });
            console.log('✅ Referrer tree updated!');
        }
        
        showToast('✅ Account created successfully! Welcome ' + name + '!', 'success');
        setTimeout(() => { window.location.href = 'dashboard.html'; }, 1500);
        
    } catch (err) {
        console.error('Registration Error:', err);
        let msg = 'Registration failed. Please try again.';
        if (err.code === 'auth/email-already-in-use') msg = '❌ This email is already registered. Please login instead.';
        else if (err.code === 'auth/weak-password') msg = '❌ Password is too weak. Please use at least 6 characters.';
        else if (err.code === 'auth/invalid-email') msg = '❌ Please enter a valid email address.';
        showToast(msg, 'error');
    }
    
    registerBtn.disabled = false;
    registerBtn.innerHTML = 'Create Account <i class="bi bi-arrow-right ms-2"></i>';
});

// ============================================================
// 🔥 GOOGLE REGISTRATION
// ============================================================
document.getElementById('googleRegisterBtn').addEventListener('click', async () => {
    const btn = document.getElementById('googleRegisterBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Loading...';
    
    try {
        const result = await signInWithPopup(auth, provider);
        const user = result.user;
        const uid = user.uid;
        const email = user.email;
        const displayName = user.displayName || email.split('@')[0];
        console.log('✅ Google sign-in successful. UID:', uid);
        
        const snapshot = await get(ref(db, 'users/' + uid));
        if (!snapshot.exists()) {
            const username = generateUsername(uid);
            const refCodeGen = username.toUpperCase();
            
            // Check if referral code from URL
            const ref = document.getElementById('regRef').value.trim().toUpperCase();
            
            const userData = {
                username: username.toUpperCase(),
                name: displayName,
                email: email,
                uid: uid,
                referralCode: refCodeGen,
                referredBy: ref || '',
                createdAt: Date.now(),
                totalStake: 0,
                totalReward: 0,
                availableReward: 0,
                totalWithdrawn: 0,
                totalReferrals: 0,
                downline: 0,
                level1Earnings: 0,
                level2Earnings: 0,
                level3Earnings: 0,
                level4Earnings: 0,
                level5Earnings: 0,
                referralEarnings: 0,
                teamBusiness: 0,
                subscriptions: 0,
                banned: false,
                role: 'user',
                rank: 'Member',
                depositWallet: 0,
                withdrawalWallet: 0,
                rndWallet: 0,
                releaseWallet: 0,
                transferHistory: []
            };
            
            await set(ref(db, 'users/' + uid), userData);
            await set(ref(db, 'usernames/' + username.toUpperCase()), uid);
            
            // Update referrer data (5 Levels)
            if (ref) {
                await updateReferrerData(ref, { totalStake: 0 });
            }
            
            console.log('✅ Google user data saved! Username:', username, 'Name:', displayName);
        }
        
        showToast('✅ Account created with Google! Welcome ' + displayName + '! 🎉', 'success');
        setTimeout(() => { window.location.href = 'dashboard.html'; }, 1500);
        
    } catch (err) {
        console.error('Google Registration Error:', err);
        showToast('❌ ' + (err.message || 'Google sign in failed'), 'error');
    }
    
    btn.disabled = false;
    btn.innerHTML = '<i class="bi bi-google me-2"></i> Sign up with Google';
});
</script>
</body>
</html>
