<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - RND Staking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: linear-gradient(135deg, #080e1a 0%, #0f1f3a 50%, #1a2a4a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .register-container { width: 100%; max-width: 480px; }
        .card-glass {
            background: rgba(19,34,55,0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(46,204,113,0.15);
            border-radius: 24px;
            padding: 2.5rem;
        }
        .form-control-custom {
            background: rgba(8,14,26,0.8) !important;
            border: 1px solid rgba(46,204,113,0.15) !important;
            color: #f0f4ff !important;
            padding: 12px 16px !important;
            border-radius: 12px !important;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }
        .form-control-custom:focus {
            border-color: #2ecc71 !important;
            box-shadow: 0 0 0 3px rgba(46,204,113,0.15) !important;
            background: rgba(8,14,26,0.9) !important;
        }
        .form-control-custom::placeholder { color: #556688 !important; }
        .form-label { font-weight: 600; color: #a0b8d0; font-size: 0.9rem; margin-bottom: 6px; }
        .btn-primary-custom {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            border: none;
            color: #fff;
            font-weight: 600;
            padding: 14px;
            border-radius: 12px;
            width: 100%;
            transition: all 0.3s ease;
            font-size: 1rem;
        }
        .btn-primary-custom:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(46,204,113,0.3);
            color: #fff;
        }
        .btn-primary-custom:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }
        .btn-google {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: #a0b8d0;
            padding: 12px;
            border-radius: 12px;
            width: 100%;
            transition: all 0.3s ease;
            font-weight: 500;
        }
        .btn-google:hover {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }
        .btn-google:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .text-link { color: #2ecc71; text-decoration: none; font-weight: 600; }
        .text-link:hover { text-decoration: underline; }
        .divider { 
            display: flex; 
            align-items: center; 
            color: #556688;
            font-size: 0.85rem;
            gap: 15px;
            margin: 20px 0;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(46,204,113,0.15);
        }
        .logo-text { font-size: 1.8rem; font-weight: 800; color: #fff; }
        .logo-text span { color: #2ecc71; }
        .optional-badge {
            font-size: 0.7rem;
            background: rgba(46,204,113,0.15);
            color: #2ecc71;
            padding: 2px 10px;
            border-radius: 20px;
            font-weight: 500;
        }
        .username-hint {
            font-size: 0.75rem;
            color: #556688;
            margin-top: 4px;
        }
        .username-hint .valid { color: #2ecc71; }
        .username-hint .invalid { color: #ef4444; }
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            max-width: 400px;
        }
        .toast-custom {
            background: rgba(19,34,55,0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(46,204,113,0.2);
            border-radius: 16px;
            padding: 16px 20px;
            color: #f0f4ff;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideIn 0.4s ease;
        }
        .toast-custom.success { border-left: 4px solid #2ecc71; }
        .toast-custom.error { border-left: 4px solid #ef4444; }
        .toast-custom i { font-size: 1.5rem; }
        .toast-custom .toast-msg { flex: 1; font-size: 0.9rem; }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        @media (max-width: 576px) {
            .card-glass { padding: 1.5rem; }
            .logo-text { font-size: 1.5rem; }
            .toast-container { right: 10px; left: 10px; max-width: none; }
        }
    </style>
</head>
<body>

<!-- Toast Container -->
<div class="toast-container" id="toastContainer"></div>

<div class="register-container">
    <div class="card-glass">
        <div class="text-center mb-4">
            <div class="logo-text"><i class="bi bi-currency-bitcoin me-2"></i>RND<span>Staking</span></div>
            <p class="text-muted small">Create your account</p>
        </div>

        <form id="registerForm" novalidate>
            <!-- Username / User ID -->
            <div class="mb-3">
                <label class="form-label">Username <span style="color:#ef4444;">*</span></label>
                <input type="text" id="regUsername" class="form-control form-control-custom" placeholder="Choose a username (e.g. john_123)" required>
                <div class="username-hint" id="usernameHint">
                    <i class="bi bi-info-circle"></i> 
                    <span id="usernameStatus">Username must be 3-20 characters (letters, numbers, underscore)</span>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input type="text" id="regName" class="form-control form-control-custom" placeholder="John Doe" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Email Address <span style="color:#ef4444;">*</span></label>
                <input type="email" id="regEmail" class="form-control form-control-custom" placeholder="you@example.com" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Password <span style="color:#ef4444;">*</span></label>
                <input type="password" id="regPassword" class="form-control form-control-custom" placeholder="Min. 6 characters" required minlength="6">
            </div>
            <div class="mb-3">
                <label class="form-label">Referral Code <span class="optional-badge">Optional</span></label>
                <input type="text" id="regRef" class="form-control form-control-custom" placeholder="Enter referral code (optional)" readonly style="background:#0a1425 !important; cursor:default;">
                <small class="text-muted" style="font-size:0.7rem;">
                    <i class="bi bi-link-45deg"></i> Referral code will be auto-filled from your referral link
                </small>
            </div>
            <button type="submit" class="btn-primary-custom" id="registerBtn">Create Account <i class="bi bi-arrow-right ms-2"></i></button>
        </form>

        <div class="divider">or continue with</div>

        <button id="googleRegisterBtn" class="btn-google">
            <i class="bi bi-google me-2"></i> Sign up with Google
        </button>

        <p class="text-center mt-4 text-muted small">
            Already have an account? <a href="login.html" class="text-link">Login</a>
        </p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
<script type="importmap">
{
    "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
        "firebase/database": "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js",
        "firebase/analytics": "https://www.gstatic.com/firebasejs/10.7.1/firebase-analytics.js"
    }
}
</script>
<script type="module">
// ============================================================
// 🔥 FIREBASE IMPORTS
// ============================================================
import { initializeApp } from "firebase/app";
import { getAnalytics } from "firebase/analytics";
import { getAuth, createUserWithEmailAndPassword, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "firebase/auth";
import { getDatabase, ref, set, get, query, orderByChild, equalTo } from "firebase/database";

// ============================================================
// 🔥 FIREBASE CONFIG
// ============================================================
const firebaseConfig = {
    apiKey: "AIzaSyAz-TLmOhiy-_vHHmIjW8gyIOqTR_PT9o0",
    authDomain: "rnd2-70080.firebaseapp.com",
    databaseURL: "https://rnd2-70080-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "rnd2-70080",
    storageBucket: "rnd2-70080.firebasestorage.app",
    messagingSenderId: "468625887938",
    appId: "1:468625887938:web:5cb4ddbcf31b6fc0a4615b",
    measurementId: "G-ELVJD5NQKB"
};

// ============================================================
// 🔥 DOMAIN CONFIG
// ============================================================
const DOMAIN = "https://staking.randigital.in";

// ============================================================
// 🔥 INIT FIREBASE
// ============================================================
const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);
const auth = getAuth(app);
const db = getDatabase(app);
const provider = new GoogleAuthProvider();

console.log('🔥 Firebase initialized successfully!');

// ============================================================
// 🔥 CHECK IF ALREADY LOGGED IN
// ============================================================
onAuthStateChanged(auth, (user) => {
    if (user) {
        console.log('User already logged in:', user.uid);
        window.location.href = 'dashboard.html';
    }
});

// ============================================================
// 🔥 TOAST SYSTEM
// ============================================================
function showToast(message, type = 'success') {
    const container = document.getElementById('toastContainer');
    const toast = document.createElement('div');
    toast.className = `toast-custom ${type}`;
    const icon = type === 'success' ? 'bi-check-circle-fill text-success' : 'bi-exclamation-triangle-fill text-danger';
    toast.innerHTML = `
        <i class="bi ${icon}"></i>
        <span class="toast-msg">${message}</span>
    `;
    container.appendChild(toast);
    setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateX(100%)';
        setTimeout(() => toast.remove(), 300);
    }, 5000);
}

// ============================================================
// 🔥 USERNAME VALIDATION
// ============================================================
function isValidUsername(username) {
    return /^[a-zA-Z0-9_]{3,20}$/.test(username);
}

document.getElementById('regUsername').addEventListener('input', function() {
    const username = this.value.trim();
    const statusSpan = document.getElementById('usernameStatus');
    const hintDiv = document.getElementById('usernameHint');
    
    if (!username) {
        statusSpan.textContent = 'Username must be 3-20 characters (letters, numbers, underscore)';
        statusSpan.className = '';
        return;
    }
    
    if (isValidUsername(username)) {
        statusSpan.textContent = '✅ Username is valid!';
        statusSpan.className = 'valid';
    } else {
        if (username.length < 3) {
            statusSpan.textContent = '❌ Username must be at least 3 characters';
        } else if (username.length > 20) {
            statusSpan.textContent = '❌ Username must be less than 20 characters';
        } else {
            statusSpan.textContent = '❌ Use only letters, numbers, and underscore (_)';
        }
        statusSpan.className = 'invalid';
    }
});

// ============================================================
// 🔥 CHECK IF USERNAME EXISTS
// ============================================================
async function usernameExists(username) {
    const usersRef = ref(db, 'users');
    const snapshot = await get(usersRef);
    if (!snapshot.exists()) return false;
    const users = snapshot.val();
    for (let uid in users) {
        if (users[uid].username && users[uid].username.toLowerCase() === username.toLowerCase()) {
            return true;
        }
    }
    return false;
}

// ============================================================
// 🔥 AUTO-FILL REFERRAL FROM URL
// ============================================================
const urlParams = new URLSearchParams(window.location.search);
const refCode = urlParams.get('ref');
if (refCode) {
    document.getElementById('regRef').value = refCode;
    console.log('🔗 Referral code auto-filled:', refCode);
}

// ============================================================
// 🔥 EMAIL REGISTRATION
// ============================================================
document.getElementById('registerForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const username = document.getElementById('regUsername').value.trim();
    const name = document.getElementById('regName').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const pass = document.getElementById('regPassword').value;
    const ref = document.getElementById('regRef').value.trim();
    const registerBtn = document.getElementById('registerBtn');
    
    // Validate username
    if (!username || !isValidUsername(username)) {
        showToast('❌ Please enter a valid username (3-20 characters, letters, numbers, underscore)', 'error');
        return;
    }
    
    // Validate name
    if (!name || name.length < 2) {
        showToast('❌ Please enter your full name', 'error');
        return;
    }
    
    // Validate password
    if (pass.length < 6) {
        showToast('❌ Password must be at least 6 characters long!', 'error');
        return;
    }
    
    // Check if username already exists
    registerBtn.disabled = true;
    registerBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Checking username...';
    
    try {
        const exists = await usernameExists(username);
        if (exists) {
            showToast('❌ Username "' + username + '" is already taken! Please choose another.', 'error');
            registerBtn.disabled = false;
            registerBtn.innerHTML = 'Create Account <i class="bi bi-arrow-right ms-2"></i>';
            return;
        }
    } catch (err) {
        console.error('Username check error:', err);
    }
    
    registerBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Creating Account...';

    try {
        console.log('📝 Creating user with username:', username);
        
        // Step 1: Create user in Firebase Auth
        const cred = await createUserWithEmailAndPassword(auth, email, pass);
        const uid = cred.user.uid;
        console.log('✅ User created in Auth. UID:', uid);
        
        // Step 2: Generate referral code
        const refCodeGen = 'RND' + uid.slice(-5).toUpperCase();
        console.log('🔑 Referral Code:', refCodeGen);
        
        // Step 3: Save user data in Realtime Database
        const userData = {
            username: username.toLowerCase(),
            name: name,
            email: email,
            uid: uid,
            referralCode: refCodeGen,
            referredBy: ref || '',
            createdAt: Date.now(),
            totalStake: 0,
            totalReward: 0,
            availableReward: 0,
            totalWithdrawn: 0,
            totalReferrals: 0,
            teamBusiness: 0,
            banned: false,
            role: 'user'
        };
        
        console.log('💾 Saving user data to database...');
        const userRef = ref(db, 'users/' + uid);
        await set(userRef, userData);
        console.log('✅ User data saved to database!');
        
        // Also save username mapping for quick login lookup
        await set(ref(db, 'usernames/' + username.toLowerCase()), uid);
        console.log('✅ Username mapping saved!');

        // Step 4: Update referrer's referral count
        if (ref) {
            console.log('🔗 Updating referrer:', ref);
            const snapshot = await get(ref(db, 'users'));
            if (snapshot.exists()) {
                const users = snapshot.val();
                for (let key in users) {
                    if (users[key].referralCode === ref) {
                        const refCount = (users[key].totalReferrals || 0) + 1;
                        await set(ref(db, 'users/' + key + '/totalReferrals'), refCount);
                        console.log('✅ Referrer updated! New count:', refCount);
                        break;
                    }
                }
            }
        }
        
        // ✅ Success - Redirect to dashboard with toast
        showToast('✅ Account created successfully! Welcome ' + username + '! 🎉', 'success');
        console.log('🚀 Redirecting to dashboard...');
        
        setTimeout(() => {
            window.location.href = 'dashboard.html';
        }, 1500);
        
    } catch (err) {
        console.error('❌ Registration Error:', err);
        let msg = 'Registration failed. Please try again.';
        if (err.code === 'auth/email-already-in-use') {
            msg = '❌ This email is already registered. Please login instead.';
        } else if (err.code === 'auth/weak-password') {
            msg = '❌ Password is too weak. Please use at least 6 characters.';
        } else if (err.code === 'auth/invalid-email') {
            msg = '❌ Please enter a valid email address.';
        } else if (err.message && err.message.includes('permission_denied')) {
            msg = '❌ Database permission denied! Please check Firebase Rules.';
        }
        showToast(msg, 'error');
    }
    
    registerBtn.disabled = false;
    registerBtn.innerHTML = 'Create Account <i class="bi bi-arrow-right ms-2"></i>';
});

// ============================================================
// 🔥 GOOGLE REGISTRATION
// ============================================================
document.getElementById('googleRegisterBtn').addEventListener('click', async () => {
    const btn = document.getElementById('googleRegisterBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Loading...';
    
    try {
        console.log('📝 Signing in with Google...');
        const result = await signInWithPopup(auth, provider);
        const user = result.user;
        const uid = user.uid;
        const email = user.email;
        console.log('✅ Google sign-in successful. UID:', uid);
        
        // Check if user already exists in database
        const snapshot = await get(ref(db, 'users/' + uid));
        if (!snapshot.exists()) {
            console.log('💾 Creating new user from Google data...');
            // Generate username from email
            const baseUsername = email.split('@')[0].replace(/[^a-zA-Z0-9_]/g, '_');
            let username = baseUsername;
            let counter = 1;
            while (await usernameExists(username)) {
                username = baseUsername + '_' + counter;
                counter++;
            }
            
            const refCodeGen = 'RND' + uid.slice(-5).toUpperCase();
            const userData = {
                username: username.toLowerCase(),
                name: user.displayName || email.split('@')[0],
                email: email,
                uid: uid,
                referralCode: refCodeGen,
                referredBy: '',
                createdAt: Date.now(),
                totalStake: 0,
                totalReward: 0,
                availableReward: 0,
                totalWithdrawn: 0,
                totalReferrals: 0,
                teamBusiness: 0,
                banned: false,
                role: 'user'
            };
            
            await set(ref(db, 'users/' + uid), userData);
            await set(ref(db, 'usernames/' + username.toLowerCase()), uid);
            console.log('✅ Google user data saved! Username:', username);
        } else {
            console.log('ℹ️ User already exists in database.');
        }
        
        showToast('✅ Account created with Google! Welcome! 🎉', 'success');
        console.log('🚀 Redirecting to dashboard...');
        
        setTimeout(() => {
            window.location.href = 'dashboard.html';
        }, 1500);
        
    } catch (err) {
        console.error('❌ Google Registration Error:', err);
        let msg = err.message || 'Google sign in failed';
        showToast('❌ ' + msg, 'error');
    }
    
    btn.disabled = false;
    btn.innerHTML = '<i class="bi bi-google me-2"></i> Sign up with Google';
});
</script>
</body>
</html>
