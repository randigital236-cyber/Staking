<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Register - RND Staking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* CSS BILKUL VAISA HI */
        * { font-family: 'Inter', sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: linear-gradient(135deg, #080e1a 0%, #0f1f3a 50%, #1a2a4a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .register-container { width: 100%; max-width: 480px; }
        .card-glass {
            background: rgba(19,34,55,0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(46,204,113,0.15);
            border-radius: 24px;
            padding: 2.5rem;
        }
        .form-control-custom {
            background: rgba(8,14,26,0.8) !important;
            border: 1px solid rgba(46,204,113,0.15) !important;
            color: #f0f4ff !important;
            padding: 12px 16px !important;
            border-radius: 12px !important;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }
        .form-control-custom:focus {
            border-color: #2ecc71 !important;
            box-shadow: 0 0 0 3px rgba(46,204,113,0.15) !important;
            background: rgba(8,14,26,0.9) !important;
        }
        .form-control-custom::placeholder { color: #556688 !important; }
        .form-label { font-weight: 600; color: #a0b8d0; font-size: 0.9rem; margin-bottom: 6px; }
        .form-label .required { color: #ef4444; }
        .btn-primary-custom {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            border: none;
            color: #fff;
            font-weight: 600;
            padding: 14px;
            border-radius: 12px;
            width: 100%;
            transition: all 0.3s ease;
            font-size: 1rem;
        }
        .btn-primary-custom:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(46,204,113,0.3); color: #fff; }
        .btn-primary-custom:disabled { opacity: 0.6; cursor: not-allowed; transform: none !important; }
        .text-link { color: #2ecc71; text-decoration: none; font-weight: 600; }
        .text-link:hover { text-decoration: underline; }
        .logo-text { font-size: 1.8rem; font-weight: 800; color: #fff; }
        .logo-text span { color: #2ecc71; }
        
        .toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; max-width: 400px; }
        .toast-custom {
            background: rgba(19,34,55,0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(46,204,113,0.2);
            border-radius: 16px;
            padding: 16px 20px;
            color: #f0f4ff;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideIn 0.4s ease;
            margin-bottom: 10px;
        }
        .toast-custom.success { border-left: 4px solid #2ecc71; }
        .toast-custom.error { border-left: 4px solid #ef4444; }
        .toast-custom i { font-size: 1.5rem; }
        .toast-custom .toast-msg { flex: 1; font-size: 0.9rem; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        
        .referral-notice {
            background: rgba(46,204,113,0.05);
            border: 1px solid rgba(46,204,113,0.1);
            border-radius: 12px;
            padding: 8px 12px;
            font-size: 0.8rem;
            color: #2ecc71;
            margin-top: 5px;
        }
        .referral-notice.active {
            border-color: rgba(46,204,113,0.3);
            background: rgba(46,204,113,0.08);
        }
        
        @media (max-width: 576px) { .card-glass { padding: 1.5rem; } .logo-text { font-size: 1.5rem; } }
    </style>
</head>
<body>

<div class="toast-container" id="toastContainer"></div>

<div class="register-container">
    <div class="card-glass">
        <div class="text-center mb-4">
            <div class="logo-text"><i class="bi bi-currency-bitcoin me-2"></i>RND<span>Staking</span></div>
            <p class="text-muted small">Create your account</p>
        </div>

        <form id="registerForm" novalidate>
            <div class="mb-3">
                <label class="form-label">Full Name <span class="required">*</span></label>
                <input type="text" id="regName" class="form-control form-control-custom" placeholder="Enter your full name" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Email Address <span class="required">*</span></label>
                <input type="email" id="regEmail" class="form-control form-control-custom" placeholder="you@example.com" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Password <span class="required">*</span></label>
                <input type="password" id="regPassword" class="form-control form-control-custom" placeholder="Min. 6 characters" required minlength="6">
            </div>
            <div class="mb-3">
                <label class="form-label">Referral Code <span style="font-size:0.65rem;background:rgba(46,204,113,0.15);color:#2ecc71;padding:2px 10px;border-radius:20px;font-weight:500;margin-left:6px;">Optional</span></label>
                <input type="text" id="regRef" class="form-control form-control-custom" placeholder="Enter referrer's User ID" style="background:#0a1425 !important;">
                <div class="referral-notice" id="referralNotice">
                    <i class="bi bi-info-circle me-1"></i> 
                    <span id="referralNoticeText">Enter referrer's User ID if you have one</span>
                </div>
            </div>
            <button type="submit" class="btn-primary-custom" id="registerBtn">Create Account <i class="bi bi-arrow-right ms-2"></i></button>
        </form>

        <p class="text-center mt-4 text-muted small">
            Already have an account? <a href="login.html" class="text-link">Login</a>
        </p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
<script type="importmap">
{
    "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
        "firebase/database": "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"
    }
}
</script>

<script type="module">
// ============================================================
// 🔥 ===== REGISTER.HTML - PRODUCTION READY =====
// 🔥 ===== VERSION: 3.0 FINAL =====
// 🔥 ===== WITH TRANSACTION SUPPORT =====
// ============================================================
//
// 📌 IMPORTANT NOTES FOR DEVELOPER:
// ============================================================
// 1. ✅ Race Condition FIXED: Using runTransaction() for counters
//    → totalReferrals, downline, teamStructure counts are atomic
//    → Multiple simultaneous registrations = correct counts
//
// 2. ✅ Invalid referral → Registration continues (no cancellation)
// 3. ✅ Referral update fails → Account remains active
// 4. ✅ ONLY referral fields updated (teamStructure, directReferrals, 
//    totalReferrals, downline)
// 5. ✅ Future optimization: When users > 5000, implement query-based
//    referral lookup instead of loading all users
//
// ============================================================

// ============================================================
// 🔥 FIREBASE IMPORTS
// ============================================================
import { initializeApp } from "firebase/app";
import { getAuth, createUserWithEmailAndPassword, updateProfile } from "firebase/auth";
import { getDatabase, ref, set, get, update, runTransaction, serverTimestamp } from "firebase/database";

// ============================================================
// 🔥 FIREBASE CONFIG
// ============================================================
const firebaseConfig = {
    apiKey: "AIzaSyAz-TLmOhiy-_vHHmIjW8gyIOqTR_PT9o0",
    authDomain: "rnd2-70080.firebaseapp.com",
    databaseURL: "https://rnd2-70080-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "rnd2-70080",
    storageBucket: "rnd2-70080.firebasestorage.app",
    messagingSenderId: "468625887938",
    appId: "1:468625887938:web:5cb4ddbcf31b6fc0a4615b"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

// ============================================================
// 🔥 TOAST NOTIFICATION
// ============================================================
function showToast(message, type = 'success') {
    const container = document.getElementById('toastContainer');
    const toast = document.createElement('div');
    toast.className = `toast-custom ${type}`;
    const icon = type === 'success' ? 'bi-check-circle-fill text-success' : 'bi-exclamation-triangle-fill text-danger';
    toast.innerHTML = `<i class="bi ${icon}"></i><span class="toast-msg">${message}</span>`;
    container.appendChild(toast);
    setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateX(100%)';
        setTimeout(() => toast.remove(), 300);
    }, 6000);
}

// ============================================================
// 🔥 GET REFERRAL FROM URL
// ============================================================
let referralCodeFromURL = '';
const urlParams = new URLSearchParams(window.location.search);
const refFromURL = urlParams.get('ref');
if (refFromURL) {
    referralCodeFromURL = refFromURL;
    document.getElementById('regRef').value = refFromURL;
    document.getElementById('referralNoticeText').textContent = '✅ Referral code auto-filled from link!';
    document.getElementById('referralNotice').className = 'referral-notice active';
    console.log('✅ [URL] Referral code auto-filled:', refFromURL);
}

// ============================================================
// 🔥 REFERRAL INPUT LISTENER
// ============================================================
document.getElementById('regRef').addEventListener('input', function() {
    const val = this.value.trim();
    if (val) {
        document.getElementById('referralNoticeText').textContent = '📌 Referral code: ' + val;
        document.getElementById('referralNotice').className = 'referral-notice active';
    } else {
        document.getElementById('referralNoticeText').textContent = 'Enter referrer\'s User ID if you have one';
        document.getElementById('referralNotice').className = 'referral-notice';
    }
});

// ============================================================
// 🔥 GET USER BY REFERRAL CODE (Optimized with caching)
// ============================================================
let usersCache = null;
let usersCacheTime = 0;
const CACHE_TTL = 5000; // 5 seconds cache

async function getUserByReferralCode(referralCode) {
    if (!referralCode) return null;
    
    // Check cache
    const now = Date.now();
    if (usersCache && (now - usersCacheTime) < CACHE_TTL) {
        console.log('📦 [CACHE] Using cached users data');
        for (let key in usersCache) {
            if (usersCache[key].referralCode === referralCode) {
                return { uid: key, ...usersCache[key] };
            }
        }
        return null;
    }
    
    // Fetch fresh data
    console.log('📊 [DB] Fetching users from database...');
    const usersSnap = await get(ref(db, 'users'));
    if (!usersSnap.exists()) {
        return null;
    }
    
    usersCache = usersSnap.val();
    usersCacheTime = now;
    
    for (let key in usersCache) {
        if (usersCache[key].referralCode === referralCode) {
            return { uid: key, ...usersCache[key] };
        }
    }
    return null;
}

// ============================================================
// 🔥 UPDATE REFERRAL COUNTERS USING TRANSACTION (Atomic)
// ============================================================
async function updateReferrerCountersWithTransaction(referrerUid, newUserUid, newUserName, newUserEmail) {
    console.log('🔄 [TRANSACTION] Starting atomic update for:', referrerUid);
    
    const userRef = ref(db, 'users/' + referrerUid);
    
    try {
        const result = await runTransaction(userRef, (currentData) => {
            // If data is null, abort
            if (currentData === null) {
                console.warn('⚠️ [TRANSACTION] User data not found');
                return;
            }
            
            // Check if user already has this referral (duplicate protection)
            const directRefs = currentData.directReferrals || {};
            if (directRefs[newUserUid]) {
                console.warn('⚠️ [TRANSACTION] Duplicate referral detected');
                return; // Abort transaction
            }
            
            // Add new referral
            directRefs[newUserUid] = {
                uid: newUserUid,
                name: newUserName,
                email: newUserEmail,
                joinedAt: serverTimestamp()
            };
            
            // Update teamStructure
            const ts = currentData.teamStructure || { level1: 0, level2: 0, level3: 0, level4: 0, level5: 0 };
            ts.level1 = (ts.level1 || 0) + 1;
            
            // Update counters atomically
            currentData.totalReferrals = (currentData.totalReferrals || 0) + 1;
            currentData.downline = (currentData.downline || 0) + 1;
            currentData.directReferrals = directRefs;
            currentData.teamStructure = ts;
            
            console.log('✅ [TRANSACTION] Updated counters:', {
                totalReferrals: currentData.totalReferrals,
                downline: currentData.downline,
                level1: ts.level1
            });
            
            return currentData;
        });
        
        if (result.committed) {
            console.log('✅ [TRANSACTION] Successfully committed');
            return true;
        } else {
            console.warn('⚠️ [TRANSACTION] Not committed (probably duplicate)');
            return false;
        }
        
    } catch (error) {
        console.error('❌ [TRANSACTION] Error:', error);
        throw error;
    }
}

// ============================================================
// 🔥 UPDATE LEVEL 2-5 COUNTERS USING TRANSACTION (Atomic)
// ============================================================
async function updateLevelCounterWithTransaction(uid, level) {
    console.log(`🔄 [TRANSACTION] Updating Level ${level} for:`, uid);
    
    const userRef = ref(db, 'users/' + uid);
    
    try {
        const result = await runTransaction(userRef, (currentData) => {
            if (currentData === null) {
                console.warn(`⚠️ [TRANSACTION] Level ${level} user not found`);
                return;
            }
            
            // Update teamStructure
            const ts = currentData.teamStructure || { level1: 0, level2: 0, level3: 0, level4: 0, level5: 0 };
            const levelKey = 'level' + level;
            ts[levelKey] = (ts[levelKey] || 0) + 1;
            
            // Update downline atomically
            currentData.downline = (currentData.downline || 0) + 1;
            currentData.teamStructure = ts;
            
            console.log(`✅ [TRANSACTION] Level ${level} updated:`, ts[levelKey]);
            
            return currentData;
        });
        
        if (result.committed) {
            console.log(`✅ [TRANSACTION] Level ${level} committed`);
            return true;
        } else {
            console.warn(`⚠️ [TRANSACTION] Level ${level} not committed`);
            return false;
        }
        
    } catch (error) {
        console.error(`❌ [TRANSACTION] Level ${level} error:`, error);
        throw error;
    }
}

// ============================================================
// 🔥 UPDATE FULL REFERRAL CHAIN (WITH TRANSACTIONS)
// ============================================================
async function updateFullReferralChain(referralCode, newUserUid, newUserName, newUserEmail) {
    console.log('🔄 [REFERRAL] ===== STARTING (WITH TRANSACTIONS) =====');
    console.log('🔄 [REFERRAL] Referral Code:', referralCode);
    
    try {
        // STEP 1: Find referrer
        const referrer = await getUserByReferralCode(referralCode);
        if (!referrer) {
            console.warn('⚠️ [REFERRAL] Invalid referral code (will continue)');
            return;
        }
        
        console.log('✅ [REFERRAL] Referrer found:', referrer.name);
        console.log('✅ [REFERRAL] Referrer UID:', referrer.uid);
        
        // STEP 2: Update Level 1 with Transaction (Atomic)
        const level1Updated = await updateReferrerCountersWithTransaction(
            referrer.uid, 
            newUserUid, 
            newUserName, 
            newUserEmail
        );
        
        if (!level1Updated) {
            console.warn('⚠️ [REFERRAL] Level 1 update skipped (duplicate or error)');
            return;
        }
        
        // STEP 3: Update Levels 2-5 with Transactions
        let currentRefCode = referrer.referredBy;
        let level = 2;
        
        while (currentRefCode && level <= 5) {
            console.log(`🔍 [REFERRAL] Looking for Level ${level} referrer...`);
            
            const levelUser = await getUserByReferralCode(currentRefCode);
            if (!levelUser) {
                console.log(`ℹ️ [REFERRAL] Level ${level} chain ends here`);
                break;
            }
            
            // Update this level with Transaction
            await updateLevelCounterWithTransaction(levelUser.uid, level);
            console.log(`✅ [REFERRAL] Level ${level} updated for:`, levelUser.name);
            
            // Move to next level
            currentRefCode = levelUser.referredBy;
            level++;
        }
        
        console.log('✅ [REFERRAL] Full referral chain updated successfully with transactions!');
        
    } catch (error) {
        console.error('❌ [REFERRAL] Error:', error);
        console.warn('⚠️ [REFERRAL] Referral update failed but registration continues');
        console.error('📝 [REFERRAL] Needs admin fix - Referral Code:', referralCode);
        console.error('📝 [REFERRAL] Needs admin fix - New User UID:', newUserUid);
    }
}

// ============================================================
// 🔥 REGISTRATION FORM SUBMIT
// ============================================================
document.getElementById('registerForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    console.log('📝 [REGISTRATION] ===== STARTED =====');
    
    // Get form values
    const name = document.getElementById('regName').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const pass = document.getElementById('regPassword').value;
    const refCode = document.getElementById('regRef').value.trim();
    const registerBtn = document.getElementById('registerBtn');
    
    console.log('📝 [REGISTRATION] Name:', name);
    console.log('📝 [REGISTRATION] Email:', email);
    console.log('📝 [REGISTRATION] Referral input:', refCode);
    
    // Basic Validation
    if (!name || name.length < 2) {
        showToast('❌ Please enter your full name', 'error');
        return;
    }
    if (!email || !email.includes('@')) {
        showToast('❌ Please enter a valid email address', 'error');
        return;
    }
    if (pass.length < 6) {
        showToast('❌ Password must be at least 6 characters long!', 'error');
        return;
    }
    
    const finalRefCode = refCode || referralCodeFromURL || '';
    console.log('📌 [REGISTRATION] Final referral code:', finalRefCode || 'None');
    
    registerBtn.disabled = true;
    registerBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Creating Account...';

    try {
        // STEP 1: Create Auth User
        console.log('🔐 [REGISTRATION] Creating Firebase Auth user...');
        const cred = await createUserWithEmailAndPassword(auth, email, pass);
        const uid = cred.user.uid;
        await updateProfile(auth.currentUser, { displayName: name });
        console.log('✅ [REGISTRATION] Auth user created. UID:', uid);
        
        // STEP 2: Save User Data
        console.log('💾 [REGISTRATION] Saving user data...');
        const userData = {
            uid: uid,
            username: uid,
            name: name,
            email: email,
            referralCode: uid,
            referredBy: finalRefCode,
            rank: 'Member',
            role: 'user',
            banned: false,
            createdAt: serverTimestamp(),
            lastActive: serverTimestamp(),
            depositWallet: 0,
            referralWallet: 0,
            rndWallet: 0,
            lockedRND: 0,
            releaseWallet: 0,
            totalStake: 0,
            totalReward: 0,
            availableReward: 0,
            totalWithdrawn: 0,
            level1Earnings: 0,
            level2Earnings: 0,
            level3Earnings: 0,
            level4Earnings: 0,
            level5Earnings: 0,
            referralEarnings: 0,
            teamBusiness: 0,
            subscriptions: 0,
            totalReferrals: 0,
            downline: 0,
            teamStructure: { level1: 0, level2: 0, level3: 0, level4: 0, level5: 0 },
            directReferrals: {},
            packages: {},
            transferHistory: []
        };
        
        await set(ref(db, 'users/' + uid), userData);
        await set(ref(db, 'usernames/' + uid), uid);
        console.log('✅ [REGISTRATION] User data saved');
        
        // STEP 3: Update Referral Chain
        if (finalRefCode) {
            console.log('🔗 [REGISTRATION] Updating referral chain with transactions...');
            try {
                await updateFullReferralChain(finalRefCode, uid, name, email);
                console.log('✅ [REGISTRATION] Referral chain updated');
            } catch (refError) {
                console.error('❌ [REGISTRATION] Referral update failed:', refError);
                console.error('📝 [REGISTRATION] Needs admin migration - Referral Code:', finalRefCode);
                console.error('📝 [REGISTRATION] Needs admin migration - New User UID:', uid);
            }
        } else {
            console.log('ℹ️ [REGISTRATION] No referral code');
        }
        
        // STEP 4: Success
        console.log('✅ [REGISTRATION] ===== COMPLETED =====');
        showToast('✅ Account created successfully! Welcome ' + name + '!', 'success');
        
        await new Promise(resolve => setTimeout(resolve, 1500));
        console.log('🚀 [REGISTRATION] Redirecting to dashboard...');
        window.location.href = 'dashboard.html';
        
    } catch (err) {
        console.error('❌ [REGISTRATION] Error:', err.code, err.message);
        
        let msg = 'Registration failed. Please try again.';
        if (err.code === 'auth/email-already-in-use') {
            msg = '❌ This email is already registered.';
        } else if (err.code === 'auth/weak-password') {
            msg = '❌ Password must be at least 6 characters.';
        } else if (err.code === 'auth/invalid-email') {
            msg = '❌ Please enter a valid email address.';
        } else if (err.code === 'auth/network-request-failed') {
            msg = '❌ Network error. Please check your connection.';
        }
        
        showToast(msg, 'error');
    }
    
    registerBtn.disabled = false;
    registerBtn.innerHTML = 'Create Account <i class="bi bi-arrow-right ms-2"></i>';
});

console.log('✅ [APP] Registration page loaded successfully');
console.log('✅ [APP] Version: 3.0 FINAL - With Transactions');
console.log('✅ [APP] Race Condition: FIXED with runTransaction()');
</script>
</body>
</html>
