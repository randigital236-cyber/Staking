<script type="module">

const firebaseConfig = {

    appId: "1:468625887938:web:5cb4ddbcf31b6fc0a4615b",

// ============================================================
// 🔥 TOAST
// ============================================================
function showToast(message, type = 'success') {
    const container = document.getElementById('toastContainer');
    const toast = document.createElement('div');
    toast.className = `toast-custom ${type}`;
    const icon = type === 'success' ? 'bi-check-circle-fill text-success' : 'bi-exclamation-triangle-fill text-danger';
    toast.innerHTML = `<i class="bi ${icon}"></i><span class="toast-msg">${message}</span>`;
    container.appendChild(toast);
    setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateX(100%)';
        setTimeout(() => toast.remove(), 300);
    }, 5000);
}

// ============================================================
// 🔥 SIDEBAR
// ============================================================
const sidebarPanel = document.getElementById('sidebarPanel');
const sidebarOverlay = document.getElementById('sidebarOverlay');
const sidebarToggle = document.getElementById('sidebarToggle');
const sidebarClose = document.getElementById('sidebarClose');

function openSidebar() {
    sidebarPanel.classList.add('open');
    sidebarOverlay.classList.add('active');
    document.body.style.overflow = 'hidden';
}
function closeSidebar() {
    sidebarPanel.classList.remove('open');
    sidebarOverlay.classList.remove('active');
    document.body.style.overflow = '';
}
sidebarToggle.addEventListener('click', openSidebar);
sidebarClose.addEventListener('click', closeSidebar);
sidebarOverlay.addEventListener('click', closeSidebar);

// ============================================================
// 🔥 HELPERS
// ============================================================
function formatDate(timestamp) {
    if (!timestamp) return 'N/A';
    return new Date(timestamp).toLocaleString('en-IN', {
        day: '2-digit',
        month: 'short',
        year: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
    });
}

function getTypeIcon(type) {
    const map = {
        'deposit': 'bi-arrow-down-circle',
        'withdrawal': 'bi-arrow-up-circle',
        'package': 'bi-box-seam',
        'transfer_sent': 'bi-arrow-up-right',
        'transfer_received': 'bi-arrow-down-left',
        'referral_commission': 'bi-people',
        'daily_release': 'bi-clock-history'
    };
    return map[type] || 'bi-circle';
}

function getTypeClass(type) {
    const map = {
        'deposit': 'deposit',
        'withdrawal': 'withdraw',
        'package': 'package',
        'transfer_sent': 'transfer-sent',
        'transfer_received': 'transfer-received',
        'referral_commission': 'referral',
        'daily_release': 'release'
    };
    return map[type] || 'deposit';
}

function getTypeLabel(type) {
    const map = {
        'deposit': 'Deposit',
        'withdrawal': 'Withdrawal',
        'package': 'Package Purchase',
        'transfer_sent': 'Transfer Sent',
        'transfer_received': 'Transfer Received',
        'referral_commission': 'Referral Commission',
        'daily_release': 'Daily Release'
    };
    return map[type] || type;
}

function getAmountClass(type) {
    if (type === 'withdrawal' || type === 'transfer_sent') return 'negative';
    if (type === 'deposit' || type === 'transfer_received' || type === 'referral_commission' || type === 'daily_release') return 'positive';
    return 'neutral';
}

function getAmountSign(type) {
    if (type === 'withdrawal' || type === 'transfer_sent') return '-';
    if (type === 'deposit' || type === 'transfer_received' || type === 'referral_commission' || type === 'daily_release') return '+';
    return '';
}

function getStatusClass(status) {
    if (status === 'pending') return 'pending';
    if (status === 'approved' || status === 'active' || status === 'completed' || status === 'success') return 'approved';
    if (status === 'rejected') return 'rejected';
    return 'approved';
}

function getStatusLabel(status) {
    if (status === 'pending') return '⏳ Pending';
    if (status === 'approved' || status === 'success') return '✅ Success';
    if (status === 'active') return '✅ Active';
    if (status === 'completed') return '✅ Completed';
    if (status === 'rejected') return '❌ Rejected';
    return status;
}

// ============================================================
// 🔥 FETCH ALL TRANSACTIONS - FIXED
// ============================================================
async function fetchAllTransactions(uid) {
    const allTransactions = [];

    // 1️⃣ GET USER'S TRANSACTIONS (deposits, withdrawals, referrals, releases)
    const userSnap = await get(ref(db, 'users/' + uid));
    let userData = {};
    if (userSnap.exists()) {
        userData = userSnap.val();
        
        // Check transactions node (contains deposits, referrals, releases, etc.)
        const transactions = userData.transactions || {};
        for (const key in transactions) {
            const item = transactions[key];
            
            // Deposit transactions
            if (item.type === 'deposit' || item.type === 'deposit_verified') {
                allTransactions.push({
                    id: key,
                    type: 'deposit',
                    amount: item.amount || 0,
                    currency: 'USDT',
                    status: item.status || 'success',
                    timestamp: item.timestamp || Date.now(),
                    description: item.description || `Deposit of $${(item.amount || 0).toFixed(2)} USDT`,
                    from: item.from || 'External',
                    to: uid,
                    fromName: 'Blockchain',
                    toName: 'You',
                    txHash: item.txHash || '',
                    blockNumber: item.blockNumber || '',
                    confirmations: item.confirmations || ''
                });
            }
            
            // Referral commissions
            if (item.type === 'referral_commission') {
                allTransactions.push({
                    id: key,
                    type: 'referral_commission',
                    amount: item.amount || 0,
                    currency: 'RND',
                    status: 'success',
                    timestamp: item.timestamp || Date.now(),
                    description: item.description || `Level ${item.level || ''} Commission`,
                    from: item.fromUser || 'System',
                    to: uid,
                    fromName: item.fromUser || 'System',
                    toName: 'You',
                    level: item.level
                });
            }
            
            // Daily releases
            if (item.type === 'daily_release') {
                allTransactions.push({
                    id: key,
                    type: 'daily_release',
                    amount: item.amount || 0,
                    currency: 'RND',
                    status: 'success',
                    timestamp: item.timestamp || Date.now(),
                    description: item.description || 'Daily RND Release',
                    from: 'System',
                    to: uid,
                    fromName: 'System',
                    toName: 'You'
                });
            }
            
            // Withdrawals
            if (item.type === 'withdrawal') {
                allTransactions.push({
                    id: key,
                    type: 'withdrawal',
                    amount: item.amount || 0,
                    currency: item.currency || 'RND',
                    status: item.status || 'pending',
                    timestamp: item.timestamp || Date.now(),
                    description: item.description || `Withdrawal of ${(item.amount || 0).toFixed(2)} ${item.currency || 'RND'}`,
                    from: uid,
                    to: item.wallet || 'N/A',
                    fromName: 'You',
                    toName: 'External Wallet',
                    txHash: item.txHash || ''
                });
            }
        }
        
        // 2️⃣ PACKAGES
        const packages = userData.packages || {};
        for (const key in packages) {
            const item = packages[key];
            allTransactions.push({
                id: key,
                type: 'package',
                amount: item.usdtAmount || 0,
                currency: 'USDT',
                status: item.status || 'active',
                timestamp: item.timestamp || Date.now(),
                description: `${item.planName || 'Package'} - ${item.bonusPercent || 0}% Bonus | ${(item.totalRND || 0).toFixed(2)} RND`,
                from: uid,
                to: uid,
                fromName: 'You',
                toName: 'You',
                planName: item.planName,
                totalRND: item.totalRND,
                dailyRelease: item.dailyRelease
            });
        }
    }

    // 3️⃣ ALSO CHECK DEPOSITS NODE (for backward compatibility)
    const depSnap = await get(ref(db, 'deposits'));
    if (depSnap.exists()) {
        const data = depSnap.val();
        for (const key in data) {
            const item = data[key];
            if (item.uid === uid) {
                // Check if already added
                const exists = allTransactions.some(t => 
                    t.type === 'deposit' && 
                    t.txHash === item.txHash && 
                    Math.abs(t.timestamp - (item.timestamp || 0)) < 5000
                );
                if (!exists) {
                    allTransactions.push({
                        id: key,
                        type: 'deposit',
                        amount: item.amount || 0,
                        currency: 'USDT',
                        status: item.status || 'pending',
                        timestamp: item.timestamp || Date.now(),
                        description: `Deposit of $${(item.amount || 0).toFixed(2)} USDT`,
                        from: item.uid,
                        to: uid,
                        fromName: 'Blockchain',
                        toName: 'You',
                        txHash: item.txHash || ''
                    });
                }
            }
        }
    }

    // Sort by timestamp descending
    allTransactions.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
    return allTransactions;
}

// ============================================================
// 🔥 MAIN
// ============================================================
onAuthStateChanged(auth, async (user) => {
    if (!user) {
        window.location.href = 'login.html';
        return;
    }

    try {
        // Get current user
        const userSnap = await get(ref(db, 'users/' + user.uid));
        if (!userSnap.exists()) {
            window.location.href = 'dashboard.html';
            return;
        }

        const userData = userSnap.val();
        const username = userData.username || userData.referralCode || 'USER';
        const name = userData.name || 'User';

        // Update sidebar
        document.getElementById('sidebarName').textContent = name;
        document.getElementById('sidebarUserId').textContent = 'ID: ' + username.substring(0, 20) + '...';
        document.getElementById('sidebarAvatar').textContent = name.charAt(0).toUpperCase();

        const badge = document.getElementById('referralBadge');
        if (badge) badge.textContent = userData.totalReferrals || 0;

        let allTransactions = [];
        let currentFilter = 'all';

        // Load initial transactions
        allTransactions = await fetchAllTransactions(user.uid);

        // Listen for real-time updates
        const userRef = ref(db, 'users/' + user.uid);
        onValue(userRef, async () => {
            allTransactions = await fetchAllTransactions(user.uid);
            renderTransactions(currentFilter);
        });

        // ============================================================
        // 🔥 RENDER
        // ============================================================
        function renderTransactions(filter = 'all') {
            currentFilter = filter;
            let filtered = allTransactions;
            
            if (filter === 'deposit') {
                filtered = allTransactions.filter(t => t.type === 'deposit');
            } else if (filter === 'withdrawal') {
                filtered = allTransactions.filter(t => t.type === 'withdrawal');
            } else if (filter === 'package') {
                filtered = allTransactions.filter(t => t.type === 'package');
            } else if (filter === 'transfer') {
                filtered = allTransactions.filter(t => t.type === 'transfer_sent' || t.type === 'transfer_received');
            } else if (filter === 'referral') {
                filtered = allTransactions.filter(t => t.type === 'referral_commission');
            } else if (filter === 'release') {
                filtered = allTransactions.filter(t => t.type === 'daily_release');
            }

            // Calculate summary stats
            const totalDeposits = allTransactions.filter(t => t.type === 'deposit' && t.status !== 'rejected' && t.status !== 'pending')
                .reduce((sum, t) => sum + t.amount, 0);
            const totalWithdrawals = allTransactions.filter(t => t.type === 'withdrawal' && (t.status === 'approved' || t.status === 'success'))
                .reduce((sum, t) => sum + t.amount, 0);
            const totalPackages = allTransactions.filter(t => t.type === 'package').length;
            const totalReferralEarned = allTransactions.filter(t => t.type === 'referral_commission')
                .reduce((sum, t) => sum + t.amount, 0);
            const totalReleases = allTransactions.filter(t => t.type === 'daily_release')
                .reduce((sum, t) => sum + t.amount, 0);

            document.getElementById('transactionsContent').innerHTML = `
                <div class="row g-4">
                    <div class="col-12">
                        <h4 class="fw-bold"><i class="bi bi-receipt text-success me-2"></i>Transaction History</h4>
                        <hr class="border-secondary">
                    </div>

                    <!-- Summary Stats -->
                    <div class="col-12">
                        <div class="summary-stats">
                            <div class="stat-box">
                                <div class="num green">$${totalDeposits.toFixed(2)}</div>
                                <div class="label">💰 Total Deposits</div>
                            </div>
                            <div class="stat-box">
                                <div class="num gold">${totalWithdrawals.toFixed(2)}</div>
                                <div class="label">🏦 Total Withdrawn</div>
                            </div>
                            <div class="stat-box">
                                <div class="num blue">${totalPackages}</div>
                                <div class="label">📦 Packages</div>
                            </div>
                            <div class="stat-box">
                                <div class="num purple">${totalReferralEarned.toFixed(2)}</div>
                                <div class="label">👥 Referral Earned</div>
                            </div>
                            <div class="stat-box">
                                <div class="num pink">${totalReleases.toFixed(2)}</div>
                                <div class="label">📈 Total Released</div>
                            </div>
                            <div class="stat-box">
                                <div class="num" style="color:#34d399;">${allTransactions.length}</div>
                                <div class="label">📋 Total Transactions</div>
                            </div>
                        </div>
                    </div>

                    <!-- Filters -->
                    <div class="col-12">
                        <div class="filter-buttons">
                            <button class="filter-btn ${filter === 'all' ? 'active' : ''}" data-filter="all">
                                <i class="bi bi-list"></i> All
                            </button>
                            <button class="filter-btn ${filter === 'deposit' ? 'active' : ''}" data-filter="deposit">
                                <i class="bi bi-arrow-down-circle"></i> Deposits
                            </button>
                            <button class="filter-btn ${filter === 'withdrawal' ? 'active' : ''}" data-filter="withdrawal">
                                <i class="bi bi-arrow-up-circle"></i> Withdrawals
                            </button>
                            <button class="filter-btn ${filter === 'package' ? 'active' : ''}" data-filter="package">
                                <i class="bi bi-box-seam"></i> Packages
                            </button>
                            <button class="filter-btn ${filter === 'referral' ? 'active' : ''}" data-filter="referral">
                                <i class="bi bi-people"></i> Referrals
                            </button>
                            <button class="filter-btn ${filter === 'release' ? 'active' : ''}" data-filter="release">
                                <i class="bi bi-clock-history"></i> Releases
                            </button>
                        </div>
                    </div>

                    <!-- Transactions List -->
                    <div class="col-12">
                        <div class="card-glass">
                            ${filtered.length === 0 ? `
                                <div class="text-center text-muted py-5">
                                    <i class="bi bi-inbox fs-1 d-block mb-3"></i>
                                    <p>No ${filter === 'all' ? '' : filter} transactions found.</p>
                                </div>
                            ` : `
                                ${filtered.map(t => {
                                    const icon = getTypeIcon(t.type);
                                    const iconClass = getTypeClass(t.type);
                                    const label = getTypeLabel(t.type);
                                    const amountClass = getAmountClass(t.type);
                                    const sign = getAmountSign(t.type);
                                    const statusClass = getStatusClass(t.status);
                                    const statusLabel = getStatusLabel(t.status);
                                    
                                    let extraHtml = '';
                                    if (t.type === 'package') {
                                        extraHtml = `
                                            <div class="sub-detail">
                                                <i class="bi bi-box-seam"></i> ${t.planName || 'Package'} 
                                                | ${(t.totalRND || 0).toFixed(2)} RND 
                                                | Daily: ${(t.dailyRelease || 0).toFixed(4)} RND
                                            </div>
                                        `;
                                    } else if (t.type === 'deposit' && t.txHash) {
                                        extraHtml = `
                                            <div class="sub-detail" style="font-family:monospace;font-size:0.6rem;color:#556688;">
                                                TX: ${t.txHash.substring(0, 20)}...
                                                ${t.blockNumber ? ` | Block: ${t.blockNumber}` : ''}
                                                ${t.confirmations ? ` | Confirmations: ${t.confirmations}` : ''}
                                            </div>
                                        `;
                                    } else if (t.type === 'referral_commission') {
                                        extraHtml = `
                                            <div class="sub-detail">
                                                <i class="bi bi-people"></i> Level ${t.level || ''} | From: <span class="name">${t.fromName}</span>
                                            </div>
                                        `;
                                    } else if (t.type === 'daily_release') {
                                        extraHtml = `
                                            <div class="sub-detail">
                                                <i class="bi bi-clock-history"></i> Automatic daily release
                                            </div>
                                        `;
                                    } else if (t.type === 'withdrawal') {
                                        extraHtml = `
                                            <div class="sub-detail">
                                                <i class="bi bi-wallet2"></i> To: ${t.toName || 'External Wallet'}
                                            </div>
                                        `;
                                    }

                                    return `
                                        <div class="transaction-item">
                                            <div class="d-flex align-items-center gap-3" style="flex:1;min-width:0;">
                                                <div class="type-icon ${iconClass}">
                                                    <i class="bi ${icon}"></i>
                                                </div>
                                                <div class="info">
                                                    <h6>${label}</h6>
                                                    <div class="sub-detail">${t.description}</div>
                                                    ${extraHtml}
                                                    <div class="from-to">
                                                        <i class="bi bi-clock"></i> ${formatDate(t.timestamp)}
                                                    </div>
                                                </div>
                                            </div>
                                            <div class="amount-section">
                                                <div class="amount ${amountClass}">
                                                    ${sign}${t.amount.toFixed(t.currency === 'RND' ? 4 : 2)} ${t.currency || ''}
                                                </div>
                                                <div class="status ${statusClass}">${statusLabel}</div>
                                                <div class="date">#${t.id ? t.id.substring(0, 8) : 'N/A'}</div>
                                            </div>
                                        </div>
                                    `;
                                }).join('')}
                            `}
                        </div>
                    </div>

                    <!-- Print Button -->
                    <div class="col-12 text-center">
                        <button class="btn-print" onclick="window.print()" style="
                            background: linear-gradient(135deg, #2ecc71, #27ae60);
                            border: none;
                            color: #fff;
                            font-weight: 600;
                            padding: 12px 28px;
                            border-radius: 60px;
                            transition: all 0.3s ease;
                            font-size: 0.9rem;
                            display: inline-flex;
                            align-items: center;
                            gap: 10px;
                        ">
                            <i class="bi bi-printer"></i> Print / PDF
                        </button>
                    </div>
                </div>
            `;

            // Attach filter button listeners
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    renderTransactions(this.dataset.filter);
                });
            });
        }

        renderTransactions('all');

    } catch (error) {
        console.error('Error loading transactions:', error);
        document.getElementById('transactionsContent').innerHTML = `
            <div class="text-center py-5">
                <i class="bi bi-exclamation-triangle text-danger fs-1 d-block mb-3"></i>
                <h4>Error Loading Page</h4>
                <p class="text-muted">${error.message || 'Please check your internet connection.'}</p>
                <button class="btn btn-primary-custom mt-3" onclick="location.reload()">Refresh</button>
            </div>
        `;
    }
});
</script>
</body>
</html>
