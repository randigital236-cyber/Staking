<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Transactions - RND Staking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #080e1a; color: #f0f4ff; min-height: 100vh; }
        
        .navbar-custom {
            background: rgba(8,14,26,0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(46,204,113,0.15);
            padding: 10px 0;
            position: sticky;
            top: 0;
            z-index: 1050;
        }
        .navbar-custom .navbar-brand { font-weight: 800; font-size: 1.2rem; color: #fff !important; }
        .navbar-custom .navbar-brand i { color: #2ecc71; }
        .domain-badge {
            background: rgba(46,204,113,0.12);
            border: 1px solid rgba(46,204,113,0.15);
            border-radius: 30px;
            padding: 4px 14px;
            font-size: 0.65rem;
            color: #2ecc71;
        }
        
        .sidebar-toggle {
            background: rgba(46,204,113,0.12);
            border: 1px solid rgba(46,204,113,0.2);
            color: #2ecc71;
            padding: 8px 14px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1.2rem;
        }
        .sidebar-toggle:hover { background: rgba(46,204,113,0.2); }
        
        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            z-index: 1060;
            display: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .sidebar-overlay.active { display: block; opacity: 1; }
        
        .sidebar-panel {
            position: fixed;
            top: 0;
            right: -320px;
            width: 300px;
            height: 100%;
            background: rgba(12,20,35,0.98);
            backdrop-filter: blur(20px);
            border-left: 1px solid rgba(46,204,113,0.15);
            z-index: 1070;
            transition: right 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 25px 0;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        .sidebar-panel.open { right: 0; }
        
        .sidebar-panel .sidebar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px 20px;
            border-bottom: 1px solid rgba(46,204,113,0.1);
            margin-bottom: 15px;
        }
        .sidebar-panel .sidebar-header h5 { color: #fff; font-weight: 700; margin: 0; font-size: 1.1rem; }
        .sidebar-panel .sidebar-header h5 i { color: #2ecc71; }
        .sidebar-close {
            background: rgba(255,255,255,0.08);
            border: none;
            color: #8899bb;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1.2rem;
        }
        .sidebar-close:hover { background: rgba(255,255,255,0.15); color: #fff; }
        
        .sidebar-panel .nav-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 20px;
            color: #8899bb;
            text-decoration: none;
            transition: all 0.3s ease;
            margin: 2px 12px;
            border-radius: 12px;
            font-weight: 500;
            font-size: 0.95rem;
        }
        .sidebar-panel .nav-item:hover { background: rgba(46,204,113,0.08); color: #fff; }
        .sidebar-panel .nav-item.active { background: rgba(46,204,113,0.12); color: #2ecc71; }
        .sidebar-panel .nav-item i { font-size: 1.2rem; width: 28px; text-align: center; }
        .sidebar-panel .nav-item .badge {
            margin-left: auto;
            background: rgba(46,204,113,0.15);
            color: #2ecc71;
            font-weight: 600;
            font-size: 0.7rem;
            padding: 2px 10px;
            border-radius: 20px;
        }
        
        .sidebar-panel .sidebar-footer {
            margin-top: auto;
            padding: 20px;
            border-top: 1px solid rgba(46,204,113,0.08);
        }
        .sidebar-panel .sidebar-footer .nav-item { color: #f87171; }
        .sidebar-panel .sidebar-footer .nav-item:hover { background: rgba(239,68,68,0.08); color: #f87171; }
        
        .user-profile-sidebar {
            padding: 10px 20px 20px;
            border-bottom: 1px solid rgba(46,204,113,0.08);
            margin-bottom: 10px;
        }
        .user-profile-sidebar .avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: linear-gradient(135deg, #2ecc71, #1a7a3a);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.2rem;
            color: #fff;
        }
        .user-profile-sidebar .user-name { color: #fff; font-weight: 600; font-size: 0.95rem; }
        .user-profile-sidebar .user-id { color: #8899bb; font-size: 0.75rem; }
        
        .dashboard-container { padding: 20px; max-width: 1400px; margin: 0 auto; }
        
        .card-glass {
            background: rgba(19,34,55,0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(46,204,113,0.1);
            border-radius: 20px;
            padding: 1.5rem;
            transition: all 0.3s ease;
        }
        .card-glass:hover { border-color: rgba(46,204,113,0.3); transform: translateY(-3px); }
        .card-glass .card-title { font-size: 1rem; font-weight: 600; color: #fff; margin-bottom: 15px; }
        .card-glass .card-title i { color: #2ecc71; margin-right: 8px; }
        
        .transaction-item {
            background: rgba(8,14,26,0.4);
            border-radius: 12px;
            padding: 14px 18px;
            border: 1px solid rgba(46,204,113,0.06);
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            transition: all 0.2s;
        }
        .transaction-item:hover { border-color: rgba(46,204,113,0.15); }
        .transaction-item .type-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }
        .transaction-item .type-icon.deposit { background: rgba(46,204,113,0.12); color: #2ecc71; }
        .transaction-item .type-icon.withdraw { background: rgba(251,191,36,0.12); color: #fbbf24; }
        .transaction-item .type-icon.transfer { background: rgba(139,92,246,0.12); color: #a78bfa; }
        .transaction-item .type-icon.package { background: rgba(59,130,246,0.12); color: #60a5fa; }
        
        .transaction-item .info h6 { margin: 0; color: #fff; font-weight: 600; }
        .transaction-item .info small { color: #556688; font-size: 0.75rem; }
        .transaction-item .amount { font-weight: 700; font-size: 1.1rem; }
        .transaction-item .amount.positive { color: #2ecc71; }
        .transaction-item .amount.negative { color: #f87171; }
        .transaction-item .amount.neutral { color: #60a5fa; }
        .transaction-item .status-pending { color: #fbbf24; font-size: 0.7rem; }
        .transaction-item .status-approved { color: #2ecc71; font-size: 0.7rem; }
        .transaction-item .status-rejected { color: #ef4444; font-size: 0.7rem; }
        
        .filter-buttons { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
        .filter-btn {
            padding: 6px 16px;
            border-radius: 30px;
            border: 1px solid rgba(46,204,113,0.15);
            background: transparent;
            color: #8899bb;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.8rem;
        }
        .filter-btn:hover { border-color: rgba(46,204,113,0.3); color: #fff; }
        .filter-btn.active {
            background: rgba(46,204,113,0.12);
            border-color: #2ecc71;
            color: #2ecc71;
        }
        
        .btn-primary-custom {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            border: none;
            color: #fff;
            font-weight: 600;
            padding: 14px;
            border-radius: 12px;
            transition: all 0.3s ease;
            font-size: 1rem;
        }
        .btn-primary-custom:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(46,204,113,0.3); color: #fff; }
        
        @media (max-width: 768px) {
            .dashboard-container { padding: 15px; }
            .sidebar-panel { width: 280px; right: -300px; }
            .sidebar-panel .nav-item { padding: 10px 16px; font-size: 0.85rem; }
            .transaction-item { padding: 12px; }
        }
        @media (max-width: 480px) {
            .sidebar-panel { width: 100%; right: -100%; }
            .sidebar-panel.open { right: 0; }
            .card-glass { padding: 1rem; }
            .transaction-item .amount { font-size: 0.9rem; }
        }
    </style>
</head>
<body>

<!-- ====== NAVBAR ====== -->
<nav class="navbar navbar-custom">
    <div class="container-fluid px-3">
        <a class="navbar-brand fw-bold" href="dashboard.html">
            <i class="bi bi-currency-bitcoin me-2"></i>RND Staking
            <span class="domain-badge ms-2">staking.randigital.in</span>
        </a>
        <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle Menu">
            <i class="bi bi-list"></i>
        </button>
    </div>
</nav>

<!-- ====== SIDEBAR OVERLAY ====== -->
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<!-- ====== SIDEBAR PANEL ====== -->
<div class="sidebar-panel" id="sidebarPanel">
    <div class="sidebar-header">
        <h5><i class="bi bi-grid-1x2-fill me-2"></i>Menu</h5>
        <button class="sidebar-close" id="sidebarClose"><i class="bi bi-x-lg"></i></button>
    </div>
    
    <div class="user-profile-sidebar">
        <div class="d-flex align-items-center gap-3">
            <div class="avatar" id="sidebarAvatar">U</div>
            <div>
                <div class="user-name" id="sidebarName">User</div>
                <div class="user-id" id="sidebarUserId">ID: ---</div>
            </div>
        </div>
    </div>
    
    <a href="dashboard.html" class="nav-item">
        <i class="bi bi-speedometer2"></i> Dashboard
    </a>
    <a href="deposit.html" class="nav-item">
        <i class="bi bi-arrow-down-circle"></i> Deposit
    </a>
    <a href="withdrawal.html" class="nav-item">
        <i class="bi bi-arrow-up-circle"></i> Withdraw
    </a>
    <a href="referrals.html" class="nav-item">
        <i class="bi bi-people"></i> Referrals
        <span class="badge" id="referralBadge">0</span>
    </a>
    <a href="buy-package.html" class="nav-item">
        <i class="bi bi-box-seam"></i> Buy Package
    </a>
    <a href="transactions.html" class="nav-item active">
        <i class="bi bi-receipt"></i> Transactions
    </a>
    <a href="profile.html" class="nav-item">
        <i class="bi bi-person"></i> Profile
    </a>
    
    <div class="sidebar-footer">
        <a href="#" class="nav-item" id="logoutBtnSidebar">
            <i class="bi bi-box-arrow-right"></i> Logout
        </a>
    </div>
</div>

<!-- ====== TRANSACTIONS CONTENT ====== -->
<div class="dashboard-container" id="transactionsContent">
    <div class="text-center py-5">
        <div class="spinner-border text-success" role="status" style="width: 3rem; height: 3rem;"></div>
        <p class="text-muted mt-3">Loading transactions...</p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
<script type="importmap">
{
    "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
        "firebase/database": "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"
    }
}
</script>
<script type="module">
import { initializeApp } from "firebase/app";
import { getAuth, onAuthStateChanged, signOut } from "firebase/auth";
import { getDatabase, ref, get } from "firebase/database";

const firebaseConfig = {
    apiKey: "AIzaSyAz-TLmOhiy-_vHHmIjW8gyIOqTR_PT9o0",
    authDomain: "rnd2-70080.firebaseapp.com",
    databaseURL: "https://rnd2-70080-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "rnd2-70080",
    storageBucket: "rnd2-70080.firebasestorage.app",
    messagingSenderId: "468625887938",
    appId: "1:468625887938:web:5cb4ddbcf31b6fc0a4615b",
    measurementId: "G-ELVJD5NQKB"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

const sidebarPanel = document.getElementById('sidebarPanel');
const sidebarOverlay = document.getElementById('sidebarOverlay');
const sidebarToggle = document.getElementById('sidebarToggle');
const sidebarClose = document.getElementById('sidebarClose');

function openSidebar() {
    sidebarPanel.classList.add('open');
    sidebarOverlay.classList.add('active');
    document.body.style.overflow = 'hidden';
}
function closeSidebar() {
    sidebarPanel.classList.remove('open');
    sidebarOverlay.classList.remove('active');
    document.body.style.overflow = '';
}
sidebarToggle.addEventListener('click', openSidebar);
sidebarClose.addEventListener('click', closeSidebar);
sidebarOverlay.addEventListener('click', closeSidebar);
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeSidebar(); });

document.getElementById('logoutBtnSidebar').addEventListener('click', async (e) => {
    e.preventDefault();
    await signOut(auth);
    window.location.href = 'login.html';
});

async function fetchTransactions(uid) {
    const allTransactions = [];
    
    const depositsSnap = await get(ref(db, 'deposits'));
    if (depositsSnap.exists()) {
        const data = depositsSnap.val();
        for (let key in data) {
            if (data[key].uid === uid) {
                allTransactions.push({
                    id: key,
                    type: 'deposit',
                    amount: data[key].amount,
                    currency: 'USDT',
                    status: data[key].status || 'pending',
                    timestamp: data[key].timestamp || Date.now(),
                    txHash: data[key].txHash || '',
                    details: `Deposit ${data[key].amount} USDT`
                });
            }
        }
    }
    
    const packagesSnap = await get(ref(db, 'packages'));
    if (packagesSnap.exists()) {
        const data = packagesSnap.val();
        for (let key in data) {
            if (data[key].uid === uid) {
                allTransactions.push({
                    id: key,
                    type: 'package',
                    amount: data[key].amount,
                    currency: data[key].currency || 'USDT',
                    status: data[key].status || 'active',
                    timestamp: data[key].timestamp || Date.now(),
                    details: `${data[key].packageName || 'Package'} - ${data[key].reward || 0}% ROI`
                });
            }
        }
    }
    
    const userSnap = await get(ref(db, 'users/' + uid));
    if (userSnap.exists()) {
        const userData = userSnap.val();
        const history = userData.transferHistory || [];
        history.forEach((t) => {
            allTransactions.push({
                id: 'transfer_' + Date.now() + '_' + Math.random(),
                type: t.type === 'sent' ? 'transfer_sent' : 'transfer_received',
                amount: t.amount,
                currency: t.currency || 'RND',
                status: 'completed',
                timestamp: t.timestamp || Date.now(),
                details: t.type === 'sent' ? `Sent to ${t.to}` : `Received from ${t.from}`
            });
        });
    }
    
    allTransactions.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
    return allTransactions;
}

onAuthStateChanged(auth, async (user) => {
    if (!user) {
        window.location.href = 'login.html';
        return;
    }

    try {
        const userSnap = await get(ref(db, 'users/' + user.uid));
        if (!userSnap.exists()) {
            window.location.href = 'dashboard.html';
            return;
        }
        
        const userData = userSnap.val();
        const username = userData.username || userData.referralCode || 'USER';
        const name = userData.name || 'User';
        
        document.getElementById('sidebarName').textContent = name;
        document.getElementById('sidebarUserId').textContent = 'ID: ' + username;
        document.getElementById('sidebarAvatar').textContent = username.charAt(0).toUpperCase();
        
        const badge = document.getElementById('referralBadge');
        if (badge) badge.textContent = userData.totalReferrals || 0;
        
        const transactions = await fetchTransactions(user.uid);
        let filteredTransactions = [...transactions];
        let currentFilter = 'all';
        
        function renderTransactions(filter = 'all') {
            currentFilter = filter;
            let filtered = transactions;
            if (filter === 'deposit') {
                filtered = transactions.filter(t => t.type === 'deposit');
            } else if (filter === 'package') {
                filtered = transactions.filter(t => t.type === 'package');
            } else if (filter === 'transfer') {
                filtered = transactions.filter(t => t.type === 'transfer_sent' || t.type === 'transfer_received');
            }
            
            document.getElementById('transactionsContent').innerHTML = `
                <div class="row g-4">
                    <div class="col-12">
                        <h4 class="fw-bold"><i class="bi bi-receipt text-success me-2"></i>Transaction History</h4>
                        <hr class="border-secondary">
                        
                        <div class="filter-buttons">
                            <button class="filter-btn ${filter === 'all' ? 'active' : ''}" onclick="setFilter('all')">All</button>
                            <button class="filter-btn ${filter === 'deposit' ? 'active' : ''}" onclick="setFilter('deposit')"><i class="bi bi-arrow-down-circle"></i> Deposits</button>
                            <button class="filter-btn ${filter === 'package' ? 'active' : ''}" onclick="setFilter('package')"><i class="bi bi-box-seam"></i> Packages</button>
                            <button class="filter-btn ${filter === 'transfer' ? 'active' : ''}" onclick="setFilter('transfer')"><i class="bi bi-arrow-left-right"></i> Transfers</button>
                        </div>
                    </div>
                    
                    <div class="col-12">
                        <div class="card-glass">
                            ${filtered.length === 0 ? `
                                <div class="text-center text-muted py-4">
                                    <i class="bi bi-inbox fs-1 d-block mb-2"></i>
                                    <p>No ${filter === 'all' ? '' : filter} transactions found.</p>
                                </div>
                            ` : `
                                ${filtered.map(t => {
                                    let iconClass = 'deposit', icon = 'bi-arrow-down-circle';
                                    let amountClass = 'positive';
                                    let sign = '+';
                                    
                                    if (t.type === 'deposit') {
                                        iconClass = 'deposit';
                                        icon = 'bi-arrow-down-circle';
                                        amountClass = 'positive';
                                        sign = '+';
                                    } else if (t.type === 'package') {
                                        iconClass = 'package';
                                        icon = 'bi-box-seam';
                                        amountClass = 'neutral';
                                        sign = '🛒 ';
                                    } else if (t.type === 'transfer_sent') {
                                        iconClass = 'transfer';
                                        icon = 'bi-arrow-up-right';
                                        amountClass = 'negative';
                                        sign = '-';
                                    } else if (t.type === 'transfer_received') {
                                        iconClass = 'transfer';
                                        icon = 'bi-arrow-down-left';
                                        amountClass = 'positive';
                                        sign = '+';
                                    }
                                    
                                    let statusHtml = '';
                                    if (t.status === 'pending') statusHtml = '<span class="status-pending"><i class="bi bi-clock me-1"></i>Pending</span>';
                                    else if (t.status === 'approved' || t.status === 'active') statusHtml = '<span class="status-approved"><i class="bi bi-check-circle me-1"></i>Approved</span>';
                                    else if (t.status === 'completed') statusHtml = '<span class="status-approved"><i class="bi bi-check-circle me-1"></i>Completed</span>';
                                    else if (t.status === 'rejected') statusHtml = '<span class="status-rejected"><i class="bi bi-x-circle me-1"></i>Rejected</span>';
                                    else statusHtml = `<span class="status-approved">${t.status}</span>`;
                                    
                                    const amountDisplay = t.type === 'package' ? `${t.details}` : `${sign}${t.amount} ${t.currency}`;
                                    
                                    return `
                                        <div class="transaction-item">
                                            <div class="d-flex align-items-center gap-3">
                                                <div class="type-icon ${iconClass}"><i class="bi ${icon}"></i></div>
                                                <div class="info">
                                                    <h6>${t.type === 'deposit' ? 'Deposit' : t.type === 'package' ? 'Package Purchase' : t.type === 'transfer_sent' ? 'Sent' : 'Received'}</h6>
                                                    <small>${new Date(t.timestamp).toLocaleString('hi-IN')}</small>
                                                    ${t.txHash ? `<div style="font-size:0.6rem;color:#556688;font-family:monospace;">${t.txHash.substring(0,15)}...</div>` : ''}
                                                </div>
                                            </div>
                                            <div class="text-end">
                                                <div class="amount ${amountClass}">${amountDisplay}</div>
                                                <div>${statusHtml}</div>
                                            </div>
                                        </div>
                                    `;
                                }).join('')}
                            `}
                        </div>
                    </div>
                </div>
            `;
        }
        
        window.setFilter = function(filter) {
            renderTransactions(filter);
        };
        
        renderTransactions('all');

    } catch (error) {
        console.error('Error loading transactions:', error);
        document.getElementById('transactionsContent').innerHTML = `
            <div class="text-center py-5">
                <i class="bi bi-exclamation-triangle text-danger fs-1 d-block mb-3"></i>
                <h4>Error Loading Page</h4>
                <p class="text-muted">${error.message || 'Please check your internet connection.'}</p>
                <button class="btn btn-primary-custom mt-3" onclick="location.reload()">Refresh</button>
            </div>
        `;
    }
});
</script>
</body>
</html>
