<script type="module">
import { initializeApp } from "firebase/app";
import { getAuth, onAuthStateChanged, signOut } from "firebase/auth";
import { getDatabase, ref, get, onValue, off } from "firebase/database";

const firebaseConfig = {
    apiKey: "AIzaSyAz-TLmOhiy-_vHHmIjW8gyIOqTR_PT9o0",
    authDomain: "rnd2-70080.firebaseapp.com",
    databaseURL: "https://rnd2-70080-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "rnd2-70080",
    storageBucket: "rnd2-70080.firebasestorage.app",
    messagingSenderId: "468625887938",
    appId: "1:468625887938:web:5cb4ddbcf31b6fc0a4615b",
    measurementId: "G-ELVJD5NQKB"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

let currentFilter = 'all';
let allTransactions = [];
let unsubscribeListener = null;

// ============================================================
// 🔥 TOAST
// ============================================================
function showToast(message, type = 'success') {
    const container = document.getElementById('toastContainer');
    const toast = document.createElement('div');
    toast.className = `toast-custom ${type}`;
    const icon = type === 'success' ? 'bi-check-circle-fill text-success' : 'bi-exclamation-triangle-fill text-danger';
    toast.innerHTML = `<i class="bi ${icon}"></i><span class="toast-msg">${message}</span>`;
    container.appendChild(toast);
    setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateX(100%)';
        setTimeout(() => toast.remove(), 300);
    }, 5000);
}

// ============================================================
// 🔥 SIDEBAR
// ============================================================
const sidebarPanel = document.getElementById('sidebarPanel');
const sidebarOverlay = document.getElementById('sidebarOverlay');
const sidebarToggle = document.getElementById('sidebarToggle');
const sidebarClose = document.getElementById('sidebarClose');

function openSidebar() {
    sidebarPanel.classList.add('open');
    sidebarOverlay.classList.add('active');
    document.body.style.overflow = 'hidden';
}
function closeSidebar() {
    sidebarPanel.classList.remove('open');
    sidebarOverlay.classList.remove('active');
    document.body.style.overflow = '';
}
sidebarToggle.addEventListener('click', openSidebar);
sidebarClose.addEventListener('click', closeSidebar);
sidebarOverlay.addEventListener('click', closeSidebar);
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeSidebar(); });

document.getElementById('logoutBtnSidebar').addEventListener('click', async (e) => {
    e.preventDefault();
    await signOut(auth);
    window.location.href = 'login.html';
});

// ============================================================
// 🔥 HELPERS
// ============================================================
function formatDate(timestamp) {
    if (!timestamp) return 'N/A';
    return new Date(timestamp).toLocaleString('en-IN', {
        day: '2-digit',
        month: 'short',
        year: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
    });
}

function getTypeIcon(type) {
    const map = {
        'deposit': 'bi-arrow-down-circle',
        'withdrawal': 'bi-arrow-up-circle',
        'package': 'bi-box-seam',
        'transfer_sent': 'bi-arrow-up-right',
        'transfer_received': 'bi-arrow-down-left',
        'referral_commission': 'bi-people',
        'daily_release': 'bi-clock-history',
        'admin_credit': 'bi-plus-circle',
        'admin_debit': 'bi-dash-circle',
        'bonus': 'bi-gift',
        'package_completed': 'bi-check-circle'
    };
    return map[type] || 'bi-circle';
}

function getTypeClass(type) {
    const map = {
        'deposit': 'deposit',
        'withdrawal': 'withdraw',
        'package': 'package',
        'transfer_sent': 'transfer-sent',
        'transfer_received': 'transfer-received',
        'referral_commission': 'referral',
        'daily_release': 'release',
        'admin_credit': 'admin',
        'admin_debit': 'admin',
        'bonus': 'bonus',
        'package_completed': 'package'
    };
    return map[type] || 'deposit';
}

function getTypeLabel(type) {
    const map = {
        'deposit': 'Deposit',
        'withdrawal': 'Withdrawal',
        'package': 'Package Purchase',
        'transfer_sent': 'Transfer Sent',
        'transfer_received': 'Transfer Received',
        'referral_commission': 'Referral Commission',
        'daily_release': 'Daily Release',
        'admin_credit': 'Admin Credit',
        'admin_debit': 'Admin Debit',
        'bonus': 'Bonus Credit',
        'package_completed': 'Package Completed'
    };
    return map[type] || type;
}

function getAmountClass(type) {
    const negativeTypes = ['withdrawal', 'transfer_sent', 'admin_debit'];
    const positiveTypes = ['deposit', 'transfer_received', 'referral_commission', 'daily_release', 'admin_credit', 'bonus', 'package_completed'];
    
    if (negativeTypes.includes(type)) return 'negative';
    if (positiveTypes.includes(type)) return 'positive';
    return 'neutral';
}

function getAmountSign(type) {
    const negativeTypes = ['withdrawal', 'transfer_sent', 'admin_debit'];
    const positiveTypes = ['deposit', 'transfer_received', 'referral_commission', 'daily_release', 'admin_credit', 'bonus', 'package_completed'];
    
    if (negativeTypes.includes(type)) return '-';
    if (positiveTypes.includes(type)) return '+';
    return '';
}

function getStatusClass(status) {
    if (status === 'pending') return 'pending';
    if (status === 'approved' || status === 'active' || status === 'completed' || status === 'success') return 'approved';
    if (status === 'rejected' || status === 'failed') return 'rejected';
    return 'approved';
}

// ============================================================
// 🔥 FETCH TRANSACTIONS WITH REAL-TIME LISTENER
// ============================================================
function setupRealTimeListener(uid) {
    if (unsubscribeListener) {
        unsubscribeListener();
        unsubscribeListener = null;
    }
    
    const userRef = ref(db, 'users/' + uid);
    
    unsubscribeListener = onValue(userRef, (snapshot) => {
        if (snapshot.exists()) {
            const userData = snapshot.val();
            const transactions = userData.transactions || {};
            
            // Convert to array with proper sorting
            allTransactions = Object.keys(transactions).map(key => ({
                id: key,
                ...transactions[key]
            }));
            
            // Sort by timestamp descending (latest first)
            allTransactions.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
            
            console.log('🔄 Real-time update: ' + allTransactions.length + ' transactions');
            renderTransactions(currentFilter);
        }
    }, (error) => {
        console.error('Listener error:', error);
    });
}

// ============================================================
// 🔥 RENDER TRANSACTIONS
// ============================================================
function renderTransactions(filter = 'all') {
    currentFilter = filter;
    let filtered = allTransactions;
    
    // Apply filter
    if (filter === 'deposit') {
        filtered = allTransactions.filter(t => t.type === 'deposit');
    } else if (filter === 'withdrawal') {
        filtered = allTransactions.filter(t => t.type === 'withdrawal');
    } else if (filter === 'package') {
        filtered = allTransactions.filter(t => t.type === 'package');
    } else if (filter === 'transfer') {
        filtered = allTransactions.filter(t => t.type === 'transfer_sent' || t.type === 'transfer_received');
    } else if (filter === 'referral') {
        filtered = allTransactions.filter(t => t.type === 'referral_commission');
    } else if (filter === 'release') {
        filtered = allTransactions.filter(t => t.type === 'daily_release');
    } else if (filter === 'admin') {
        filtered = allTransactions.filter(t => t.type === 'admin_credit' || t.type === 'admin_debit');
    } else if (filter === 'bonus') {
        filtered = allTransactions.filter(t => t.type === 'bonus');
    }
    
    // Calculate summary stats
    const totalDeposits = allTransactions.filter(t => t.type === 'deposit' && t.status !== 'rejected')
        .reduce((sum, t) => sum + t.amount, 0);
    const totalWithdrawals = allTransactions.filter(t => t.type === 'withdrawal' && t.status === 'approved')
        .reduce((sum, t) => sum + t.amount, 0);
    const totalPackages = allTransactions.filter(t => t.type === 'package').length;
    const totalTransfers = allTransactions.filter(t => t.type === 'transfer_sent' || t.type === 'transfer_received').length;
    const totalReferralEarned = allTransactions.filter(t => t.type === 'referral_commission')
        .reduce((sum, t) => sum + t.amount, 0);
    const totalDailyRelease = allTransactions.filter(t => t.type === 'daily_release')
        .reduce((sum, t) => sum + t.amount, 0);
    const totalBonus = allTransactions.filter(t => t.type === 'bonus')
        .reduce((sum, t) => sum + t.amount, 0);
    
    // Filter button HTML
    const filterButtons = `
        <div class="filter-buttons">
            <button class="filter-btn ${filter === 'all' ? 'active' : ''}" onclick="setFilter('all')">
                <i class="bi bi-list"></i> All
            </button>
            <button class="filter-btn ${filter === 'deposit' ? 'active' : ''}" onclick="setFilter('deposit')">
                <i class="bi bi-arrow-down-circle"></i> Deposits
            </button>
            <button class="filter-btn ${filter === 'withdrawal' ? 'active' : ''}" onclick="setFilter('withdrawal')">
                <i class="bi bi-arrow-up-circle"></i> Withdrawals
            </button>
            <button class="filter-btn ${filter === 'package' ? 'active' : ''}" onclick="setFilter('package')">
                <i class="bi bi-box-seam"></i> Packages
            </button>
            <button class="filter-btn ${filter === 'release' ? 'active' : ''}" onclick="setFilter('release')">
                <i class="bi bi-clock-history"></i> Releases
            </button>
            <button class="filter-btn ${filter === 'referral' ? 'active' : ''}" onclick="setFilter('referral')">
                <i class="bi bi-people"></i> Referrals
            </button>
            <button class="filter-btn ${filter === 'transfer' ? 'active' : ''}" onclick="setFilter('transfer')">
                <i class="bi bi-arrow-left-right"></i> Transfers
            </button>
            <button class="filter-btn ${filter === 'admin' ? 'active' : ''}" onclick="setFilter('admin')">
                <i class="bi bi-shield"></i> Admin
            </button>
            <button class="filter-btn ${filter === 'bonus' ? 'active' : ''}" onclick="setFilter('bonus')">
                <i class="bi bi-gift"></i> Bonus
            </button>
        </div>
    `;
    
    // Transaction items HTML
    let transactionsHtml = '';
    if (filtered.length === 0) {
        transactionsHtml = `
            <div class="no-transactions">
                <i class="bi bi-inbox"></i>
                <p>No ${filter === 'all' ? '' : filter} transactions found.</p>
            </div>
        `;
    } else {
        transactionsHtml = filtered.map(t => {
            const icon = getTypeIcon(t.type);
            const iconClass = getTypeClass(t.type);
            const label = getTypeLabel(t.type);
            const amountClass = getAmountClass(t.type);
            const sign = getAmountSign(t.type);
            const statusClass = getStatusClass(t.status);
            
            let extraHtml = '';
            if (t.type === 'package') {
                extraHtml = `
                    <div class="sub-detail">
                        <i class="bi bi-box-seam"></i> ${t.planName || 'Package'} 
                        | ${(t.totalRND || 0).toFixed(2)} RND 
                        | Daily: ${(t.dailyRelease || 0).toFixed(4)} RND
                    </div>
                `;
            } else if (t.type === 'deposit' && t.txHash) {
                extraHtml = `
                    <div class="sub-detail" style="font-family:monospace;font-size:0.6rem;color:#556688;">
                        TX: ${t.txHash.substring(0, 20)}...
                    </div>
                `;
            } else if (t.type === 'transfer_sent' || t.type === 'transfer_received') {
                const other = t.type === 'transfer_sent' ? t.toName : t.fromName;
                const action = t.type === 'transfer_sent' ? 'To' : 'From';
                extraHtml = `
                    <div class="sub-detail">
                        <i class="bi bi-person"></i> ${action}: <span class="name">${other || 'Unknown'}</span>
                    </div>
                `;
            } else if (t.type === 'referral_commission') {
                extraHtml = `
                    <div class="sub-detail">
                        <i class="bi bi-people"></i> Level ${t.level || ''} | From: <span class="name">${t.fromUser || t.fromName || 'System'}</span>
                    </div>
                `;
            } else if (t.type === 'daily_release') {
                extraHtml = `
                    <div class="sub-detail">
                        <i class="bi bi-clock-history"></i> ${t.description || 'Automatic daily release'}
                    </div>
                `;
            } else if (t.type === 'withdrawal') {
                extraHtml = `
                    <div class="sub-detail">
                        <i class="bi bi-wallet2"></i> ${t.walletAddress ? t.walletAddress.substring(0, 20) + '...' : 'External Wallet'}
                    </div>
                `;
            } else if (t.type === 'bonus') {
                extraHtml = `
                    <div class="sub-detail">
                        <i class="bi bi-gift"></i> ${t.description || 'Bonus credit'}
                    </div>
                `;
            } else if (t.type === 'admin_credit' || t.type === 'admin_debit') {
                extraHtml = `
                    <div class="sub-detail">
                        <i class="bi bi-shield"></i> ${t.description || 'Admin adjustment'}
                        ${t.remark ? ` | Remark: ${t.remark}` : ''}
                    </div>
                `;
            }
            
            const statusDisplay = t.status === 'pending' ? '⏳ Pending' :
                                t.status === 'approved' ? '✅ Approved' :
                                t.status === 'completed' ? '✅ Completed' :
                                t.status === 'active' ? '🟢 Active' :
                                t.status === 'rejected' ? '❌ Rejected' :
                                t.status === 'failed' ? '❌ Failed' :
                                t.status === 'success' ? '✅ Success' : t.status;

            return `
                <div class="transaction-item">
                    <div class="d-flex align-items-center gap-3" style="flex:1;min-width:0;">
                        <div class="type-icon ${iconClass}">
                            <i class="bi ${icon}"></i>
                        </div>
                        <div class="info">
                            <h6>${label}</h6>
                            <div class="sub-detail">${t.description || ''}</div>
                            ${extraHtml}
                            <div class="from-to">
                                <i class="bi bi-clock"></i> ${formatDate(t.timestamp)}
                                ${t.packageId ? ` | ID: ${t.packageId.substring(0, 10)}...` : ''}
                            </div>
                        </div>
                    </div>
                    <div class="amount-section">
                        <div class="amount ${amountClass}">
                            ${sign}${(t.amount || 0).toFixed(t.currency === 'RND' ? 4 : 2)} ${t.currency || 'USDT'}
                        </div>
                        <div class="status ${statusClass}">${statusDisplay}</div>
                        <div class="date">#${t.id ? t.id.substring(0, 8) : 'N/A'}</div>
                    </div>
                </div>
            `;
        }).join('');
    }
    
    // Final HTML
    document.getElementById('transactionsContent').innerHTML = `
        <div class="row g-4">
            <div class="col-12">
                <div class="d-flex flex-wrap justify-content-between align-items-center">
                    <h4 class="fw-bold"><i class="bi bi-receipt text-success me-2"></i>Transaction History</h4>
                    <div class="d-flex align-items-center gap-3">
                        <span class="real-time-badge">
                            <span class="dot"></span> Real-time
                        </span>
                        <span class="text-muted small">${allTransactions.length} transactions</span>
                    </div>
                </div>
                <hr class="border-secondary">
            </div>

            <!-- Summary Stats -->
            <div class="col-12">
                <div class="summary-stats">
                    <div class="stat-box">
                        <div class="num green">$${totalDeposits.toFixed(2)}</div>
                        <div class="label">💰 Total Deposits</div>
                    </div>
                    <div class="stat-box">
                        <div class="num gold">${totalWithdrawals.toFixed(2)}</div>
                        <div class="label">🏦 Total Withdrawn</div>
                    </div>
                    <div class="stat-box">
                        <div class="num blue">${totalPackages}</div>
                        <div class="label">📦 Packages</div>
                    </div>
                    <div class="stat-box">
                        <div class="num purple">${totalTransfers}</div>
                        <div class="label">🔄 Transfers</div>
                    </div>
                    <div class="stat-box">
                        <div class="num pink">${totalReferralEarned.toFixed(2)}</div>
                        <div class="label">👥 Referral Earned</div>
                    </div>
                    <div class="stat-box">
                        <div class="num" style="color:#34d399;">${totalDailyRelease.toFixed(2)}</div>
                        <div class="label">📈 Daily Released</div>
                    </div>
                    <div class="stat-box">
                        <div class="num" style="color:#f472b6;">${totalBonus.toFixed(2)}</div>
                        <div class="label">🎁 Bonus Received</div>
                    </div>
                    <div class="stat-box">
                        <div class="num" style="color:#fbbf24;">${allTransactions.length}</div>
                        <div class="label">📋 Total Transactions</div>
                    </div>
                </div>
            </div>

            <!-- Filters -->
            <div class="col-12">
                ${filterButtons}
            </div>

            <!-- Transactions List -->
            <div class="col-12">
                <div class="card-glass">
                    ${transactionsHtml}
                </div>
            </div>

            <!-- Print Button -->
            <div class="col-12 text-center">
                <button class="btn-print" onclick="window.print()" style="
                    background: linear-gradient(135deg, #2ecc71, #27ae60);
                    border: none;
                    color: #fff;
                    font-weight: 600;
                    padding: 12px 28px;
                    border-radius: 60px;
                    transition: all 0.3s ease;
                    font-size: 0.9rem;
                    display: inline-flex;
                    align-items: center;
                    gap: 10px;
                ">
                    <i class="bi bi-printer"></i> Print / PDF
                </button>
            </div>
        </div>
    `;
}

// ============================================================
// 🔥 SET FILTER
// ============================================================
window.setFilter = function(filter) {
    renderTransactions(filter);
};

// ============================================================
// 🔥 MAIN
// ============================================================
onAuthStateChanged(auth, async (user) => {
    if (!user) {
        window.location.href = 'login.html';
        return;
    }

    try {
        // Get current user
        const userSnap = await get(ref(db, 'users/' + user.uid));
        if (!userSnap.exists()) {
            window.location.href = 'dashboard.html';
            return;
        }

        const userData = userSnap.val();
        const username = userData.username || userData.referralCode || 'USER';
        const name = userData.name || 'User';

        // Update sidebar
        document.getElementById('sidebarName').textContent = name;
        document.getElementById('sidebarUserId').textContent = 'ID: ' + username.substring(0, 20) + '...';
        document.getElementById('sidebarAvatar').textContent = name.charAt(0).toUpperCase();

        const badge = document.getElementById('referralBadge');
        if (badge) badge.textContent = userData.totalReferrals || 0;

        // 🔥 Setup real-time listener
        setupRealTimeListener(user.uid);

        // Initial render with loading state
        document.getElementById('transactionsContent').innerHTML = `
            <div class="text-center py-5">
                <div class="spinner-border text-success" role="status" style="width: 3rem; height: 3rem;"></div>
                <p class="text-muted mt-3">Loading transactions...</p>
            </div>
        `;

    } catch (error) {
        console.error('Error loading transactions:', error);
        document.getElementById('transactionsContent').innerHTML = `
            <div class="text-center py-5">
                <i class="bi bi-exclamation-triangle text-danger fs-1 d-block mb-3"></i>
                <h4>Error Loading Page</h4>
                <p class="text-muted">${error.message || 'Please check your internet connection.'}</p>
                <button class="btn btn-primary-custom mt-3" onclick="location.reload()">Refresh</button>
            </div>
        `;
    }
});

// ============================================================
// 🔥 CLEANUP ON PAGE UNLOAD
// ============================================================
window.addEventListener('beforeunload', () => {
    if (unsubscribeListener) {
        unsubscribeListener();
        unsubscribeListener = null;
    }
});
</script>
